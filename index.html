  {"id": "Q108", "date": "2024年10月", "dateList": "2024年10月", "frequency": 1, "importance": "D", "groupId": "G0173", "category": "関係法令（有害業務に係るもの）", "subcategory": "健康管理手帳", "question": "次の有害業務に従事した者のうち、離職の際に又は離職の後に、法令に基づく健康管理手帳の交付対象とならないものはどれか。", "choices": ["ジアニシジンを取り扱う業務に３か月以上従事した者", "ベータ－ナフチルアミンを取り扱う業務に３か月以上従事した者", "ベンジジンを取り扱う業務に３か月以上従事した者", "水銀を取り扱う業務に５年以上従事した者", "粉じん作業に従事した者で、じん肺管理区分が管理二又は管理三のもの"], "answer": 4, "explanation": "（1）～（3）（5）交付対象となる（安衛法第67条、安衛令第23条第1項）。（4）交付対象とならない。水銀を取り扱う業務は健康管理手帳の交付対象業務に含まれていない。【頻出】健康管理手帳の交付対象業務は頻出。"},
  {"id": "Q054", "date": "2025年4月", "dateList": "2023年10月、2024年10月、2025年4月", "frequency": 3, "importance": "B", "groupId": "G0169", "category": "関係法令（有害業務に係るもの）", "subcategory": "免許", "question": "次の免許のうち、労働安全衛生法令に定められていないものはどれか。", "choices": ["潜水士免許", "高圧室内作業主任者免許", "エックス線作業主任者免許", "石綿作業主任者免許", "ガンマ線透過写真撮影作業主任者免許"], "answer": 4, "explanation": "(1)～(3)(5)規定されている。\n(4)【正解】定められていない。石綿作業主任者は技能講習の修了証による資格であり、免許ではない。安衛法第14条、安衛則第16条、別表第1。\n【頻出】免許と技能講習の区別は頻出。"},
  {"id": "Q010", "date": "2025年10月", "dateList": "2025年10月、2025年4月", "frequency": 2, "importance": "C", "groupId": "G0055", "category": "関係法令（有害業務に係るもの）", "subcategory": "労働時間の延長制限", "question": "労働基準法に基づく時間外労働に関する協定を締結し、所轄労働基準監督署長への届出を行うとき、延長する労働時間が1日について2時間以内に制限されない業務は、次のうちどれか。", "choices": ["著しく暑熱な場所における業務。", "多量の低温物体を取り扱う業務。", "ヘリウム、アルゴン等の不活性の気体を入れたことのあるタンクの内部における業務。", "削岩機、鋲打機等の使用によって身体に著しい振動を与える業務。", "土石、獣毛等のじんあい又は粉末を著しく飛散する場所における業務。"], "answer": 3, "explanation": "労基法第36条第6項①。\n(1)制限される。労基則第18条第1項①。\n(2)制限される。労基則第18条第1項②。\n(3)【正解】制限されない。不活性ガスを入れたことのあるタンク内部の業務は労働時間延長の制限業務に含まれていない。\n(4)制限される。労基則第18条第1項⑥。\n(5)制限される。労基則第18条第1項④。\n【頻出】時間外労働の制限業務の判別は頻出。"},
  {"id": "Q160", "date": "2024年4月", "dateList": "2024年4月", "frequency": 1, "importance": "D", "groupId": "G0184", "category": "関係法令（有害業務に係るもの）", "subcategory": "労働時間の延長制限", "question": "次のＡからＤの業務について、労働基準法に基づく時間外労働に関する協定を締結し、これを所轄労働基準監督署長に届け出た場合においても、労働時間の延長が１日２時間を超えてはならないものの組合せはどれか。\nＡ 病原体によって汚染された物を取り扱う業務\nＢ 鋼材やくず鉄を入れてある船倉の内部における業務\nＣ 多量の低温物体を取り扱う業務\nＤ 重量物の取扱い等重激なる業務", "choices": ["Ａ，Ｂ", "Ａ，Ｃ", "Ｂ，Ｃ", "Ｂ，Ｄ", "Ｃ，Ｄ"], "answer": 5, "explanation": "Ａ 該当しない。Ｂ 該当しない。Ｃ 該当する（労基則第18条第1項②）。Ｄ 該当する（労基則第18条第1項⑦）。多量の低温物体を取り扱う業務と重量物の取扱い等重激なる業務は、労働時間の延長が1日2時間を超えてはならない。【頻出】労働時間延長の制限業務は頻出。"},
  {"id": "Q460", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0185", "category": "関係法令（有害業務に係るもの）", "subcategory": "労働時間の延長制限", "question": "次のＡからＤの業務について、労働基準法に基づく時間外労働に関する協定を締結し届け出た場合においても、労働時間の延長が１日２時間を超えてはならないものの組合せはどれか。Ａ 病原体によって汚染された物を取り扱う業務　Ｂ 腰部に負担のかかる立ち作業の業務　Ｃ 多量の低温物体を取り扱う業務　Ｄ 鉛の粉じんを発散する場所における業務", "choices": ["Ａ，Ｂ", "Ａ，Ｃ", "Ｂ，Ｃ", "Ｂ，Ｄ", "Ｃ，Ｄ"], "answer": 5, "explanation": "Ａ、Ｂ：該当しない。Ｃ：該当する。労基則第18条第1項②。Ｄ：該当する。労基則第18条第1項⑨。よってＣとＤ。【頻出】労働時間延長制限業務の組合せは頻出。"},
  {"id": "Q156", "date": "2024年4月", "dateList": "2024年4月", "frequency": 1, "importance": "D", "groupId": "G0154", "category": "関係法令（有害業務に係るもの）", "subcategory": "労働衛生保護具", "question": "有害物質等に係る作業とこれを規制している労働衛生関係規則との組合せとして、正しいものは次のうちどれか。", "choices": ["ホルムアルデヒドを取り扱う作業……有機溶剤中毒予防規則", "レーザー光線による金属の加工の作業……電離放射線障害防止規則", "ドライアイスを使用して冷凍を行う冷凍庫の内部における作業……酸素欠乏症等防止規則", "窒素を入れたことのある化学設備のタンク内を点検する作業……高気圧作業安全衛生規則", "自然換気が不十分な場所におけるはんだ付けの作業……粉じん障害防止規則"], "answer": 3, "explanation": "（1）誤り。ホルムアルデヒドは特定化学物質第2類に該当し、特定化学物質障害予防規則が適用される。（2）誤り。レーザー光線は電離放射線ではない。（3）正しい。ドライアイスを使用して冷凍を行う冷凍庫の内部は酸素欠乏危険場所に該当する（安衛令別表第6⑩）。（4）誤り。高気圧作業安全衛生規則は該当しない。（5）誤り。はんだ付けは粉じん障害防止規則の対象ではない。【頻出】有害業務と適用規則の組合せは頻出。"},
  {"id": "Q110", "date": "2024年10月", "dateList": "2024年10月", "frequency": 1, "importance": "D", "groupId": "G0124", "category": "関係法令（有害業務に係るもの）", "subcategory": "妊産婦等", "question": "女性については、労働基準法に基づく危険有害業務の就業制限により次の表の左欄の年齢に応じ右欄の重量以上の重量物を取り扱う業務に就かせてはならないとされているが、同表に入れるＡからＣの数値の組合せとして、正しいものはどれか。\n年齢／断続作業の場合／継続作業の場合\n満16歳未満／12kg／8kg\n満16歳以上満18歳未満／A／B\n満18歳以上／30kg／C", "choices": ["A=20、B=12、C=20", "A=20、B=12、C=25", "A=20、B=15、C=25", "A=25、B=15、C=20", "A=25、B=15、C=25"], "answer": 4, "explanation": "（4）正しい。満16歳以上満18歳未満の女性は断続作業25kg、継続作業15kg。満18歳以上の女性は断続作業30kg、継続作業20kg（労基法第64条の3第3項、女性則第3条）。（1）～（3）（5）誤り。【頻出】女性の重量物取扱い制限の数値は頻出。"},
  {"id": "Q410", "date": "2021年10月", "dateList": "2021年10月", "frequency": 1, "importance": "D", "groupId": "G0123", "category": "関係法令（有害業務に係るもの）", "subcategory": "妊産婦等", "question": "女性については、労働基準法に基づく危険有害業務の就業制限により年齢に応じた重量以上の重量物を取り扱う業務に就かせてはならないとされているが、満16歳未満の断続作業Ａ、満16歳以上満18歳未満の断続作業Ｂ、満18歳以上の継続作業Ｃの数値の組合せとして、正しいものはどれか。", "choices": ["Ａ：10　Ｂ：20　Ｃ：20", "Ａ：10　Ｂ：20　Ｃ：25", "Ａ：10　Ｂ：25　Ｃ：20", "Ａ：12　Ｂ：20　Ｃ：25", "Ａ：12　Ｂ：25　Ｃ：20"], "answer": 5, "explanation": "女性の重量物取扱い制限：満16歳未満の断続作業12kg、満16歳以上満18歳未満の断続作業25kg、満18歳以上の継続作業20kg。労基法第64条の3第1項、女性則第2条第1項①。【頻出】女性の重量物制限の数値は頻出の穴埋め。"},
  {"id": "Q260", "date": "2023年4月", "dateList": "2023年4月", "frequency": 1, "importance": "D", "groupId": "G0056", "category": "関係法令（有害業務に係るもの）", "subcategory": "就業制限", "question": "労働基準法に基づく有害業務への就業制限に関する次の記述のうち、誤っているものはどれか。", "choices": ["満18歳未満の者は、多量の低温物体を取り扱う業務に就かせてはならない。", "妊娠中の女性は、異常気圧下における業務に就かせてはならない。", "満18歳以上で産後8週間を経過したが1年を経過しない女性から、著しく暑熱な場所における業務に従事しない旨の申出があった場合には、当該業務に就かせてはならない。", "満18歳以上で産後8週間を経過したが1年を経過しない女性から、さく岩機、鋲打機等身体に著しい振動を与える機械器具を用いて行う業務に従事したい旨の申出があった場合には、当該業務に就かせることができる。", "満18歳以上で産後1年を経過した女性は、多量の低温物体を取り扱う業務に就かせることができる。"], "answer": 4, "explanation": "(4)誤り。産後1年未満の女性は、さく岩機等身体に著しい振動を与える業務について、本人の申出にかかわらず就かせてはならない（申出による免除が認められない業務）。女性則第2条第1項㉔、第2項。(1)正しい：年少則第8条第1項㊲。(2)正しい：女性則第2条第1項㉓。(3)正しい：女性則第2条第1項⑳、第2項。(5)正しい：女性則第2条第1項㉑、第2項。"},
  {"id": "Q210", "date": "2023年10月", "dateList": "2022年4月、2023年10月", "frequency": 2, "importance": "C", "groupId": "G0054", "category": "関係法令（有害業務に係るもの）", "subcategory": "年少者の就業制限", "question": "労働基準法に基づき、満18歳に満たない者を就かせてはならない業務に該当しないものは次のうちどれか。", "choices": ["さく岩機、鋲打機等身体に著しい振動を与える機械器具を用いて行う業務", "著しく寒冷な場所における業務", "20kgの重量物を継続的に取り扱う業務", "超音波にさらされる業務", "強烈な騒音を発する場所における業務"], "answer": 4, "explanation": "(4)該当しない。超音波にさらされる業務は年少者の就業制限業務に含まれていない。労働基準法第62条第1項、年少則第7条、第8条。(1)(2)(3)(5)はいずれも就業制限業務に該当する。"},
  {"id": "Q310", "date": "2022年10月", "dateList": "2022年10月", "frequency": 1, "importance": "D", "groupId": "G0053", "category": "関係法令（有害業務に係るもの）", "subcategory": "年少者の就業制限", "question": "労働基準法に基づき、満17歳の女性を就かせてはならない業務に該当しないものは次のうちどれか。", "choices": ["異常気圧下における業務", "20kgの重量物を断続的に取り扱う業務", "多量の高熱物体を取り扱う業務", "著しく寒冷な場所における業務", "土石、獣毛等のじんあい又は粉末を著しく飛散する場所における業務"], "answer": 2, "explanation": "(2)該当しない。満16歳以上満18歳未満の女性の断続作業における重量制限は25kg以上であり、20kgは制限内。労基法第62条第2項、年少則第8条。(1)(3)(4)(5)はいずれも就業制限業務に該当。"},
  {"id": "Q255", "date": "2023年4月", "dateList": "2021年4月、2023年4月", "frequency": 2, "importance": "C", "groupId": "G0130", "category": "関係法令（有害業務に係るもの）", "subcategory": "有機溶剤", "question": "屋内作業場において、第二種有機溶剤等を使用して常時洗浄作業を行う場合の措置として、法令上、誤っているものは次のうちどれか。ただし、有機溶剤中毒予防規則に定める適用除外及び設備の特例はないものとする。", "choices": ["作業場所に設けた局所排気装置について、囲い式フードの場合は0.4m/sの制御風速を出し得る能力を有するものにする。", "有機溶剤等の区分の色分けによる表示を黄色で行う。", "作業中の労働者が見やすい場所に、有機溶剤の人体に及ぼす作用、有機溶剤等の取扱い上の注意事項及び有機溶剤による中毒が発生したときの応急処置を掲示する。", "作業に常時従事する労働者に対し、6か月以内ごとに1回、定期に、特別の項目について医師による健康診断を行い、その結果に基づき作成した有機溶剤等健康診断個人票を3年間保存する。", "労働者が有機溶剤を多量に吸入したときは、速やかに、当該労働者に医師による診察又は処置を受けさせる。"], "answer": 4, "explanation": "(4)誤り。有機溶剤等健康診断個人票の保存期間は「5年間」であり「3年間」ではない。有機則第30条。(1)正しい：有機則第16条。(2)正しい：有機則第25条。(3)正しい：有機則第24条。(5)正しい：有機則第30条の4。"},
  {"id": "Q009", "date": "2025年10月", "dateList": "2022年10月、2022年4月、2023年10月、2025年10月", "frequency": 4, "importance": "B", "groupId": "G0160", "category": "関係法令（有害業務に係るもの）", "subcategory": "有機溶剤中毒予防規則", "question": "有機溶剤等を取り扱う場合の措置について、有機溶剤中毒予防規則に違反しているものは次のうちどれか。\nただし、同規則に定める適用除外及び設備の特例はないものとする。", "choices": ["地下室の内部で第一種有機溶剤等を用いて作業を行わせるとき、その作業場所に局所排気装置を設け、有効に稼働させているが、作業者に送気マスクも有機ガス用防毒マスクも使用させていない。", "地下室の内部で第二種有機溶剤等を用いて作業を行わせるとき、その作業場所にプッシュプル型換気装置を設けブース内の気流の乱れもなく稼働させているが、作業者に送気マスクも有機ガス用防毒マスクも使用させていない。", "地下室の内部で第三種有機溶剤等を用いて吹付けによる作業を行わせるとき、その作業場所に全体換気装置を設け有効に稼働させ、作業者に有機ガス用防毒マスクを使用させている。", "屋内作業場に設けた空気清浄装置のない局所排気装置の排気口で、厚生労働大臣が定める濃度以上の有機溶剤を排出するものの高さを、屋根から2mとしている。", "有機溶剤等を入れてあった空容器で有機溶剤の蒸気が発散するおそれのあるものを、屋外の一定の場所に集積している。"], "answer": 3, "explanation": "(1)違反なし。有機則第5条、第18条。\n(2)違反なし。有機則第5条、第18条。\n(3)【正解】違反している。地下室の内部で第三種有機溶剤等を用いて吹付けによる作業を行う場合は、密閉設備、局所排気装置又はプッシュプル型換気装置の設置が必要であり、全体換気装置では不可。有機則第6条第2項。\n(4)違反なし。有機則第15条の2第2項。\n(5)違反なし。有機則第36条。\n【頻出】有機溶剤の種別と換気装置の要件は頻出。"},
  {"id": "Q105", "date": "2024年10月", "dateList": "2024年10月", "frequency": 1, "importance": "D", "groupId": "G0158", "category": "関係法令（有害業務に係るもの）", "subcategory": "有機溶剤中毒予防規則", "question": "有機溶剤中毒予防規則に定める有機溶剤業務に該当しないものは次のうちどれか。", "choices": ["接着のためにする有機溶剤等の塗布の業務", "有機溶剤等が付着している物の乾燥の業務", "有機溶剤含有物を用いて行う印刷の業務", "有機溶剤含有物を用いて行う文字の書込み又は描画の業務", "有機溶剤含有物で塗装した建築物又は工作物の解体若しくは破砕の業務"], "answer": 5, "explanation": "（1）～（4）該当する（有機則第1条第1項⑥）。（5）該当しない。有機溶剤含有物で塗装した建築物又は工作物の解体・破砕の業務は有機溶剤業務に含まれない。【頻出】有機溶剤業務の範囲は頻出テーマ。"},
  {"id": "Q157", "date": "2024年4月", "dateList": "2024年4月", "frequency": 1, "importance": "D", "groupId": "G0159", "category": "関係法令（有害業務に係るもの）", "subcategory": "有機溶剤中毒予防規則", "question": "有機溶剤作業主任者の職務として、法令上、定められていないものは次のうちどれか。ただし、有機溶剤中毒予防規則に定める適用除外及び設備の特例はないものとする。", "choices": ["作業に従事する労働者が有機溶剤により汚染され、又はこれを吸入しないように、作業の方法を決定し、労働者を指揮すること。", "保護具の使用状況を監視すること。", "タンクの内部において有機溶剤業務に労働者が従事するときは、退避設備の整備等法定の措置が講じられていることを確認すること。", "局所排気装置、プッシュプル型換気装置又は全体換気装置を１か月を超えない期間ごとに点検すること。", "第一種有機溶剤等又は第二種有機溶剤等に係る有機溶剤業務を行う屋内作業場について、作業環境測定を実施すること。"], "answer": 5, "explanation": "（1）定められている（有機則第19条の2①）。（2）定められている（有機則第19条の2③）。（3）定められている（有機則第19条の2④）。（4）定められている（有機則第19条の2②）。（5）定められていない。有機溶剤業務に係る作業場は指定作業場であり、作業環境測定は作業環境測定士によって実施されなければならない（作業環境測定法第3条第1項、有機則第28条）。【頻出】作業主任者の職務範囲は頻出。"},
  {"id": "Q407", "date": "2021年10月", "dateList": "2021年10月", "frequency": 1, "importance": "D", "groupId": "G0129", "category": "関係法令（有害業務に係るもの）", "subcategory": "有機溶剤中毒予防規則", "question": "屋内作業場において、第二種有機溶剤等を使用して常時洗浄作業を行う場合の措置として、有機溶剤中毒予防規則上、正しいものは次のうちどれか。ただし、同規則に定める適用除外及び設備の特例はないものとする。", "choices": ["作業場所に設ける局所排気装置について、外付け式フードの場合は最大で0.4ｍ/ｓの制御風速を出し得る能力を有するものにする。", "作業中の労働者が有機溶剤等の区分を容易に知ることができるよう、容器に青色の表示をする。", "有機溶剤作業主任者に、有機溶剤業務を行う屋内作業場について、作業環境測定を実施させる。", "作業場所に設けたプッシュプル型換気装置について、１年を超える期間使用しない場合を除き、１年以内ごとに１回、定期に、自主検査を行う。", "作業に常時従事する労働者に対し、１年以内ごとに１回、定期に、有機溶剤等健康診断を行う。"], "answer": 4, "explanation": "（1）誤り：0.4m/sではなく0.5m/s。有機則第16条第1項。（2）誤り：第二種有機溶剤は青色ではなく黄色。有機則第25条第2項②。（3）誤り：作業環境測定は作業環境測定士が実施。（4）正しい：安衛法第45条、安衛令第15条第1項⑨、有機則第20条の2第2項。（5）誤り：1年以内ではなく6か月以内。有機則第29条第2項。【頻出】有機溶剤の区分色（第二種＝黄色）と健康診断頻度（6か月）は頻出。"},
  {"id": "Q202", "date": "2023年10月", "dateList": "2023年10月", "frequency": 1, "importance": "D", "groupId": "G0175", "category": "関係法令（有害業務に係るもの）", "subcategory": "特別教育", "question": "次の業務に労働者を就かせるとき、法令に基づく安全又は衛生のための特別の教育を行わなければならないものはどれか。", "choices": ["赤外線又は紫外線にさらされる業務", "有機溶剤等を用いて行う接着の業務", "塩酸を用いて行う分析の業務", "エックス線回折装置を用いて行う分析の業務", "廃棄物の焼却施設において焼却灰を取り扱う業務"], "answer": 5, "explanation": "(5)該当する。廃棄物焼却施設における焼却灰取扱い業務は特別教育が必要。安衛則第36条㊱。(1)～(4)は特別教育を必要とする業務に該当しない。"},
  {"id": "Q253", "date": "2023年4月", "dateList": "2022年10月、2023年4月", "frequency": 2, "importance": "C", "groupId": "G0174", "category": "関係法令（有害業務に係るもの）", "subcategory": "特別教育", "question": "次の業務に労働者を就かせるとき、法令に基づく安全又は衛生のための特別の教育を行わなければならないものに該当しないものはどれか。", "choices": ["石綿等が使用されている建築物の解体等の作業に係る業務", "高圧室内作業に係る業務", "有機溶剤等を用いて行う接着の業務", "廃棄物の焼却施設において焼却灰を取り扱う業務", "エックス線装置を用いて行う透過写真の撮影の業務"], "answer": 3, "explanation": "(3)該当しない。有機溶剤を用いた接着業務は特別教育の対象外。(1)(2)(4)(5)はいずれも安衛則第36条に基づく特別教育が必要。"},
  {"id": "Q408", "date": "2021年10月", "dateList": "2021年10月", "frequency": 1, "importance": "D", "groupId": "G0177", "category": "関係法令（有害業務に係るもの）", "subcategory": "特別教育", "question": "次の業務のうち、当該業務に労働者を就かせるとき、法令に基づく安全又は衛生のための特別の教育を行わなければならないものに該当しないものはどれか。", "choices": ["石綿等が使用されている建築物の解体等の作業に係る業務", "チェーンソーを用いて行う造材の業務", "特定化学物質のうち第二類物質を取り扱う作業に係る業務", "廃棄物の焼却施設において焼却灰を取り扱う業務", "エックス線装置を用いて行う透過写真の撮影の業務"], "answer": 3, "explanation": "（1）該当する：安衛則第36条第1項㊲。（2）該当する：安衛則第36条第1項⑧。（3）該当しない：特定化学物質の第二類物質の取扱いについて特別教育の規定はない。（4）該当する：安衛則第36条第1項㊱。（5）該当する：安衛則第36条第1項㉘。【頻出】特別教育が必要な業務の識別は頻出。"},
  {"id": "Q455", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0176", "category": "関係法令（有害業務に係るもの）", "subcategory": "特別教育", "question": "次の業務のうち、労働者を就かせるとき、法令に基づく安全又は衛生のための特別の教育を行わなければならないものはどれか。", "choices": ["チェーンソーを用いて行う造材の業務", "エックス線回折装置を用いて行う分析の業務", "特定化学物質を用いて行う分析の業務", "有機溶剤等を入れたことがあるタンクの内部における業務", "削岩機、チッピングハンマー等チェーンソー以外の振動工具を取り扱う業務"], "answer": 1, "explanation": "（1）該当する：安衛則第36条第1項⑧の2。（2）～（5）該当しない。【頻出】特別教育が必要な業務の識別は頻出。"},
  {"id": "Q004", "date": "2025年10月", "dateList": "2025年10月", "frequency": 1, "importance": "D", "groupId": "G0196", "category": "関係法令（有害業務に係るもの）", "subcategory": "特定化学物質", "question": "特定化学物質障害予防規則による特別管理物質を製造する事業者が事業を廃止しようとするとき、法令に基づき実施した措置に関する次のAからEの記録等について、特別管理物質等関係記録等報告書に添えて、所轄労働基準監督署長に提出することが、法令上、定められているものの組合せは(1)～(5)のうちどれか。\nA 密閉する設備、局所排気装置又はプッシュプル型換気装置の定期自主検査の記録又はその写し\nB 労働者が常時従事した作業の概要及び当該作業に従事した期間等の記録又はその写し\nC 屋内作業場について行った作業環境測定の記録又はその写し\nD 特定化学設備の定期自主検査の記録又はその写し\nE 特定化学物質健康診断個人票又はその写し", "choices": ["A，B，D", "A，C，D", "A，C，E", "B，C，E", "B，D，E"], "answer": 4, "explanation": "特化則第53条第1項。\nA：義務なし。\nB：義務あり。特化則第53条②。\nC：義務あり。特化則第53条①。\nD：義務なし。\nE：義務あり。特化則第53条③。\n提出が必要なのはB（作業記録）、C（作業環境測定記録）、E（健康診断個人票）の3つ。\n【頻出】特別管理物質の記録提出義務は頻出。"},
  {"id": "Q056", "date": "2025年4月", "dateList": "2025年4月", "frequency": 1, "importance": "D", "groupId": "G0195", "category": "関係法令（有害業務に係るもの）", "subcategory": "特定化学物質", "question": "特定化学物質障害予防規則による特別管理物質を製造する事業者が事業を廃止しようとするとき、法令に基づき実施した措置に関する次のAからEの記録等について、特別管理物質等関係記録等報告書に添えて、所轄労働基準監督署長に提出することが、法令上、定められているものの組合せは(1)～(5)のうちどれか。\nA 密閉する設備、局所排気装置又はプッシュプル型換気装置の定期自主検査の記録又はその写し\nB 労働者が常時従事した作業の概要及び当該作業に従事した期間等の記録又はその写し\nC 屋内作業場について行った作業環境測定の記録又はその写し\nD 特定化学物質作業主任者の選任の記録又はその写し\nE 特定化学物質健康診断個人票又はその写し", "choices": ["A，B，D", "A，C，D", "A，C，E", "B，C，E", "B，D，E"], "answer": 4, "explanation": "特化則第53条第1項。\nA：定められていない。\nB：定められている。特化則第53条②。\nC：定められている。特化則第53条①。\nD：定められていない。\nE：定められている。特化則第53条③。\n【頻出】特別管理物質の記録提出義務は頻出。"},
  {"id": "Q057", "date": "2025年4月", "dateList": "2025年4月", "frequency": 1, "importance": "D", "groupId": "G0060", "category": "関係法令（有害業務に係るもの）", "subcategory": "特定化学物質", "question": "労働安全衛生法において、譲渡し、又は提供するときに名称等の表示が義務付けられている危険物及び有害物（以下「表示対象物質」という。）の表示の方法等に関する次の記述のうち、誤っているものはどれか。", "choices": ["表示対象物質を容器に入れ、又は包装して、譲渡し、又は提供するときはその容器又は包装に名称等を表示しなければならない。", "表示対象物質を容器に入れ、かつ、包装して、譲渡し、又は提供するときは、その包装に名称等を表示しなければならない。", "表示対象物質を容器に入れ、又は包装する以外の方法により譲渡し、又は提供するときは、表示すべき事項を記載した文書を、譲渡し、又は提供する相手方に交付しなければならない。", "容器又は包装に表示事項等の全てを印刷し、又は表示事項等の全てを印刷した票箋を貼り付けることが困難なときは、表示事項等のうち名称以外のものについては、これらを印刷した票箋を容器又は包装に結びつけることにより表示することができる。", "表示対象物質を原材料等として新規に採用し、又は変更するときは、当該物質による危険性又は有害性等を調査しなければならない。"], "answer": 2, "explanation": "(1)正しい。安衛法第57条第1項①。\n(2)【正解】誤り。容器に入れ、かつ、包装して譲渡・提供するときは、「その容器に」名称等を表示しなければならない。包装ではなく容器が正しい。安衛法第57条第1項①。\n(3)正しい。安衛法第57条の2第1項②。\n(4)正しい。安衛則第32条。\n(5)正しい。安衛則第34条の2の7。\n【頻出】表示対象物質の表示方法は頻出。"},
  {"id": "Q159", "date": "2024年4月", "dateList": "2024年4月", "frequency": 1, "importance": "D", "groupId": "G0194", "category": "関係法令（有害業務に係るもの）", "subcategory": "特定化学物質", "question": "特定化学物質障害予防規則による特別管理物質を製造する事業者が事業を廃止しようとするとき、事業者が実施した措置に関する次のＡからＥの記録等について、特別管理物質等関係記録等報告書に添えて、所轄労働基準監督署長に提出することが、法令上、定められているものの組合せはどれか。\nＡ 作業環境測定の記録又はその写し\nＢ 製造プロセス等の運転条件及び製造量の記録又はその写し\nＣ 作業の概要及び従事した期間等の記録又はその写し\nＤ 局所排気装置の定期自主検査の記録又はその写し\nＥ 特定化学物質健康診断個人票又はその写し", "choices": ["Ａ，Ｂ，Ｄ", "Ａ，Ｂ，Ｅ", "Ａ，Ｃ，Ｅ", "Ｂ，Ｃ，Ｄ", "Ｃ，Ｄ，Ｅ"], "answer": 3, "explanation": "特化則第53条第1項により、提出が義務付けられているのは、Ａ（作業環境測定の記録）、Ｃ（作業の概要及び従事した期間等の記録）、Ｅ（特定化学物質健康診断個人票）の3つである。Ｂ（製造プロセス等の運転条件及び製造量の記録）とＤ（局所排気装置の定期自主検査の記録）は提出義務がない。【頻出】特別管理物質の記録・報告義務は頻出。"},
  {"id": "Q204", "date": "2023年10月", "dateList": "2021年10月、2022年10月、2022年4月、2023年10月", "frequency": 4, "importance": "B", "groupId": "G0179", "category": "関係法令（有害業務に係るもの）", "subcategory": "特定化学物質", "question": "次の特定化学物質を製造しようとするとき、労働安全衛生法に基づく厚生労働大臣の許可を必要としないものはどれか。", "choices": ["アルファ-ナフチルアミン", "塩素化ビフェニル(別名PCB)", "オルト-トリジン", "オルト-トルイジン", "ベンゾトリクロリド"], "answer": 4, "explanation": "(4)許可不要。オルト-トルイジンは特定化学物質第2類物質であり、製造許可物質（第1類物質）ではない。安衛法第56条第1項、安衛令第17条、別表第3。(1)(2)(3)(5)はいずれも第1類物質（許可物質）で製造許可が必要。"},
  {"id": "Q359", "date": "2022年4月", "dateList": "2022年4月", "frequency": 1, "importance": "D", "groupId": "G0151", "category": "関係法令（有害業務に係るもの）", "subcategory": "特殊健康診断", "question": "有害業務とそれに常時従事する労働者に対して特別の項目について行う健康診断の項目の一部との組合せとして、法令上、正しいものは次のうちどれか。", "choices": ["有機溶剤業務…尿中のデルタアミノレブリン酸の量の検査", "放射線業務…尿中の潜血の有無の検査", "鉛業務…尿中のマンデル酸の量の検査", "石綿等を取り扱う業務…尿中又は血液中の石綿の量の検査", "潜水業務…四肢の運動機能の検査"], "answer": 5, "explanation": "（1）誤り：尿中のデルタアミノレブリン酸は鉛業務の検査項目。鉛則第53条第1項⑥。（2）誤り：放射線業務は血液中の赤血球数・白血球数の検査等。電離則第56条第1項。（3）誤り：尿中のマンデル酸はスチレン（特定化学物質）の代謝物検査。特化則第39条第1項。（4）誤り：石綿は胸部エックス線直接撮影等。石綿則第40条第1項。（5）正しい：潜水業務の健康診断に四肢の運動機能の検査が含まれる。高圧則第38条第1項③。【頻出】有害業務と健康診断項目の組合せは頻出。"},
  {"id": "Q103", "date": "2024年10月", "dateList": "2022年10月、2022年4月、2024年10月", "frequency": 3, "importance": "B", "groupId": "G0207", "category": "関係法令（有害業務に係るもの）", "subcategory": "石綿障害予防規則", "question": "石綿障害予防規則に基づく措置に関する次の記述のうち、誤っているものはどれか。", "choices": ["石綿等を取り扱う屋内作業場については、６か月以内ごとに１回、定期に、空気中の石綿の濃度を測定するとともに、測定結果等を記録し、これを40年間保存しなければならない。", "石綿等の粉じんが発散する屋内作業場に設けられた局所排気装置については、原則として、１年以内ごとに１回、定期に、自主検査を行うとともに、検査の結果等を記録し、これを３年間保存しなければならない。", "石綿等の取扱いに伴い石綿の粉じんを発散する場所における業務に常時従事する労働者に対し、雇入れ又は当該業務への配置替えの際及びその後６か月以内ごとに１回、定期に、特別の項目について医師による健康診断を行い、その結果に基づき、石綿健康診断個人票を作成し、これを当該労働者が当該事業場において常時当該業務に従事しないこととなった日から40年間保存しなければならない。", "石綿等の取扱いに伴い石綿の粉じんを発散する場所において、常時石綿等を取り扱う作業に従事する労働者については、１か月を超えない期間ごとに、作業の概要、従事した期間等を記録し、これを当該労働者が当該事業場において常時当該作業に従事しないこととなった日から40年間保存するものとする。", "石綿等を常時取り扱う作業場の床等については、水洗する等粉じんの飛散しない方法によって、毎週１回以上、掃除を行わなければならない。"], "answer": 5, "explanation": "（1）正しい（石綿則第36条）。（2）正しい（石綿則第22条、第23条）。（3）正しい（石綿則第40条、第41条）。（4）正しい（石綿則第35条）。（5）誤り。「毎週１回以上」ではなく「毎日１回以上」掃除を行わなければならない（石綿則第30条）。【頻出】石綿関連の保存期間（40年間）と掃除頻度（毎日）は頻出。"},
  {"id": "Q006", "date": "2025年10月", "dateList": "2023年10月、2025年10月", "frequency": 2, "importance": "C", "groupId": "G0164", "category": "関係法令（有害業務に係るもの）", "subcategory": "粉じん", "question": "次のAからEの粉じん発生源について、法令上、特定粉じん発生源に該当するものの組合せは(1)～(5)のうちどれか。\nA 屋内において、耐火物を用いた炉を解体する箇所\nB 屋内の、ガラスを製造する工程において、原料を溶解炉に投げ入れる箇所\nC 屋内において、研磨材を用いて手持式動力工具により金属を研磨する箇所\nD 屋内において、粉状の炭素製品を袋詰めする箇所\nE 屋内において、固定の溶射機により金属を溶射する箇所", "choices": ["A，B", "A，E", "B，C", "C，D", "D，E"], "answer": 5, "explanation": "粉じん則第2条第1項。\nA：該当しない（粉じん則別表第1⑲）。\nB：該当しない（粉じん則別表第1⑫）。\nC：該当しない（粉じん則別表第1⑦、別表第3⑥）。\nD：該当する（粉じん則別表第2⑨）。\nE：該当する（粉じん則別表第2⑮）。\n【頻出】特定粉じん発生源の判別は頻出。"},
  {"id": "Q109", "date": "2024年10月", "dateList": "2021年10月、2024年10月", "frequency": 2, "importance": "C", "groupId": "G0214", "category": "関係法令（有害業務に係るもの）", "subcategory": "粉じん障害防止規則", "question": "粉じん障害防止規則に基づく措置に関する次の記述のうち、誤っているものはどれか。ただし、同規則に定める適用除外及び特例はないものとする。", "choices": ["屋内の特定粉じん発生源については、発生源の区分に応じて、密閉する設備、局所排気装置、プッシュプル型換気装置若しくは湿潤な状態に保つための設備の設置又はこれらと同等以上の措置を講じなければならない。", "特定粉じん発生源に係る局所排気装置に、法令に基づき設ける除じん装置は、粉じんの種類がヒュームである場合には、サイクロンによる除じん方式のものでなければならない。", "特定粉じん作業以外の粉じん作業を行う屋内作業場については、全体換気装置による換気の実施又はこれと同等以上の措置を講じなければならない。", "常時特定粉じん作業を行う屋内作業場については、６か月以内ごとに１回、定期に、空気中の粉じんの濃度の測定を行い、その測定結果等を記録して、これを７年間保存しなければならない。", "土石、岩石又は鉱物に係る特定粉じん作業を常時行う屋内作業場について、法令に基づき空気中の粉じんの濃度の測定を行うときは、当該土石、岩石又は鉱物中の遊離けい酸の含有率が明らかな場合を除き、当該粉じん中の遊離けい酸の含有率を測定しなければならない。"], "answer": 2, "explanation": "（1）正しい（粉じん則第4条第1項）。（2）誤り。ヒュームの場合は、ろ過除じん方式、電気除じん方式、又はこれと同等以上の性能を有する除じん方式によらなければならない。サイクロンによる除じん方式は不適切である（粉じん則第13条第1項、第8項）。（3）正しい（粉じん則第5条第1項）。（4）正しい（粉じん則第25条、第26条第1項、第8項）。（5）正しい（粉じん則第26条第2項）。【頻出】除じん装置の方式と粉じんの種類の対応は頻出。"},
  {"id": "Q459", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0213", "category": "関係法令（有害業務に係るもの）", "subcategory": "粉じん障害防止規則", "question": "粉じん作業に係る次の粉じん発生源のうち、法令上、特定粉じん発生源に該当するものはどれか。", "choices": ["屋内の、ガラスを製造する工程において、原料を溶解炉に投げ入れる箇所", "屋内の、耐火物を用いた炉を解体する箇所", "屋内の、研磨材を用いて手持式動力工具により金属を研磨する箇所", "屋内の、粉状のアルミニウムを袋詰めする箇所", "屋内の、金属をアーク溶接する箇所"], "answer": 4, "explanation": "（1）（2）（3）（5）該当しない。（4）該当する：粉状のアルミニウムの袋詰めは特定粉じん発生源。粉じん則別表第2⑨。【頻出】特定粉じん発生源の識別は頻出。"},
  {"id": "Q005", "date": "2025年10月", "dateList": "2022年4月、2023年10月、2023年4月、2025年10月、2025年4月", "frequency": 5, "importance": "A", "groupId": "G0074", "category": "関係法令（有害業務に係るもの）", "subcategory": "衛生基準", "question": "労働安全衛生規則の衛生基準について、誤っているものは次のうちどれか。", "choices": ["多量のドライアイスを取り扱う業務を行う屋内作業場については、半月以内ごとに1回、定期に、当該作業場における気温、湿度及びふく射熱を測定しなければならない。", "強烈な騒音を発する屋内作業場においては、その伝ぱを防ぐため、隔壁を設ける等必要な措置を講じなければならない。", "屋内作業場に多量の熱を放散する溶融炉があるときは、加熱された空気を直接屋外に排出し、又はその放射するふく射熱から労働者を保護する措置を講じなければならない。", "坑内における気温は、原則として、37℃以下にしなければならない。", "著しく暑熱又は多湿の作業場においては、坑内等特殊な作業場でやむを得ない事由がある場合を除き、休憩の設備を作業場外に設けなければならない。"], "answer": 1, "explanation": "(1)【正解】誤り。ドライアイスを取り扱う業務を行う屋内作業場で測定するのは「気温及び湿度」であり、ふく射熱は含まれない。安衛則第587条⑪、第607条第1項。\n(2)正しい。安衛則第584条。\n(3)正しい。安衛則第608条第1項。\n(4)正しい。安衛則第611条第1項。\n(5)正しい。安衛則第614条。\n【頻出】作業環境測定の測定項目の正誤は頻出テーマ。"},
  {"id": "Q001", "date": "2025年10月", "dateList": "2025年10月", "frequency": 1, "importance": "D", "groupId": "G0133", "category": "関係法令（有害業務に係るもの）", "subcategory": "衛生管理体制", "question": "常時400人の労働者を使用する製造業の事業場における衛生管理体制に関する(1)～(5)の記述のうち、法令上、誤っているものはどれか。\nただし、400人中には、屋内作業場において次の業務に常時従事する者が含まれているが、その他の有害業務はないものとし、衛生管理者及び産業医の選任の特例はないものとする。\n深夜業を含む業務……200人\n多量の高熱物体を取り扱う業務……50人\n塩素を試験研究のため取り扱う作業を行う業務……30人", "choices": ["総括安全衛生管理者を選任しなければならない。", "衛生管理者のうち少なくとも1人を専任の衛生管理者としなければならない。", "衛生管理者は、全て第一種衛生管理者免許を有する者のうちから選任することができる。", "産業医は、この事業場に専属でない者を選任することができる。", "特定化学物質作業主任者を選任しなくてよい。"], "answer": 2, "explanation": "(1)正しい。常時300人以上の労働者を使用する製造業の事業場に該当するため、総括安全衛生管理者の選任が必要。安衛法第10条第1項、安衛令第2条②。\n(2)【正解】誤り。専任の衛生管理者が必要なのは常時500人を超える労働者を使用し一定の有害業務がある事業場であり、本事業場は該当しない。安衛則第7条第1項⑤。\n(3)正しい。第一種衛生管理者免許を有する者のみで選任可能。安衛則第7条第1項③⑥。\n(4)正しい。専属の産業医が必要なのは常時1,000人以上又は一定の有害業務に500人以上従事の事業場。安衛則第13条第1項③。\n(5)正しい。塩素を試験研究のため取扱う作業は特定化学物質作業主任者の選任対象外。安衛令第6条⑱。\n【頻出】衛生管理体制の人数要件は頻出テーマ。"},
  {"id": "Q051", "date": "2025年4月", "dateList": "2025年4月", "frequency": 1, "importance": "D", "groupId": "G0134", "category": "関係法令（有害業務に係るもの）", "subcategory": "衛生管理体制", "question": "常時600人の労働者を使用する製造業の事業場における衛生管理体制に関する(1)～(5)の記述のうち、法令上、誤っているものはどれか。\nただし、600人中には、製造工程において次の業務に常時従事する者がそれぞれに示す人数含まれているが、試験研究の業務はなく、他の有害業務はないものとし、衛生管理者及び産業医の選任の特例はないものとする。\n深夜業を含む業務……300人\n多量の低温物体を取り扱う業務……100人\n特定化学物質のうち第三類物質を製造する業務……20人", "choices": ["衛生管理者は、3人以上選任しなければならない。", "衛生管理者のうち1人を、衛生工学衛生管理者免許を受けた者のうちから選任しなければならない。", "衛生管理者のうち少なくとも1人を、専任の衛生管理者としなければならない。", "産業医としての法定の要件を満たしている医師で、この事業場に専属でないものを産業医として選任することができる。", "特定化学物質作業主任者を選任しなければならない。"], "answer": 2, "explanation": "(1)正しい。500人超1,000人以下の事業場に該当し、3人以上の衛生管理者が必要。安衛則第7条第1項④。\n(2)【正解】誤り。多量の低温物体を取り扱う業務や第三類物質の製造業務は、衛生工学衛生管理者の選任要件に該当しない。安衛則第7条第1項⑥。\n(3)正しい。常時500人超で多量の低温物体を取り扱う業務に30人以上従事しているため、専任が必要。安衛則第7条第1項⑤ロ。\n(4)正しい。深夜業に常時500人以上従事させる事業場に該当しないため、専属でなくてよい。安衛則第13条第1項③。\n(5)正しい。第三類物質の製造業務は特定化学物質作業主任者の選任が必要。安衛令第6条第1項⑱。\n【頻出】衛生工学衛生管理者の選任要件と専任要件の判別は頻出。"},
  {"id": "Q101", "date": "2024年10月", "dateList": "2024年10月", "frequency": 1, "importance": "D", "groupId": "G0006", "category": "関係法令（有害業務に係るもの）", "subcategory": "衛生管理体制", "question": "ある製造業の事業場の労働者数、有害業務及び衛生管理者の選任の状況は、次の①～③のとおりである。この事業場の衛生管理者の選任についての法令違反の状況に関する（１）～（５）の記述のうち、正しいものはどれか。ただし、衛生管理者の選任の特例はないものとする。\n① 労働者数の状況：常時使用する労働者数は300人である。\n② 有害業務の状況：製造工程において著しく暑熱な場所における業務に常時40人従事しているが、他に有害業務はない。\n③ 衛生管理者の選任の状況：選任している衛生管理者数は２人である。このうち１人は、この事業場に専属でない労働衛生コンサルタントで、衛生工学衛生管理者免許を有していない。他の１人は、この事業場に専属で、衛生管理者としての業務以外の業務を兼任しており、また、第一種衛生管理者免許を有しているが、衛生工学衛生管理者免許を有していない。", "choices": ["選任している衛生管理者数が少ないことが違反である。", "衛生管理者として選任している労働衛生コンサルタントがこの事業場に専属でないことが違反である。", "衛生工学衛生管理者免許を受けた者のうちから選任した衛生管理者が１人もいないことが違反である。", "専任の衛生管理者が１人もいないことが違反である。", "本問における衛生管理者の選任の状況については、違反はない。"], "answer": 5, "explanation": "（1）誤り。「200人を超え500人以下」の事業場の規模に該当するため、衛生管理者2人の選任で違反ではない（安衛則第7条第1項④）。（2）誤り。2人以上の衛生管理者を選任する場合、労働衛生コンサルタントがいるときは1人については専属でなくともよい（安衛則第7条第1項②）。（3）誤り。有害業務に常時30人以上従事しているが、「常時500人を超える労働者を使用する事業場」に該当しないため違反ではない（安衛則第7条第1項⑥）。（4）誤り。同様に「常時500人を超える」に該当しないため違反ではない（安衛則第7条第1項⑤ロ）。（5）正しい。すべての要件を満たしており、違反はない。【頻出】衛生管理者の選任要件（人数・専属・専任・衛生工学）は頻出テーマ。"},
  {"id": "Q151", "date": "2024年4月", "dateList": "2024年4月", "frequency": 1, "importance": "D", "groupId": "G0136", "category": "関係法令（有害業務に係るもの）", "subcategory": "衛生管理体制", "question": "常時600人の労働者を使用する製造業の事業場における衛生管理体制に関する(１)～(５)の記述のうち、法令上、誤っているものはどれか。ただし、600人中には、製造工程において次の業務に常時従事する者がそれぞれに示す人数含まれているが、試験研究の業務はなく、他の有害業務はないものとし、衛生管理者及び産業医の選任の特例はないものとする。\n深夜業を含む業務……300人\n多量の低温物体を取り扱う業務……100人\n特定化学物質のうち第三類物質を製造する業務……20人", "choices": ["総括安全衛生管理者を選任しなければならない。", "衛生管理者のうち１人を、衛生工学衛生管理者免許を受けた者のうちから選任しなければならない。", "衛生管理者のうち少なくとも１人を、専任の衛生管理者としなければならない。", "産業医としての法定の要件を満たしている医師で、この事業場に専属でないものを産業医として選任することができる。", "特定化学物質作業主任者を選任しなければならない。"], "answer": 2, "explanation": "（1）正しい。300人以上の製造業に該当する（安衛令第2条）。（2）誤り。多量の低温物体を取り扱う業務100人、特定化学物質第三類物質を製造する業務20人は、衛生工学衛生管理者の選任要件に該当しない。衛生工学衛生管理者の選任が必要なのは、常時500人を超える労働者を使用する事業場で一定の有害業務に30人以上従事する場合である（安衛則第7条第1項⑥）。（3）正しい。多量の低温物体を取り扱う業務に100人が従事しており、専任の衛生管理者が必要（安衛則第7条第1項⑤ロ）。（4）正しい。深夜業に常時500人以上従事する事業場に該当しないため、専属でない産業医でよい（安衛則第13条第1項③）。（5）正しい。特定化学物質第三類物質の製造業務には作業主任者が必要（安衛令第6条⑱）。【頻出】衛生管理体制の総合問題は頻出。"},
  {"id": "Q201", "date": "2023年10月", "dateList": "2023年10月", "frequency": 1, "importance": "D", "groupId": "G0132", "category": "関係法令（有害業務に係るもの）", "subcategory": "衛生管理体制", "question": "常時400人の労働者を使用する製造業の事業場における衛生管理体制に関する(1)～(5)の記述のうち、法令上、誤っているものはどれか。ただし、400人中には、屋内作業場において次の業務に常時従事する者が含まれているが、その他の有害業務はないものとし、衛生管理者及び産業医の選任の特例はないものとする。\n深夜業を含む業務…200人\n多量の高熱物体を取り扱う業務…50人\n塩素を試験研究のため取り扱う作業を行う業務…30人", "choices": ["総括安全衛生管理者を選任しなければならない。", "衛生管理者のうち少なくとも1人を専任の衛生管理者としなければならない。", "衛生管理者は、全て第一種衛生管理者免許を有する者のうちから選任することができる。", "産業医は、この事業場に専属でない者を選任することができる。", "特定化学物質作業主任者を選任しなくてよい。"], "answer": 2, "explanation": "(2)誤り。専任の衛生管理者が必要なのは常時500人を超える労働者を使用し一定の有害業務がある事業場であり、本問の400人事業場は該当しない。安衛則第7条第1項⑤。(1)正しい：常時300人以上の製造業で総括安全衛生管理者の選任義務あり（安衛法第10条第1項、安衛令第2条②）。(3)正しい：製造業は第一種免許のみで可（安衛則第7条第1項③⑥）。(4)正しい：専属産業医の要件は1,000人以上又は有害業務500人以上で非該当（安衛則第13条第1項③）。(5)正しい：塩素の試験研究目的の取扱いは特化物作業主任者選任不要（安衛令第6条⑱）。"},
  {"id": "Q251", "date": "2023年4月", "dateList": "2023年4月", "frequency": 1, "importance": "D", "groupId": "G0007", "category": "関係法令（有害業務に係るもの）", "subcategory": "衛生管理体制", "question": "ある製造業の事業場の労働者数及び有害業務等従事状況並びに産業医及び衛生管理者の選任の状況は、次の①～③のとおりである。この事業場の産業医及び衛生管理者の選任についての法令違反の状況に関する(1)～(5)の記述のうち、正しいものはどれか。ただし、産業医及び衛生管理者の選任の特例はないものとする。\n①常時使用する労働者数は800人であり、このうち、深夜業を含む業務に400人が、強烈な騒音を発する場所における業務に30人が常時従事しているが、他に有害業務に従事している者はいない。\n②産業医は1人選任。この産業医は事業場に専属ではないが、要件を満たしている。\n③衛生管理者は3人選任。1人は事業場に専属でない労働衛生コンサルタント（衛生工学衛生管理者免許なし）。他の2人は事業場専属で兼任、第一種衛生管理者免許あり（衛生工学免許なし）。", "choices": ["選任している産業医がこの事業場に専属でないことが違反である。", "選任している衛生管理者数が少ないことが違反である。", "衛生管理者として選任している労働衛生コンサルタントがこの事業場に専属でないことが違反である。", "衛生工学衛生管理者免許を受けた者のうちから選任した衛生管理者が1人もいないことが違反である。", "専任の衛生管理者が1人もいないことが違反である。"], "answer": 5, "explanation": "(5)違反あり。常時800人の労働者を使用し、強烈な騒音を発する場所における業務に30人が従事しているため、少なくとも1人を専任の衛生管理者としなければならない。安衛則第7条第1項⑤ロ。(1)違反なし：深夜業500人未満で専属不要（安衛則第13条第1項③）。(2)違反なし：500人超1000人以下で3人は適正（安衛則第7条第1項④）。(3)違反なし：2人以上選任時、コンサルタント1人は非専属可（安衛則第7条第1項②）。(4)違反なし：騒音30人は衛生工学衛生管理者の選任要件非該当（安衛則第7条第1項⑥）。"},
  {"id": "Q301", "date": "2022年10月", "dateList": "2022年10月", "frequency": 1, "importance": "D", "groupId": "G0135", "category": "関係法令（有害業務に係るもの）", "subcategory": "衛生管理体制", "question": "常時600人の労働者を使用する製造業の事業場における衛生管理体制に関する(1)～(5)の記述のうち、法令上、誤っているものはどれか。ただし、600人中には、製造工程において次の業務に常時従事する者が含まれているが、試験研究の業務はなく、他の有害業務はないものとする。\n深夜業を含む業務…300人\n多量の低温物体を取り扱う業務…100人\n特定化学物質のうち第三類物質を製造する業務…20人", "choices": ["衛生管理者は、3人以上選任しなければならない。", "衛生管理者のうち1人を、衛生工学衛生管理者免許を受けた者のうちから選任しなければならない。", "衛生管理者のうち少なくとも1人を、専任の衛生管理者としなければならない。", "産業医としての法定の要件を満たしている医師で、この事業場に専属でないものを産業医として選任することができる。", "特定化学物質作業主任者を選任しなければならない。"], "answer": 2, "explanation": "(2)誤り。多量の低温物体を取り扱う業務100人・特化物第3類物質製造20人は、衛生工学衛生管理者の選任要件に規定されていない。安衛則第7条第1項⑥。(1)正しい：500人超1000人以下で3人以上（安衛則第7条第1項④）。(3)正しい：低温物体取扱い100人で専任要件該当（安衛則第7条第1項⑤ロ）。(4)正しい：専属産業医の要件非該当（安衛則第13条第1項③）。(5)正しい：安衛令第6条第1項⑱。"},
  {"id": "Q351", "date": "2022年4月", "dateList": "2022年4月", "frequency": 1, "importance": "D", "groupId": "G0238", "category": "関係法令（有害業務に係るもの）", "subcategory": "衛生管理体制", "question": "衛生管理者及び産業医の選任に関する次の記述のうち、法令上、誤っているものはどれか。ただし、衛生管理者及び産業医の選任の特例はないものとする。", "choices": ["常時60人の労働者を使用する医療業の事業場では、第一種衛生管理者免許若しくは衛生工学衛生管理者免許を有する者、医師、歯科医師又は労働衛生コンサルタントのうちから衛生管理者を選任することができる。", "２人以上の衛生管理者を選任すべき事業場では、そのうち１人については、その事業場に専属でない労働衛生コンサルタントのうちから選任することができる。", "深夜業を含む業務に常時550人の労働者を従事させる事業場では、その事業場に専属の産業医を選任しなければならない。", "常時600人の労働者を使用し、そのうち多量の低温物体を取り扱う業務に常時35人の労働者を従事させる事業場では、選任する衛生管理者のうち少なくとも１人を衛生工学衛生管理者免許を受けた者のうちから選任しなければならない。", "常時3,300人の労働者を使用する事業場では、２人以上の産業医を選任しなければならない。"], "answer": 4, "explanation": "（1）正しい：安衛則第7条第1項③、同第10条。（2）正しい：安衛則第7条第1項②。（3）正しい：深夜業を含む業務に500人以上従事させる事業場は専属の産業医が必要。安衛則第13条第1項③。（4）誤り：多量の低温物体を取り扱う業務に常時35人従事の場合、専任の衛生管理者の選任は必要だが、衛生工学衛生管理者の選任義務はない。安衛則第7条第1項⑤イ。（5）正しい：常時3,000人超の事業場は産業医2人以上。安衛則第13条第1項④。【頻出】衛生管理者・産業医の選任要件は毎回出題される最重要テーマ。"},
  {"id": "Q401", "date": "2021年10月", "dateList": "2021年10月", "frequency": 1, "importance": "D", "groupId": "G0237", "category": "関係法令（有害業務に係るもの）", "subcategory": "衛生管理体制", "question": "衛生管理者及び産業医の選任に関する次の記述のうち、法令上、定められていないものはどれか。ただし、衛生管理者及び産業医の選任の特例はないものとする。", "choices": ["常時500人を超える労働者を使用し、そのうち多量の高熱物体を取り扱う業務に常時30人以上の労働者を従事させる事業場では、選任する衛生管理者のうち少なくとも１人を専任の衛生管理者としなければならない。", "深夜業を含む業務に常時550人の労働者を従事させる事業場では、その事業場に専属の産業医を選任しなければならない。", "常時3,300人の労働者を使用する事業場では、２人以上の産業医を選任しなければならない。", "常時600人の労働者を使用し、そのうち多量の低温物体を取り扱う業務に常時35人の労働者を従事させる事業場では、選任する衛生管理者のうち少なくとも１人を衛生工学衛生管理者免許を受けた者のうちから選任しなければならない。", "２人以上の衛生管理者を選任すべき事業場では、そのうち１人については、その事業場に専属でない労働衛生コンサルタントのうちから選任することができる。"], "answer": 4, "explanation": "（1）定められている：安衛則第7条第1項⑤。（2）定められている：安衛則第13条第1項③。（3）定められている：安衛則第13条第1項④。（4）定められていない：衛生工学衛生管理者の選任が必要な業務に「多量の低温物体を取り扱う業務」は含まれない。安衛則第7条第1項⑥。（5）定められている：安衛則第7条第1項②。【頻出】衛生工学衛生管理者の選任要件の対象業務は頻出。"},
  {"id": "Q406", "date": "2021年10月", "dateList": "2021年10月、2021年4月", "frequency": 2, "importance": "C", "groupId": "G0041", "category": "関係法令（有害業務に係るもの）", "subcategory": "衛生管理体制", "question": "事業者が、法令に基づく次の措置を行ったとき、その結果について所轄労働基準監督署長に報告することが義務付けられているものはどれか。", "choices": ["雇入時の有機溶剤等健康診断", "定期に行う特定化学物質健康診断", "特定化学設備についての定期自主検査", "高圧室内作業主任者の選任", "鉛業務を行う屋内作業場についての作業環境測定"], "answer": 2, "explanation": "（1）義務付けられていない。（2）義務付けられている：定期の特定化学物質健康診断結果は所轄労働基準監督署長に報告が必要。特化則第41条。（3）（4）（5）義務付けられていない。【頻出】労基署への報告義務の有無は頻出。"},
  {"id": "Q451", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0131", "category": "関係法令（有害業務に係るもの）", "subcategory": "衛生管理体制", "question": "常時250人の労働者を使用する運送業の事業場における衛生管理体制に関する記述のうち、法令上、誤っているものはどれか。ただし、250人中には深夜業を含む業務200人、多量の低温物体を取り扱う業務50人が含まれ、その他の有害業務はなく、衛生管理者の選任の特例はないものとする。", "choices": ["総括安全衛生管理者を選任しなければならない。", "衛生管理者は、２人以上選任しなければならない。", "衛生管理者は、全て第一種衛生管理者免許を有する者のうちから選任することができる。", "衛生管理者のうち少なくとも１人を専任の衛生管理者としなければならない。", "衛生管理者のうち、１人は専属でない労働衛生コンサルタントを選任することができる。"], "answer": 4, "explanation": "（1）正しい：運送業で100人以上は総括安全衛生管理者が必要。安衛令第2条第1項①。（2）正しい：200人超500人以下で2人以上。安衛則第7条第1項④。（3）正しい：運送業は第1種で選任可。安衛則第7条第1項③。（4）誤り：専任の衛生管理者は常時500人超かつ有害業務30人以上が要件。250人では該当しない。安衛則第7条第1項⑤。（5）正しい：安衛則第7条第1項②。【頻出】専任の衛生管理者の要件（500人超）は頻出。"},
  {"id": "Q003", "date": "2025年10月", "dateList": "2022年10月、2022年4月、2025年10月", "frequency": 3, "importance": "B", "groupId": "G0097", "category": "関係法令（有害業務に係るもの）", "subcategory": "規格具備義務", "question": "厚生労働大臣が定める規格を具備しなければ、譲渡し、貸与し、又は設置してはならない機械等に該当するものは、次のうちどれか。", "choices": ["騒音計", "放射線測定器", "検知管方式による一酸化炭素検定器", "アンモニア用防毒マスク", "化学防護服"], "answer": 4, "explanation": "(1)(2)(3)(5)該当しない。\n(4)【正解】該当する。防毒マスクは厚生労働大臣が定める規格を具備しなければならない機械等に含まれる。安衛法第42条、別表第2⑨。\n【頻出】譲渡等の制限対象機械の判別は定番。"},
  {"id": "Q053", "date": "2025年4月", "dateList": "2021年4月、2024年10月、2024年4月、2025年4月", "frequency": 4, "importance": "B", "groupId": "G0096", "category": "関係法令（有害業務に係るもの）", "subcategory": "規格具備義務", "question": "厚生労働大臣が定める規格を具備しなければ、譲渡し、貸与し、又は設置してはならない機械等に該当しないものは、次のうちどれか。", "choices": ["潜水器", "一酸化炭素用防毒マスク", "ろ過材及び面体を有する防じんマスク", "放射性物質による汚染を防止するための防護服", "排気量40cm³以上の内燃機関を内蔵するチェーンソー"], "answer": 4, "explanation": "(1)～(3)(5)該当する。\n(4)【正解】該当しない。防護服は厚生労働大臣が定める規格を具備すべき機械等に含まれない。安衛法第42条、安衛令第13条。\n【頻出】譲渡等の制限対象の判別は頻出。"},
  {"id": "Q405", "date": "2021年10月", "dateList": "2021年10月", "frequency": 1, "importance": "D", "groupId": "G0186", "category": "関係法令（有害業務に係るもの）", "subcategory": "規格具備義務", "question": "次のＡからＤの機械等について、法令上、厚生労働大臣が定める規格を具備しなければ、譲渡し、貸与し、又は設置してはならないものの組合せは(１)～(５)のうちどれか。Ａ 放射線測定器　Ｂ 防音保護具　Ｃ ハロゲンガス用防毒マスク　Ｄ 電動ファン付き呼吸用保護具", "choices": ["Ａ，Ｂ", "Ａ，Ｃ", "Ａ，Ｄ", "Ｂ，Ｄ", "Ｃ，Ｄ"], "answer": 5, "explanation": "Ａ：該当しない。Ｂ：該当しない。Ｃ：該当する。安衛法第42条別表第2⑨、安衛令第13条第5項。Ｄ：該当する。安衛法第42条別表第2⑯。よってＣとＤ。【頻出】譲渡制限の対象機械等の識別は頻出。"},
  {"id": "Q007", "date": "2025年10月", "dateList": "2023年4月、2024年10月、2024年4月、2025年10月、2025年4月", "frequency": 5, "importance": "A", "groupId": "G0249", "category": "関係法令（有害業務に係るもの）", "subcategory": "酸素欠乏症等防止規則", "question": "酸素欠乏症等防止規則に関する次の記述のうち、誤っているものはどれか。", "choices": ["し尿を入れたことのあるポンプを修理する場合で、これを分解する作業に労働者を従事させるときは、指揮者を選任し、作業を指揮させなければならない。", "パルプ液を入れたことのある槽の内部における作業については、酸素欠乏危険作業主任者技能講習を修了した者のうちから、酸素欠乏危険作業主任者を選任しなければならない。", "硫化水素中毒とは、硫化水素の濃度が10ppmを超える空気を吸入することにより生ずる症状が認められる状態をいう。", "タンクの内部その他通風が不十分な場所において、アルゴン等を使用して行う溶接の作業に労働者を従事させるときは、作業を行う場所の空気中の酸素の濃度を18％以上に保つように換気し、又は労働者に空気呼吸器、酸素呼吸器若しくは送気マスクを使用させなければならない。", "第一種酸素欠乏危険作業を行う作業場については、その日の作業を開始する前に、当該作業場における空気中の酸素の濃度を測定しなければならない。"], "answer": 2, "explanation": "(1)正しい。酸欠則第25条の2。\n(2)【正解】誤り。パルプ液を入れたことのある槽の内部における作業は第2種酸素欠乏危険作業に該当するため、「酸素欠乏・硫化水素危険作業主任者技能講習」を修了した者から選任しなければならない。安衛令別表第6③の3、酸欠則第11条第1項。\n(3)正しい。酸欠則第2条。\n(4)正しい。酸欠則第21条第1項①②。\n(5)正しい。酸欠則第3条第1項。\n【頻出】第1種・第2種酸素欠乏危険作業の区別は頻出。"},
  {"id": "Q308", "date": "2022年10月", "dateList": "2022年10月", "frequency": 1, "importance": "D", "groupId": "G0250", "category": "関係法令（有害業務に係るもの）", "subcategory": "酸素欠乏症等防止規則", "question": "酸素欠乏症等防止規則等に基づく措置に関する次の記述のうち、誤っているものはどれか。", "choices": ["汚水を入れたことのあるポンプを修理する場合で、これを分解する作業に労働者を従事させるときは、硫化水素中毒の防止について必要な知識を有する者のうちから指揮者を選任し、作業を指揮させなければならない。", "酒類を入れたことのある醸造槽の内部における清掃作業の業務に労働者を就かせるときは、酸素欠乏危険作業に係る特別の教育を行わなければならない。", "酸素欠乏危険作業を行う場所において、爆発、酸化等を防止するため換気を行うことができない場合には、送気マスク又は防毒マスクを備え、労働者に使用させなければならない。", "酸素欠乏危険作業に労働者を従事させるときは、常時作業の状況を監視し、異常があったときに直ちに酸素欠乏危険作業主任者及びその他の関係者に通報する者を置く等異常を早期に把握するために必要な措置を講じなければならない。", "第一鉄塩類を含有している地層に接する地下室の内部における作業に労働者を従事させるときは、酸素欠乏の空気が漏出するおそれのある箇所を閉そくし、酸素欠乏の空気を直接外部へ放出することができる設備を設ける等酸素欠乏の空気の流入を防止するための措置を講じなければならない。"], "answer": 3, "explanation": "(3)誤り。酸素欠乏危険作業では「防毒マスク」は使用不可。正しくは「空気呼吸器等（空気呼吸器、酸素呼吸器又は送気マスク）」を備えなければならない。酸欠則第5条の2。(1)正しい：酸欠則第25条の2。(2)正しい：酸欠則第12条。(4)正しい：酸欠則第13条。(5)正しい：酸欠則第25条。"},
  {"id": "Q458", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0167", "category": "関係法令（有害業務に係るもの）", "subcategory": "酸素欠乏症等防止規則", "question": "次の作業のうち、法令上、第二種酸素欠乏危険作業に該当するものはどれか。", "choices": ["雨水が滞留したことのあるピットの内部における作業", "ヘリウム、アルゴン等の不活性の気体を入れたことのあるタンクの内部における作業", "果菜の熟成のために使用している倉庫の内部における作業", "酒類を入れたことのある醸造槽の内部における作業", "汚水その他腐敗しやすい物質を入れたことのある暗きょの内部における作業"], "answer": 5, "explanation": "（1）～（4）該当しない。（5）該当する：汚水等腐敗しやすい物質を入れたことのある暗きょは、酸素欠乏と硫化水素の両方の危険があり第二種酸素欠乏危険作業に該当。安衛令第6条別表第6⑨。【頻出】第二種酸素欠乏危険作業の識別は頻出。"},

// 科目設定
// ═══════════════════════════════════════════════════════
const SUBJECTS = {
  "関係法令（有害業務に係るもの）":         { label:"関係法令（有害）", count:10, points:8,  cutoff:32 },
  "関係法令（有害業務に係るもの以外のもの）": { label:"関係法令（一般）", count:7,  points:10, cutoff:28 },
  "労働衛生（有害業務に係るもの）":         { label:"労働衛生（有害）", count:10, points:8,  cutoff:32 },
  "労働衛生（有害業務に係るもの以外のもの）": { label:"労働衛生（一般）", count:7,  points:10, cutoff:28 },
  "労働生理":                               { label:"労働生理",         count:10, points:10, cutoff:40 }
};

// ═══════════════════════════════════════════════════════
// state & localStorage
// ═══════════════════════════════════════════════════════
let history = JSON.parse(localStorage.getItem('eisei_history') || '{}');
// history[id] = { correct: bool, attempts: n }
let wrongSet = JSON.parse(localStorage.getItem('eisei_wrong') || '[]');
wrongSet = new Set(wrongSet);
let autoRemove = localStorage.getItem('eisei_autoremove') !== 'false';

function saveHistory() {
  localStorage.setItem('eisei_history', JSON.stringify(history));
  localStorage.setItem('eisei_wrong', JSON.stringify([...wrongSet]));
}

// ═══════════════════════════════════════════════════════
// session state
// ═══════════════════════════════════════════════════════
let session = { queue: [], idx: 0, answered: false, mode: 'practice' };

// ═══════════════════════════════════════════════════════
// 頻出度バッジ
// ═══════════════════════════════════════════════════════
function importanceBadge(q) {
  const map = {
    S: { icon: "🔥", text: `S × ${q.frequency}回` },
    A: { icon: "⭐", text: `A × ${q.frequency}回` },
    B: { icon: "📌", text: `B × ${q.frequency}回` },
    C: { icon: "",   text: `C × ${q.frequency}回` },
    D: { icon: "",   text: "D" }
  };
  const info = map[q.importance] || map.D;
  const cls = `imp-badge imp-${q.importance.toLowerCase()}`;
  return `<span class="${cls}" title="出題: ${q.dateList}">${info.icon}${info.icon ? ' ' : ''}${info.text}</span>`;
}

// ═══════════════════════════════════════════════════════
// ナビ
// ═══════════════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'review') renderReview();
  if (name === 'stats') renderStats();
  if (name === 'list') renderList();
}

// ═══════════════════════════════════════════════════════
// フィルター初期化
// ═══════════════════════════════════════════════════════
(function initFilters() {
  // 年度
  const years = [...new Set(QUESTIONS.map(q => q.date.replace(/年\d+月/, '年')))].sort();
  const ysel = document.getElementById('filter-year');
  years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; ysel.appendChild(o); });

  document.getElementById('filter-subject').addEventListener('change', updateSubcatFilter);
  document.getElementById('filter-subject').addEventListener('change', restartSession);
  document.getElementById('filter-subcat').addEventListener('change', restartSession);
  document.getElementById('filter-year').addEventListener('change', restartSession);
  document.getElementById('filter-count').addEventListener('change', restartSession);
  document.querySelectorAll('.imp-check input').forEach(cb => {
    cb.addEventListener('change', restartSession);
  });
  document.getElementById('filter-order').addEventListener('change', restartSession);
})();

function updateSubcatFilter() {
  const subject = document.getElementById('filter-subject').value;
  const subcat = document.getElementById('filter-subcat');
  const prev = subcat.value;
  subcat.innerHTML = '<option value="">すべて</option>';
  const cats = [...new Set(QUESTIONS
    .filter(q => !subject || q.category === subject)
    .map(q => q.subcategory))].sort();
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    subcat.appendChild(o);
  });
  if (cats.includes(prev)) subcat.value = prev;
}

function getFilteredQuestions() {
  const subj = document.getElementById('filter-subject').value;
  const sub  = document.getElementById('filter-subcat').value;
  const yr   = document.getElementById('filter-year').value;
  const checkedImps = [...document.querySelectorAll('.imp-check input:checked')].map(cb => cb.value);
  return QUESTIONS.filter(q => {
    if (subj && q.category !== subj) return false;
    if (sub  && q.subcategory !== sub) return false;
    if (yr   && !q.date.startsWith(yr.replace('年',''))) return false;
    if (!checkedImps.includes(q.importance)) return false;
    return true;
  });
}

// ═══════════════════════════════════════════════════════
// セッション
// ═══════════════════════════════════════════════════════
function restartSession() {
  session.mode = 'practice';
  let qs = getFilteredQuestions();
  const countVal = document.getElementById('filter-count').value;
  const order = document.getElementById('filter-order').value;
  const limit = countVal ? parseInt(countVal) : Infinity;
  if (order === 'freq-desc') {
    qs = qs.sort((a, b) => b.frequency - a.frequency || Math.random() - 0.5);
  } else if (order === 'freq-asc') {
    qs = qs.sort((a, b) => a.frequency - b.frequency || Math.random() - 0.5);
  } else {
    qs = qs.sort(() => Math.random() - 0.5);
  }
  session.queue = qs.slice(0, limit);
  session.idx = 0;
  session.answered = false;
  session.sessionCorrect = 0;
  document.getElementById('session-result').style.display = 'none';
  if (session.queue.length === 0) {
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('empty-state').style.display = 'block';
    updateProgress();
  } else {
    document.getElementById('quiz-area').style.display = 'block';
    document.getElementById('empty-state').style.display = 'none';
    renderQuestion();
  }
}

function renderQuestion() {
  const q = session.queue[session.idx];
  if (!q) { showFinished(); return; }

  session.answered = false;
  document.getElementById('q-meta').innerHTML =
    importanceBadge(q) +
    `<span class="meta-tag">${q.id}</span>` +
    `<span class="meta-tag">${q.date}</span>` +
    `<span class="meta-tag">${SUBJECTS[q.category]?.label || q.category}</span>` +
    `<span class="meta-tag">${q.subcategory}</span>`;
  document.getElementById('q-text').textContent = q.question;

  const choices = document.getElementById('choices');
  choices.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-num">${i+1}</span><span>${c}</span>`;
    btn.onclick = () => selectChoice(i+1, btn);
    choices.appendChild(btn);
  });

  document.getElementById('result-msg').style.display = 'none';
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('restart-btn').style.display = 'none';
  updateProgress();
}

function selectChoice(num, btn) {
  if (session.answered) return;
  session.answered = true;
  const q = session.queue[session.idx];
  const correct = num === q.answer;

  // 選択肢を全部disable
  document.querySelectorAll('.choice-btn').forEach((b, i) => {
    b.disabled = true;
    if (i+1 === q.answer) b.classList.add('correct');
  });
  if (!correct) btn.classList.add('wrong');

  // 結果メッセージ
  const msg = document.getElementById('result-msg');
  msg.style.display = 'block';
  if (correct) {
    msg.className = 'result-msg correct';
    msg.textContent = '✓ 正解！';
    if (!history[q.id]) history[q.id] = { correct: 0, wrong: 0 };
    history[q.id].correct++;
    if (autoRemove && wrongSet.has(q.id)) { wrongSet.delete(q.id); }
    session.sessionCorrect = (session.sessionCorrect || 0) + 1;
  } else {
    msg.className = 'result-msg wrong';
    msg.textContent = `✗ 不正解。正解は ${q.answer} 番です。`;
    if (!history[q.id]) history[q.id] = { correct: 0, wrong: 0 };
    history[q.id].wrong++;
    wrongSet.add(q.id);
  }

  // 解説
  const exp = document.getElementById('explanation');
  exp.style.display = 'block';
  exp.textContent = q.explanation;

  saveHistory();
  updateBadge();

  const total = session.queue.length;
  const isLast = session.idx >= total - 1;
  document.getElementById('next-btn').style.display = isLast ? 'none' : 'block';
  document.getElementById('restart-btn').style.display = isLast ? 'block' : 'none';
}

function nextQuestion() {
  session.idx++;
  renderQuestion();
}

function showFinished() {
  const total = session.queue.length;
  const correct = session.sessionCorrect || 0;
  const wrong = total - correct;
  const pct = total ? Math.round(correct / total * 100) : 0;
  const color = pct >= 60 ? '#16a34a' : pct >= 40 ? '#d97706' : '#dc2626';

  document.getElementById('q-meta').innerHTML = '';
  document.getElementById('q-text').textContent = '';
  document.getElementById('choices').innerHTML = '';
  document.getElementById('result-msg').style.display = 'none';
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  const resultEl = document.getElementById('session-result');
  resultEl.style.display = 'block';
  resultEl.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;text-align:center">
      <div style="font-size:14px;color:var(--text2);margin-bottom:8px">セッション終了</div>
      <div style="font-size:52px;font-weight:700;color:${color};line-height:1">${pct}<span style="font-size:24px">%</span></div>
      <div style="font-size:14px;color:var(--text2);margin:8px 0 20px">${total}問中 <b style="color:var(--text)">${correct}問</b> 正解（${wrong}問不正解）</div>
      <div style="display:flex;justify-content:center;gap:24px">
        <div style="text-align:center">
          <div style="width:48px;height:48px;border-radius:50%;background:#dcfce7;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;font-size:20px;font-weight:700;color:#16a34a">${correct}</div>
          <div style="font-size:11px;color:var(--text2)">正解</div>
        </div>
        <div style="text-align:center">
          <div style="width:48px;height:48px;border-radius:50%;background:#fee2e2;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;font-size:20px;font-weight:700;color:#dc2626">${wrong}</div>
          <div style="font-size:11px;color:var(--text2)">不正解</div>
        </div>
      </div>
    </div>`;

  document.getElementById('restart-btn').style.display = 'block';
}

function updateProgress() {
  const total = session.queue.length;
  const cur = session.idx + 1;
  const pct = total ? Math.round((session.idx / total) * 100) : 0;
  document.getElementById('progress-text').textContent = total ? `${cur} / ${total}` : '0 / 0';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ═══════════════════════════════════════════════════════
// 苦手バッジ
// ═══════════════════════════════════════════════════════
function updateBadge() {
  const badge = document.getElementById('review-badge');
  const n = wrongSet.size;
  badge.style.display = n > 0 ? 'block' : 'none';
  badge.textContent = n;
}

// ═══════════════════════════════════════════════════════
// 苦手復習ページ
// ═══════════════════════════════════════════════════════
function toggleAutoRemove() {
  autoRemove = !autoRemove;
  const t = document.getElementById('auto-remove-toggle');
  t.classList.toggle('on', autoRemove);
  localStorage.setItem('eisei_autoremove', autoRemove);
}

function renderReview() {
  const area = document.getElementById('review-area');
  const tog = document.getElementById('auto-remove-toggle');
  tog.classList.toggle('on', autoRemove);

  if (wrongSet.size === 0) {
    area.innerHTML = '<div class="empty-state">苦手問題はありません。<br>引き続き練習を続けましょう！</div>';
    return;
  }

  const qs = QUESTIONS.filter(q => wrongSet.has(q.id)).sort(() => Math.random() - 0.5);
  session.mode = 'review';
  session.queue = qs;
  session.idx = 0;
  session.answered = false;

  // reviewページは練習ページと同じUIを再利用
  area.innerHTML = `
    <div class="progress-bar-wrap">
      <div class="progress-info">
        <span id="review-progress-text">1 / ${qs.length}</span>
        <span>苦手：${qs.length}問</span>
      </div>
      <div class="progress-bar"><div class="progress-bar-fill" id="review-fill" style="width:0%"></div></div>
    </div>
    <div class="question-card">
      <div class="question-meta" id="rv-meta"></div>
      <div class="question-text" id="rv-text"></div>
    </div>
    <div class="choices" id="rv-choices"></div>
    <div class="result-msg" id="rv-result"></div>
    <div class="explanation" id="rv-exp"></div>
    <button class="btn" id="rv-next" style="display:none" onclick="reviewNext()">次の問題へ</button>
    <button class="btn btn-secondary" id="rv-done" style="display:none" onclick="renderReview()">復習を最初から</button>
  `;
  renderReviewQuestion();
}

function renderReviewQuestion() {
  const q = session.queue[session.idx];
  if (!q) {
    document.getElementById('rv-text').textContent = '復習完了！引き続き練習を続けましょう。';
    document.getElementById('rv-meta').innerHTML = '';
    document.getElementById('rv-choices').innerHTML = '';
    document.getElementById('rv-next').style.display = 'none';
    document.getElementById('rv-done').style.display = 'block';
    return;
  }
  const total = session.queue.length;
  const pct = Math.round((session.idx / total) * 100);
  document.getElementById('review-progress-text').textContent = `${session.idx+1} / ${total}`;
  document.getElementById('review-fill').style.width = pct + '%';

  document.getElementById('rv-meta').innerHTML =
    importanceBadge(q) +
    `<span class="meta-tag">${q.id}</span>` +
    `<span class="meta-tag">${q.date}</span>` +
    `<span class="meta-tag">${SUBJECTS[q.category]?.label || q.category}</span>` +
    `<span class="meta-tag">${q.subcategory}</span>`;
  document.getElementById('rv-text').textContent = q.question;

  const choices = document.getElementById('rv-choices');
  choices.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-num">${i+1}</span><span>${c}</span>`;
    btn.onclick = () => reviewSelect(i+1, btn);
    choices.appendChild(btn);
  });

  document.getElementById('rv-result').style.display = 'none';
  document.getElementById('rv-exp').style.display = 'none';
  document.getElementById('rv-next').style.display = 'none';
  document.getElementById('rv-done').style.display = 'none';
  session.answered = false;
}

function reviewSelect(num, btn) {
  if (session.answered) return;
  session.answered = true;
  const q = session.queue[session.idx];
  const correct = num === q.answer;

  document.querySelectorAll('#rv-choices .choice-btn').forEach((b, i) => {
    b.disabled = true;
    if (i+1 === q.answer) b.classList.add('correct');
  });
  if (!correct) btn.classList.add('wrong');

  const msg = document.getElementById('rv-result');
  msg.style.display = 'block';
  if (correct) {
    msg.className = 'result-msg correct';
    msg.textContent = '✓ 正解！';
    if (!history[q.id]) history[q.id] = { correct: 0, wrong: 0 };
    history[q.id].correct++;
    if (autoRemove) { wrongSet.delete(q.id); }
  } else {
    msg.className = 'result-msg wrong';
    msg.textContent = `✗ 不正解。正解は ${q.answer} 番です。`;
    if (!history[q.id]) history[q.id] = { correct: 0, wrong: 0 };
    history[q.id].wrong++;
  }

  document.getElementById('rv-exp').style.display = 'block';
  document.getElementById('rv-exp').textContent = q.explanation;

  saveHistory();
  updateBadge();

  const isLast = session.idx >= session.queue.length - 1;
  document.getElementById('rv-next').style.display = isLast ? 'none' : 'block';
  document.getElementById('rv-done').style.display = isLast ? 'block' : 'none';
}

function reviewNext() {
  session.idx++;
  renderReviewQuestion();
}

// ═══════════════════════════════════════════════════════
// 進捗ページ
// ═══════════════════════════════════════════════════════
let chartInstance = null;

function renderStats() {
  const area = document.getElementById('stats-area');

  // 科目別集計
  const subjectStats = {};
  Object.keys(SUBJECTS).forEach(s => { subjectStats[s] = { correct:0, wrong:0, total:0 }; });

  QUESTIONS.forEach(q => {
    const h = history[q.id];
    const s = subjectStats[q.category];
    if (!s) return;
    s.total++;
    if (h) { s.correct += h.correct; s.wrong += h.wrong; }
  });

  // 全体集計
  let totalCorrect = 0, totalAttempts = 0, totalScore = 0, totalMax = 0;
  let allPass = true;
  Object.entries(subjectStats).forEach(([s, v]) => {
    const info = SUBJECTS[s];
    totalCorrect += v.correct;
    totalAttempts += v.correct + v.wrong;
    // 得点（直近の正答数ベース）
    const attempted = Math.min(v.correct + v.wrong, info.count);
    const correctRate = attempted > 0 ? v.correct / (v.correct + v.wrong) : 0;
    const estCorrect = Math.round(correctRate * info.count);
    const score = estCorrect * info.points;
    totalScore += score;
    totalMax += info.count * info.points;
    if (score < info.cutoff) allPass = false;
  });
  const overallRate = totalAttempts > 0 ? Math.round(totalCorrect / totalAttempts * 100) : 0;
  const answeredIDs = new Set(Object.keys(history));
  const answered = QUESTIONS.filter(q => answeredIDs.has(q.id)).length;

  // 中分類別
  const subcatStats = {};
  QUESTIONS.forEach(q => {
    if (!subcatStats[q.subcategory]) subcatStats[q.subcategory] = { correct:0, total:0 };
    const h = history[q.id];
    subcatStats[q.subcategory].total++;
    if (h && h.correct > 0) subcatStats[q.subcategory].correct++;
  });

  const isPass = totalScore >= 240 && allPass;

  area.innerHTML = `
    <div class="stat-cards">
      <div class="stat-card">
        <div class="label">解答済み</div>
        <div class="value">${answered}</div>
        <div class="sub">/ ${QUESTIONS.length} 問</div>
      </div>
      <div class="stat-card">
        <div class="label">正答率（全体）</div>
        <div class="value">${overallRate}<span style="font-size:14px">%</span></div>
        <div class="sub">${totalCorrect} / ${totalAttempts} 回答</div>
      </div>
      <div class="stat-card">
        <div class="label">推定得点</div>
        <div class="value">${totalScore}<span style="font-size:14px">点</span></div>
        <div class="sub">満点 ${totalMax}点</div>
      </div>
      <div class="stat-card">
        <div class="label">苦手問題</div>
        <div class="value" style="color:var(--badge)">${wrongSet.size}</div>
        <div class="sub">問</div>
      </div>
    </div>
    <div class="verdict ${isPass && totalAttempts > 0 ? 'pass' : 'fail'}">${totalAttempts === 0 ? '── まだ練習していません ──' : isPass ? '合格圏！（推定）' : '要継続学習'}</div>
    <div class="chart-card">
      <div class="chart-title">科目別 正答率</div>
      <div class="chart-wrap"><canvas id="subject-chart"></canvas></div>
    </div>
    <div class="section-title">重要度ランク別 正答率</div>
    <div id="imp-rank-list" class="subcat-list"></div>
    <div id="imp-warn"></div>
    <div class="section-title">中分類別 正答率</div>
    <div class="subcat-list" id="subcat-list"></div>
    <button class="btn btn-secondary" style="margin-top:8px;margin-bottom:24px" onclick="if(confirm('学習履歴をリセットしますか？'))resetHistory()">学習履歴をリセット</button>
  `;

  // グラフ
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const labels = Object.values(SUBJECTS).map(s => s.label.replace('（', '\n（'));
  const rates = Object.entries(subjectStats).map(([s, v]) => {
    const tot = v.correct + v.wrong;
    return tot > 0 ? Math.round(v.correct / tot * 100) : 0;
  });
  const cutoffs = Object.values(SUBJECTS).map(s => 40); // 40%足切り

  const ctx = document.getElementById('subject-chart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.values(SUBJECTS).map(s => s.label),
      datasets: [
        {
          label: '正答率 (%)',
          data: rates,
          backgroundColor: rates.map(r => r >= 40 ? 'rgba(37,99,235,0.7)' : 'rgba(239,68,68,0.65)'),
          borderColor: rates.map(r => r >= 40 ? '#2563eb' : '#ef4444'),
          borderWidth: 1,
          borderRadius: 4,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        annotation: {},
        tooltip: { callbacks: { label: ctx => ctx.parsed.y + '%' } }
      },
      scales: {
        y: {
          min: 0, max: 100,
          ticks: { color: '#5a6e80', callback: v => v + '%' },
          grid: { color: '#dde3ea' }
        },
        x: { ticks: { color: '#5a6e80', font: { size: 11 } }, grid: { display: false } }
      }
    },
    plugins: [{
      id: 'cutoff',
      afterDraw(chart) {
        const { ctx, chartArea: { left, right }, scales: { y } } = chart;
        const yPos = y.getPixelForValue(40);
        ctx.save();
        ctx.strokeStyle = '#e76f51';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(left, yPos);
        ctx.lineTo(right, yPos);
        ctx.stroke();
        ctx.fillStyle = '#e76f51';
        ctx.font = '10px sans-serif';
        ctx.fillText('足切り40%', right - 56, yPos - 4);
        ctx.restore();
      }
    }]
  });

  // 重要度ランク別集計
  const IMP_COLORS = { S:'var(--imp-s)', A:'var(--imp-a)', B:'var(--imp-b)', C:'var(--imp-c)', D:'var(--imp-d)' };
  const impStats = { S:{correct:0,total:0}, A:{correct:0,total:0}, B:{correct:0,total:0}, C:{correct:0,total:0}, D:{correct:0,total:0} };
  QUESTIONS.forEach(q => {
    const s = impStats[q.importance];
    if (!s) return;
    s.total++;
    const h = history[q.id];
    if (h && (h.correct + h.wrong) > 0) {
      if (h.correct > h.wrong) s.correct++;
    }
  });
  const impList = document.getElementById('imp-rank-list');
  Object.entries(impStats).forEach(([rank, v]) => {
    const pct = v.total > 0 ? Math.round(v.correct / v.total * 100) : 0;
    const row = document.createElement('div');
    row.className = 'subcat-row';
    row.innerHTML = `
      <span class="subcat-name" style="font-weight:700">${rank}（${v.total}問）</span>
      <div class="subcat-bar-wrap">
        <div class="subcat-bar" style="width:${pct}%;background:${IMP_COLORS[rank]}"></div>
      </div>
      <span class="subcat-pct">${pct}%</span>
    `;
    impList.appendChild(row);
  });
  const saRate = impStats.S.total + impStats.A.total > 0
    ? (impStats.S.correct + impStats.A.correct) / (impStats.S.total + impStats.A.total) * 100 : 100;
  const warnEl = document.getElementById('imp-warn');
  warnEl.innerHTML = saRate < 60
    ? `<div style="background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;padding:12px;font-size:14px;color:#92400e;margin-top:12px">⚠️ 頻出問題（S/Aランク）の正答率が低めです。「頻出順」モードで重点的に復習しましょう。</div>`
    : '';

  // 中分類リスト
  const list = document.getElementById('subcat-list');
  Object.entries(subcatStats)
    .sort((a, b) => {
      const ra = a[1].total > 0 ? a[1].correct / a[1].total : 0;
      const rb = b[1].total > 0 ? b[1].correct / b[1].total : 0;
      return ra - rb;
    })
    .forEach(([name, v]) => {
      const pct = v.total > 0 ? Math.round(v.correct / v.total * 100) : 0;
      const color = pct >= 60 ? '#2563eb' : pct >= 40 ? '#d97706' : '#ef4444';
      const row = document.createElement('div');
      row.className = 'subcat-row';
      row.innerHTML = `
        <span class="subcat-name">${name}</span>
        <div class="subcat-bar-wrap">
          <div class="subcat-bar" style="width:${pct}%;background:${color}"></div>
        </div>
        <span class="subcat-pct">${pct}%</span>
      `;
      list.appendChild(row);
    });
}

// ═══════════════════════════════════════════════════════
// 問題一覧
// ═══════════════════════════════════════════════════════
function renderList() {
  const subjVal = document.getElementById('list-filter-subject').value;
  const checkedImps = [...document.querySelectorAll('#list-imp-group input:checked')].map(cb => cb.value);
  const sort = document.getElementById('list-sort').value;
  const IMP_ORDER = { S:0, A:1, B:2, C:3, D:4 };

  let qs = QUESTIONS.filter(q => {
    if (subjVal && q.category !== subjVal) return false;
    if (!checkedImps.includes(q.importance)) return false;
    return true;
  });

  if (sort === 'importance') {
    qs = qs.sort((a, b) => IMP_ORDER[a.importance] - IMP_ORDER[b.importance] || a.category.localeCompare(b.category, 'ja'));
  } else if (sort === 'subject') {
    qs = qs.sort((a, b) => a.category.localeCompare(b.category, 'ja') || a.subcategory.localeCompare(b.subcategory, 'ja') || b.frequency - a.frequency);
  } else {
    qs = qs.sort((a, b) => a.subcategory.localeCompare(b.subcategory, 'ja'));
  }

  const area = document.getElementById('list-area');
  area.innerHTML = qs.length === 0
    ? '<div class="empty-state">該当する問題が見つかりませんでした。</div>'
    : '';

  qs.forEach(q => {
    const subLabel = SUBJECTS[q.category]?.label || q.category;
    const preview = q.question.length > 40 ? q.question.slice(0, 40) + '…' : q.question;

    const item = document.createElement('div');
    item.className = 'list-item';
    item.innerHTML = `
      <div class="list-item-header">
        ${importanceBadge(q)}
        <span class="meta-tag" style="font-size:11px">${q.id}</span>
        <span class="meta-tag" style="font-size:11px">${subLabel}</span>
        <span class="meta-tag" style="font-size:11px">${q.subcategory}</span>
        <span style="margin-left:auto;font-size:11px;color:var(--text2)">${q.frequency}回出題</span>
      </div>
      <div class="list-item-question">${preview}</div>
      <div class="list-detail" id="detail-${q.id}">
        <div style="font-size:15px;line-height:1.8;font-weight:500;margin-bottom:10px">${q.question}</div>
        <div class="list-detail-choices">
          ${q.choices.map((c, i) => `<div class="list-detail-choice${i+1 === q.answer ? ' is-answer' : ''}"><span style="font-weight:700;margin-right:6px">${i+1}.</span>${c}${i+1 === q.answer ? ' ✓' : ''}</div>`).join('')}
        </div>
        <div style="background:var(--bg3);border-left:3px solid var(--primary);border-radius:0 6px 6px 0;padding:12px;font-size:13px;line-height:1.8;color:var(--text2)">${q.explanation}</div>
      </div>
    `;
    item.addEventListener('click', () => {
      const detail = document.getElementById('detail-' + q.id);
      detail.classList.toggle('open');
    });
    area.appendChild(item);
  });
}

// 一覧フィルターのイベント登録（DOMContentLoaded後に実行済みのinitFilters内から独立）
(function initListFilters() {
  document.getElementById('list-filter-subject').addEventListener('change', renderList);
  document.getElementById('list-sort').addEventListener('change', renderList);
  document.querySelectorAll('#list-imp-group input').forEach(cb => cb.addEventListener('change', renderList));
})();

function resetHistory() {
  history = {};
  wrongSet = new Set();
  saveHistory();
  updateBadge();
  renderStats();
}

// ═══════════════════════════════════════════════════════
// 初期化
// ═══════════════════════════════════════════════════════
updateBadge();
restartSession();

window.addEventListener('scroll', () => {
  document.getElementById('back-to-top').classList.toggle('visible', window.scrollY > 200);
});
</script>
