  {"id": "Q461", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0107", "category": "労働衛生（有害業務に係るもの）", "subcategory": "リスクアセスメント", "question": "厚生労働省の「化学物質等による危険性又は有害性等の調査等に関する指針」に基づくリスクアセスメントに関する次の記述のうち、誤っているものはどれか。", "choices": ["リスクアセスメントは、化学物質等を原材料等として新規に採用し、又は変更するときなどに実施する。", "化学物質等による危険性又は有害性の特定は、GHSなどで示されている分類等に即して行う。", "リスクの見積りは、発生可能性及び重篤度を考慮して行う。", "化学物質等による疾病のリスクについては、ばく露濃度等を測定し、管理濃度と比較することにより見積もる方法が確実性が高い。", "リスクアセスメントの実施に当たっては、安全データシート等の資料を入手し、その情報を活用する。"], "answer": 4, "explanation": "（1）（2）（3）（5）正しい。（4）誤り：管理濃度ではなくばく露限界と比較する。管理濃度は作業環境評価基準の指標であり、個人ばく露のリスク見積りにはばく露限界を用いる。【頻出】管理濃度とばく露限界の区別は頻出。"},
  {"id": "Q363", "date": "2022年4月", "dateList": "2022年4月", "frequency": 1, "importance": "D", "groupId": "G0021", "category": "労働衛生（有害業務に係るもの）", "subcategory": "一酸化炭素", "question": "一酸化炭素に関する次の記述のうち、誤っているものはどれか。", "choices": ["一酸化炭素は、無色・無臭の気体であるため、吸入しても気が付かないことが多い。", "一酸化炭素は、エンジンの排気ガス、たばこの煙などに含まれる。", "一酸化炭素中毒は、血液中のグロブリンと一酸化炭素が強く結合し、体内の各組織が酸素欠乏状態を起こすことにより発生する。", "一酸化炭素は、炭素を含有する物が不完全燃焼した際に発生する。", "一酸化炭素中毒の後遺症として、健忘やパーキンソン症状がみられることがある。"], "answer": 3, "explanation": "（1）（2）（4）（5）正しい。（3）誤り：グロブリンではなくヘモグロビンが正しい。一酸化炭素はヘモグロビンと強く結合し（酸素の約200倍の親和性）、酸素運搬を阻害して各組織が酸素欠乏状態になる。【頻出】一酸化炭素とヘモグロビンの結合は頻出。"},
  {"id": "Q018", "date": "2025年10月", "dateList": "2021年10月、2021年4月、2022年4月、2025年10月", "frequency": 4, "importance": "B", "groupId": "G0100", "category": "労働衛生（有害業務に係るもの）", "subcategory": "作業環境測定", "question": "厚生労働省の「作業環境測定基準」及び「作業環境評価基準」に基づく作業環境測定及びその結果の評価に関する次の記述のうち、正しいものはどれか。", "choices": ["A測定の第二評価値が管理濃度を超えている単位作業場所は、B測定の結果に関係なく第三管理区分になる。", "A測定における測定点の高さの範囲は、床上100cm以上150cm以下である。", "A測定は、原材料を反応槽へ投入する場合など、間欠的に大量の有害物質の発散を伴う作業における最高濃度を知るために行う測定である。", "評価の指標として用いられる管理濃度は、個々の労働者の有害物質へのばく露限界を示すものである。", "B測定の測定値が管理濃度を超えている単位作業場所は、A測定の結果に関係なく第三管理区分になる。"], "answer": 1, "explanation": "(1)【正解】正しい。A測定の第二評価値が管理濃度を超えている場合、B測定の結果に関係なく第三管理区分となる。\n(2)誤り。A測定の測定点の高さは床上50cm以上150cm以下である。\n(3)誤り。選択肢の内容はB測定の説明である。A測定は単位作業場所の平均的な有害物質濃度を知るための測定。\n(4)誤り。管理濃度は作業環境の状態を単位作業場所の測定結果から評価するための指標であり、個々の労働者のばく露限界ではない。\n(5)誤り。B測定値が管理濃度の1.5倍を超えている場合にA測定の結果に関係なく第三管理区分となる。\n【頻出】A測定・B測定と管理区分の判定基準は頻出。"},
  {"id": "Q068", "date": "2025年4月", "dateList": "2024年4月、2025年4月", "frequency": 2, "importance": "C", "groupId": "G0101", "category": "労働衛生（有害業務に係るもの）", "subcategory": "作業環境測定", "question": "厚生労働省の「作業環境測定基準」及び「作業環境評価基準」に基づく作業環境測定及びその結果の評価に関する次の記述のうち、誤っているものはどれか。", "choices": ["作業環境測定を実施する場合の単位作業場所は、労働者の作業中の行動範囲、有害物の分布の状況などに基づいて設定する。", "許容濃度は、有害物質に係る作業環境の状態を、単位作業場所ごとにその作業環境測定結果から評価するための指標として定められている。", "A測定は、単位作業場所における有害物質の気中濃度の平均的な分布を知るために行う測定である。", "B測定は、単位作業場所中の有害物質の発散源に近接する場所で作業が行われる場合において、空気中の有害物質の最高濃度を知るために行う測定である。", "A測定とB測定を併せて行う場合は、A測定の測定値を用いて求めた第一評価値及び第二評価値並びにB測定の測定値に基づき、単位作業場所を第一管理区分から第三管理区分までのいずれかに区分する。"], "answer": 2, "explanation": "(1)(3)～(5)正しい。\n(2)【正解】誤り。選択肢の内容は管理濃度の説明であり、許容濃度ではない。許容濃度は日本産業衛生学会が勧告するもので、個々の労働者のばく露限界の指標。管理濃度は作業環境の評価指標。\n【頻出】管理濃度と許容濃度の違いは頻出。"},
  {"id": "Q219", "date": "2023年10月", "dateList": "2023年10月", "frequency": 1, "importance": "D", "groupId": "G0153", "category": "労働衛生（有害業務に係るもの）", "subcategory": "作業管理", "question": "有害物質を発散する屋内作業場の作業環境改善に関する次の記述のうち、正しいものはどれか。", "choices": ["有害物質を取り扱う装置を構造上又は作業上の理由で完全に密閉できない場合は、装置内の圧力を外気圧より高くする。", "局所排気装置を設置する場合は、給気量が不足すると排気効果が低下するので、排気量に見合った給気経路を確保する。", "有害物質を発散する作業工程では、局所排気装置の設置を密閉化や自動化より優先して検討する。", "局所排気装置を設ける場合、ダクトが細すぎると搬送速度が不足し、太すぎると圧力損失が増大することを考慮して、ダクト径を決める。", "局所排気装置に設ける空気清浄装置は、一般に、ダクトに接続された排風機を通過した後の空気が通る位置に設置する。"], "answer": 2, "explanation": "(2)正しい。給気不足は排気効果を低下させるため、排気量に見合った給気経路の確保が必要。(1)誤り：外気圧より「わずかに低く」する。(3)誤り：密閉化・自動化を局所排気装置より優先。(4)誤り：ダクトが太すぎると搬送速度不足、細すぎると圧力損失増大。(5)誤り：ダクト→空気清浄装置→排風機→排気ダクトの順。"},
  {"id": "Q069", "date": "2025年4月", "dateList": "2023年4月、2025年4月", "frequency": 2, "importance": "C", "groupId": "G0080", "category": "労働衛生（有害業務に係るもの）", "subcategory": "労働衛生保護具", "question": "労働衛生保護具に関する次の記述のうち、誤っているものはどれか。", "choices": ["直結式防毒マスクは、隔離式防毒マスクよりも有害ガスの濃度が高い大気中で使用することができる。", "吸気補助具付き防じんマスクは、吸気補助具によって清浄な空気を送る機能がある防じんマスクである。", "酸素濃度18％未満の場所で使用できる呼吸用保護具には、送気マスク、空気呼吸器のほか、酸素呼吸器がある。", "遮光保護具は、溶接作業における紫外線などによる眼の障害を防ぐために使用する。", "保護クリームは、作業中に有害な物質が直接皮膚に付着しないようにする目的で塗布するものである。"], "answer": 1, "explanation": "(1)【正解】誤り。直結式防毒マスクは隔離式よりも有害ガス濃度が低い大気中で使用する。直結式は1%以下、隔離式は2%以下の濃度で使用可能。\n(2)～(5)正しい。\n【頻出】防毒マスクの種類と使用濃度範囲は頻出。"},
  {"id": "Q317", "date": "2022年10月", "dateList": "2022年10月", "frequency": 1, "importance": "D", "groupId": "G0079", "category": "労働衛生（有害業務に係るもの）", "subcategory": "労働衛生保護具", "question": "労働衛生保護具に関する次の記述のうち、正しいものはどれか。", "choices": ["保護めがねは、紫外線などの有害光線による眼の障害を防ぐ目的で使用するもので、飛散粒子、薬品の飛沫などによる障害を防ぐ目的で使用するものではない。", "保護クリームは、皮膚の露出部に塗布して、作業中に有害な物質が直接皮膚に付着しないようにする目的で使用するものであるので、有害性の強い化学物質を直接素手で取り扱うときには、必ず使用する。", "防じんマスクは作業に適したものを選択し、高濃度の粉じんのばく露のおそれがあるときは、できるだけ粉じんの捕集効率が高く、かつ、排気弁の動的漏れ率が低いものを選ぶ。", "複数の種類の有毒ガスが混在している場合には、そのうち最も毒性の強いガス用の防毒マスクを使用する。", "エアラインマスクは、清浄な空気をボンベに詰めたものを空気源として供給する呼吸用保護具で、自給式呼吸器の一種である。"], "answer": 3, "explanation": "(3)正しい。防じんマスクは捕集効率が高く、排気弁の動的漏れ率が低いものを選ぶ。(1)誤り：保護めがねは飛散粒子等を防ぐもの。(2)誤り：有害性の強い物質を素手で扱うのは不可。(4)誤り：複数のガス混在時は防毒マスク使用不可。(5)誤り：エアラインマスクは送気マスク。ボンベ式は空気呼吸器。"},
  {"id": "Q212", "date": "2023年10月", "dateList": "2023年10月", "frequency": 1, "importance": "D", "groupId": "G0081", "category": "労働衛生（有害業務に係るもの）", "subcategory": "労働衛生管理", "question": "労働衛生対策を進めていくに当たっては、作業環境管理、作業管理及び健康管理が必要であるが、次のAからEの対策例について、作業管理に該当するものの組合せは(1)～(5)のうちどれか。\nA 座位での情報機器作業における作業姿勢は、椅子に深く腰をかけて背もたれに背を十分あて、履き物の足裏全体が床に接した姿勢を基本とする。\nB 有機溶剤業務を行う作業場所に設置した局所排気装置のフード付近の気流の風速を測定する。\nC 放射線業務を行う作業場所において、外部放射線による実効線量を算定し、管理区域を設定する。\nD ずい道建設工事の掘削作業において、土石又は岩石を湿潤な状態に保つための設備を稼働する。\nE 介護作業等腰部に著しい負担のかかる作業に従事する労働者に対し、腰痛予防体操を実施する。", "choices": ["A，B", "A，C", "B，C", "C，D", "D，E"], "answer": 2, "explanation": "A（作業姿勢の改善）とC（管理区域の設定＝作業条件の管理）が作業管理に該当。作業環境管理：B（風速測定）、D（湿潤化設備）。健康管理：E（腰痛予防体操）。【頻出問題】3管理の分類は繰り返し出題される。"},
  {"id": "Q367", "date": "2022年4月", "dateList": "2022年4月", "frequency": 1, "importance": "D", "groupId": "G0082", "category": "労働衛生（有害業務に係るもの）", "subcategory": "労働衛生管理", "question": "労働衛生対策を進めていくに当たっては、作業環境管理、作業管理及び健康管理が必要であるが、次のＡからＥの対策例について、作業環境管理に該当するものの組合せは(１)～(５)のうちどれか。Ａ 粉じん作業を行う場所に設置した局所排気装置のフード付近の気流の風速を測定する。Ｂ アーク溶接作業を行う労働者に防じんマスクなどの保護具を使用させる。Ｃ 鉛健康診断の結果、鉛業務に従事することが健康の保持のために適当でないと医師が認めた者を配置転換する。Ｄ 放射線業務において、管理区域を設定し、必要のある者以外の者を立入禁止とする。Ｅ 有機溶剤を使用する塗装方法を、有害性の低い水性塗料の塗装に変更する。", "choices": ["Ａ，Ｄ", "Ａ，Ｅ", "Ｂ，Ｃ", "Ｂ，Ｄ", "Ｃ，Ｅ"], "answer": 2, "explanation": "Ａ：局所排気装置の風速測定は工学的対策→作業環境管理。Ｂ：保護具の使用→作業管理。Ｃ：健康診断結果に基づく配置転換→健康管理。Ｄ：立入禁止は作業方法→作業管理。Ｅ：塗料の変更による有害物質発散防止→作業環境管理。よってＡとＥ。【頻出】作業環境管理・作業管理・健康管理の3管理の分類は頻出。"},
  {"id": "Q411", "date": "2021年10月", "dateList": "2021年10月", "frequency": 1, "importance": "D", "groupId": "G0085", "category": "労働衛生（有害業務に係るもの）", "subcategory": "労働衛生管理", "question": "労働衛生対策を進めるに当たっては、作業管理、作業環境管理及び健康管理が必要であるが、次のＡからＥの対策例について、作業管理に該当するものの組合せは(１)～(５)のうちどれか。Ａ 振動工具の取扱い業務において、振動ばく露時間の制限を行う。Ｂ 有機溶剤業務を行う作業場所に設置した局所排気装置のフード付近の吸い込み気流の風速を測定する。Ｃ 強烈な騒音を発する場所における作業において、耳栓や耳覆いを使用させる。Ｄ 有害な化学物質を取り扱う設備を密閉化する。Ｅ 鉛健康診断の結果、鉛業務に従事することが健康の保持のために適当でないと医師が認めた者を配置転換する。", "choices": ["Ａ，Ｂ", "Ａ，Ｃ", "Ｂ，Ｃ", "Ｃ，Ｄ", "Ｄ，Ｅ"], "answer": 2, "explanation": "Ａ：振動ばく露時間の制限→作業管理。Ｂ：局所排気装置の風速測定→作業環境管理。Ｃ：耳栓・耳覆いの使用→作業管理。Ｄ：設備の密閉化→作業環境管理。Ｅ：配置転換→健康管理。よってＡとＣ。【頻出】3管理の分類は毎回出題される最重要テーマ。"},
  {"id": "Q011", "date": "2025年10月", "dateList": "2025年10月", "frequency": 1, "importance": "D", "groupId": "G0089", "category": "労働衛生（有害業務に係るもの）", "subcategory": "化学物質による健康障害", "question": "化学物質とその常温・常圧(25℃、1気圧)での空気中における状態との組合せとして、誤っているものは次のうちどれか。\nただし、ガスとは、常温・常圧で気体のものをいい、蒸気とは、常温・常圧で液体又は固体の物質が蒸気圧に応じて揮発又は昇華して気体となっているものをいうものとする。", "choices": ["ホルムアルデヒド……ガス", "塩化ビニル……ガス", "アクリロニトリル……ガス", "二硫化炭素……蒸気", "アセトン……蒸気"], "answer": 3, "explanation": "(1)(2)(4)(5)正しい。\n(3)【正解】誤り。アクリロニトリルは常温で液体であるため、空気中では「蒸気」として存在する。「ガス」ではない。\n【頻出】化学物質のガス・蒸気・粉じん等の分類は頻出。"},
  {"id": "Q062", "date": "2025年4月", "dateList": "2025年4月", "frequency": 1, "importance": "D", "groupId": "G0090", "category": "労働衛生（有害業務に係るもの）", "subcategory": "化学物質による健康障害", "question": "化学物質とその常温・常圧（25℃、1気圧）での空気中における状態との組合せとして、誤っているものは次のうちどれか。\nただし、ガスとは、常温・常圧で気体のものをいい、蒸気とは、常温・常圧で液体又は固体の物質が蒸気圧に応じて揮発又は昇華して気体となっているものをいうものとする。", "choices": ["ホルムアルデヒド……ガス", "塩素……ガス", "塩化ビニル……ガス", "二酸化硫黄……蒸気", "二硫化炭素……蒸気"], "answer": 4, "explanation": "(1)～(3)(5)正しい。\n(4)【正解】誤り。二酸化硫黄は常温・常圧で気体であるため「ガス」が正しく、「蒸気」は誤り。\n【頻出】化学物質のガス・蒸気の分類は頻出。"},
  {"id": "Q067", "date": "2025年4月", "dateList": "2021年4月、2022年10月、2024年10月、2024年4月、2025年4月", "frequency": 5, "importance": "A", "groupId": "G0093", "category": "労働衛生（有害業務に係るもの）", "subcategory": "化学物質による健康障害", "question": "化学物質による健康障害に関する次の記述のうち、誤っているものはどれか。", "choices": ["一酸化炭素による中毒では、ヘモグロビン合成の障害による貧血、溶血などがみられる。", "二酸化窒素による健康障害では、肺水腫、気管支炎などがみられる。", "シアン化水素による中毒では、細胞内での酸素利用の障害による呼吸困難、けいれんなどがみられる。", "硫化水素による健康障害では、脳神経細胞の障害による意識消失、呼吸麻痺などがみられる。", "弗化水素による慢性中毒では、骨の硬化、斑状歯などがみられる。"], "answer": 1, "explanation": "(1)【正解】誤り。一酸化炭素は赤血球中のヘモグロビンと強く結合し、体内組織の酸素欠乏状態を引き起こす。ヘモグロビン合成の障害による貧血・溶血は誤り。\n(2)～(5)正しい。\n【頻出】一酸化炭素中毒のメカニズム（COHb形成）は頻出。"},
  {"id": "Q111", "date": "2024年10月", "dateList": "2024年10月、2024年4月", "frequency": 2, "importance": "C", "groupId": "G0091", "category": "労働衛生（有害業務に係るもの）", "subcategory": "化学物質による健康障害", "question": "化学物質とその常温・常圧（25℃、１気圧）での空気中における状態との組合せとして、誤っているものは次のうちどれか。ただし、ガスとは、常温・常圧で気体のものをいい、蒸気とは、常温・常圧で液体又は固体の物質が蒸気圧に応じて揮発又は昇華して気体となっているものをいうものとする。", "choices": ["アセトン……蒸気", "ニッケルカルボニル……蒸気", "二硫化炭素……ガス", "ホルムアルデヒド……ガス", "硫化水素……ガス"], "answer": 3, "explanation": "（1）（2）（4）（5）正しい。（3）誤り。二硫化炭素は常温・常圧で液体であるため、空気中では「蒸気」として存在する。「ガス」ではない。【頻出】化学物質のガスと蒸気の区別は頻出テーマ。"},
  {"id": "Q167", "date": "2024年4月", "dateList": "2024年4月", "frequency": 1, "importance": "D", "groupId": "G0087", "category": "労働衛生（有害業務に係るもの）", "subcategory": "化学物質による健康障害", "question": "化学物質と、それにより発症するおそれのある主たるがんとの組合せとして、正しいものは次のうちどれか。", "choices": ["塩化ビニル……肝血管肉腫", "ベンジジン……皮膚がん", "ビス（クロロメチル）エーテル……膀胱がん", "クロム酸……大腸がん", "石綿……胃がん"], "answer": 1, "explanation": "（1）正しい。塩化ビニルは肝血管肉腫を発症させるおそれがある。（2）誤り。ベンジジンは膀胱がん。（3）誤り。ビス（クロロメチル）エーテルは肺がん。（4）誤り。クロム酸は肺がん、上気道がん。（5）誤り。石綿は肺がん、胸膜中皮腫。【頻出】化学物質と発がんの組合せは頻出。"},
  {"id": "Q211", "date": "2023年10月", "dateList": "2023年10月", "frequency": 1, "importance": "D", "groupId": "G0088", "category": "労働衛生（有害業務に係るもの）", "subcategory": "化学物質による健康障害", "question": "化学物質とその常温・常圧(25℃、1気圧)での空気中における状態との組合せとして、誤っているものはどれか。ただし、ガスとは、常温・常圧で気体のものをいい、蒸気とは、常温・常圧で液体又は固体の物質が蒸気圧に応じて揮発又は昇華して気体となっているものをいうものとする。", "choices": ["アクリロニトリル…ガス", "アセトン…蒸気", "アンモニア…ガス", "ホルムアルデヒド…ガス", "硫酸ジメチル…蒸気"], "answer": 1, "explanation": "(1)誤り。アクリロニトリルは常温・常圧で液体であり、空気中では「蒸気」として存在する。沸点約77℃。(2)～(5)正しい。【頻出問題】ガスと蒸気の区別は頻出テーマ。"},
  {"id": "Q214", "date": "2023年10月", "dateList": "2023年10月、2023年4月", "frequency": 2, "importance": "C", "groupId": "G0092", "category": "労働衛生（有害業務に係るもの）", "subcategory": "化学物質による健康障害", "question": "化学物質による健康障害に関する次の記述のうち、正しいものはどれか。", "choices": ["一酸化炭素による中毒では、ヘモグロビン合成の障害による貧血、溶血などがみられる。", "弗化水素による中毒では、脳神経細胞が侵され、幻覚、錯乱などの精神障害がみられる。", "シアン化水素による中毒では、細胞内の酸素の利用の障害による呼吸困難、けいれんなどがみられる。", "塩化ビニルによる慢性中毒では、慢性気管支炎、歯牙酸蝕症などがみられる。", "塩素による中毒では、再生不良性貧血、溶血などの造血機能の障害がみられる。"], "answer": 3, "explanation": "(3)正しい。シアン化水素はチトクロム酸化酵素を阻害し、細胞内での酸素利用を障害する。(1)誤り：CO中毒はヘモグロビンと結合し酸素欠乏を起こす（合成障害ではない）。(2)誤り：弗化水素中毒は骨の硬化、斑状歯、歯牙酸蝕症。(4)誤り：塩化ビニル慢性中毒はレイノー症状、指骨溶解、肝血管肉腫。慢性気管支炎はSO2やNO2。(5)誤り：塩素中毒は粘膜刺激症状、肺水腫。造血機能障害はベンゼン。"},
  {"id": "Q262", "date": "2023年4月", "dateList": "2022年10月、2023年4月", "frequency": 2, "importance": "C", "groupId": "G0170", "category": "労働衛生（有害業務に係るもの）", "subcategory": "化学物質による健康障害", "question": "次の化学物質のうち、常温・常圧(25℃、1気圧)の空気中で蒸気として存在するものはどれか。ただし、蒸気とは、常温・常圧で液体又は固体の物質が蒸気圧に応じて揮発又は昇華して気体となっているものをいうものとする。", "choices": ["塩化ビニル", "ジクロロベンジジン", "アクリロニトリル", "エチレンオキシド", "二酸化マンガン"], "answer": 3, "explanation": "(3)正しい。アクリロニトリルは常温で液体（沸点約77℃）であり、蒸気として存在する。(1)誤り：塩化ビニルはガス。(2)誤り：ジクロロベンジジンは固体で粉じん。(4)誤り：エチレンオキシドはガス。(5)誤り：二酸化マンガンは固体で粉じん。"},
  {"id": "Q412", "date": "2021年10月", "dateList": "2021年10月", "frequency": 1, "importance": "D", "groupId": "G0172", "category": "労働衛生（有害業務に係るもの）", "subcategory": "化学物質による健康障害", "question": "次の化学物質のうち、常温・常圧(25℃、１気圧)の空気中で蒸気として存在するものはどれか。ただし、蒸気とは、常温・常圧で液体又は固体の物質が蒸気圧に応じて揮発又は昇華して気体となっているものをいうものとする。", "choices": ["塩化ビニル", "ホルムアルデヒド", "二硫化炭素", "二酸化硫黄", "アンモニア"], "answer": 3, "explanation": "（1）塩化ビニル：ガス。（2）ホルムアルデヒド：ガス。（3）二硫化炭素：蒸気（常温で液体）。有機則第1種有機溶剤。（4）二酸化硫黄：ガス。（5）アンモニア：ガス。【頻出】ガスと蒸気の区別は頻出。"},
  {"id": "Q462", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0171", "category": "労働衛生（有害業務に係るもの）", "subcategory": "化学物質による健康障害", "question": "次の化学物質のうち、常温・常圧(25℃、１気圧)の空気中で蒸気として存在するものはどれか。", "choices": ["塩化ビニル", "ジクロロベンジジン", "トリクロロエチレン", "二酸化硫黄", "ホルムアルデヒド"], "answer": 3, "explanation": "（1）塩化ビニル：ガス。（2）ジクロロベンジジン：粉じん（ダスト）。（3）トリクロロエチレン：蒸気（常温で液体の特別有機溶剤）。（4）二酸化硫黄：ガス。（5）ホルムアルデヒド：ガス。【頻出】ガス・蒸気・粉じんの区別は頻出。"},
  {"id": "Q019", "date": "2025年10月", "dateList": "2021年10月、2022年4月、2024年10月、2025年10月", "frequency": 4, "importance": "B", "groupId": "G0121", "category": "労働衛生（有害業務に係るもの）", "subcategory": "呼吸用保護具", "question": "呼吸用保護具に関する次の記述のうち、正しいものはどれか。", "choices": ["防毒マスクの吸収缶の色は、アンモニア用は緑色で、有機ガス用は黒色である。", "2種類以上の有害ガスが混在している場合には、そのうち最も毒性の強いガス用の防毒マスクを使用する。", "型式検定合格標章のある防じんマスクでも、ヒュームのような微細な粒子に対しては効果がない。", "防じんマスクは、オイルミストが堆積しても粒子捕集効率は低下しないので、吸気抵抗が上昇しない限り使用することができる。", "エアラインマスクは、自給式呼吸器の一種である。"], "answer": 1, "explanation": "(1)【正解】正しい。防毒マスクの吸収缶の色はアンモニア用が緑色、有機ガス用が黒色である。\n(2)誤り。2種類以上の有害ガスが混在している場合や対象ガスの種類・濃度が不明な場合は送気マスクや自給式呼吸器を使用し、防毒マスクは使用してはならない。\n(3)誤り。型式検定合格標章のある防じんマスクはヒュームなどの微粒子にも有効である。\n(4)誤り。オイルミスト等の堆積により粒子捕集効率が低下するものがある。\n(5)誤り。エアラインマスクは送気マスクの一種であり、自給式呼吸器ではない。\n【頻出】呼吸用保護具の種類と使用条件は頻出。"},
  {"id": "Q170", "date": "2024年4月", "dateList": "2021年4月、2024年4月", "frequency": 2, "importance": "C", "groupId": "G0122", "category": "労働衛生（有害業務に係るもの）", "subcategory": "呼吸用保護具", "question": "呼吸用保護具に関する次の記述のうち、誤っているものはどれか。", "choices": ["隔離式防毒マスクは、直結式防毒マスクよりも有害ガスの濃度が高い大気中で使用することができる。", "ガス又は蒸気状の有害物質が粉じんと混在している作業環境中で防毒マスクを使用するときは、防じん機能を有する防毒マスクを選択する。", "防毒マスクの吸収缶の色は、アンモニア用は緑色で、有機ガス用は黒色である。", "使い捨て式防じんマスクは、粒径１µm程度のヒュームには使用できない。", "防じんマスクは、面体と顔面との間にタオルなどを挟んで着用してはならない。"], "answer": 4, "explanation": "（1）～（3）（5）正しい。（4）誤り。使い捨て式防じんマスクでも、型式検定に合格したものであれば、粒径1µm程度のヒュームにも使用できる。防じんマスクは粉じん、ミスト、ヒューム等の粒子状物質の吸入を防止するためのものである。【頻出】防じんマスクの使用範囲は頻出。"},
  {"id": "Q120", "date": "2024年10月", "dateList": "2024年10月", "frequency": 1, "importance": "D", "groupId": "G0128", "category": "労働衛生（有害業務に係るもの）", "subcategory": "局所排気装置", "question": "局所排気装置のフードの型式の名称とその模式図の組合せとして、誤っているものは次のうちどれか。", "choices": ["外付け式グリッド型", "囲い式ドラフトチェンバ型", "レシーバ式キャノピ型", "外付け式ルーバ型", "外付け式スロット型"], "answer": 5, "explanation": "（1）～（4）正しい。（5）誤り。問題の模式図（グラインダの研磨粉じんを吸引するカバー付きフード）は「外付け式スロット型」ではなく「レシーバ式カバー型（グラインダ型）」である。【頻出】局所排気装置のフード型式の判別は頻出。"},
  {"id": "Q169", "date": "2024年4月", "dateList": "2022年10月、2022年4月、2023年4月、2024年4月", "frequency": 4, "importance": "B", "groupId": "G0126", "category": "労働衛生（有害業務に係るもの）", "subcategory": "局所排気装置", "question": "局所排気装置に関する次の記述のうち、正しいものはどれか。", "choices": ["キャノピ型フードは、発生源からの熱による上昇気流を利用して捕捉するもので、レシーバ式フードに分類される。", "スロット型フードは、作業面を除き周りが覆われているもので、囲い式フードに分類される。", "囲い式フードの排気効果を型別に比較すると、ドラフトチェンバ型は、カバー型より排気効果が大きい。", "ダクトの形状には円形、角形などがあり、その断面積を大きくするほど、ダクトの圧力損失が増大する。", "空気清浄装置を付設する局所排気装置を設置する場合、排風機は、一般に、フードに接続した吸引ダクトと空気清浄装置の間に設ける。"], "answer": 1, "explanation": "（1）正しい。キャノピ型フードは熱による上昇気流を利用するレシーバ式フードである。（2）誤り。スロット型フードは外付け式フードに分類される。（3）誤り。ドラフトチェンバ型はカバー型より排気効果が小さい。カバー型は発散源を完全に覆うため効果が大きい。（4）誤り。断面積を大きくするほど圧力損失は減少する。（5）誤り。正しい順序は、吸引ダクト→空気清浄装置→排風機→排気ダクトである。【頻出】局所排気装置の構造と分類は頻出。"},
  {"id": "Q464", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0127", "category": "労働衛生（有害業務に係るもの）", "subcategory": "局所排気装置", "question": "局所排気装置のフードの型式について、排気効果の大小関係として、正しいものは次のうちどれか。", "choices": ["囲い式カバー型＞囲い式建築ブース型＞外付け式ルーバ型", "囲い式建築ブース型＞囲い式グローブボックス型＞外付け式ルーバ型", "囲い式ドラフトチェンバ型＞外付け式ルーバ型＞囲い式カバー型", "外付け式ルーバ型＞囲い式ドラフトチェンバ型＞囲い式カバー型", "外付け式ルーバ型＞囲い式建築ブース型＞囲い式グローブボックス型"], "answer": 1, "explanation": "排気効果の大きい順：囲い式（①カバー型→②グローブボックス型→③ドラフトチェンバ型→④建築ブース型）→外付け式（⑤スロット型→⑥ルーバ型→⑦グリッド型）→レシーバ式。【頻出】フードの排気効果の順序は頻出。"},
  {"id": "Q020", "date": "2025年10月", "dateList": "2021年10月、2022年10月、2022年4月、2023年10月、2023年4月、2025年10月、2025年4月", "frequency": 7, "importance": "S", "groupId": "G0045", "category": "労働衛生（有害業務に係るもの）", "subcategory": "有害要因による健康障害", "question": "作業環境における有害要因による健康障害に関する次の記述のうち、正しいものはどれか。", "choices": ["電離放射線の被ばくによる白内障は、晩発障害に分類され、被ばく後、半年～30年後に現れる。", "マイクロ波は、赤外線より波長が短い電磁波で、照射部位の組織を加熱する作用がある。", "金属熱は、金属の溶融作業において、高温環境により体温調節中枢が麻痺することにより発生し、長期間にわたる発熱、関節痛などの症状がみられる。", "凍瘡は、皮膚組織の凍結壊死を伴うしもやけのことで、0℃以下の寒冷にばく露することによって発生する。", "潜水業務における減圧症は、浮上による減圧に伴い、血液中に溶け込んでいた酸素が気泡となり、血管を閉塞したり組織を圧迫することにより発生する。"], "answer": 1, "explanation": "(1)【正解】正しい。電離放射線による白内障は晩発障害に分類され、被ばく後半年～30年後に現れる。\n(2)誤り。マイクロ波は赤外線より波長が長い電磁波である。\n(3)誤り。金属熱は亜鉛などの金属溶融作業の際に発生するヒュームを吸入することにより発生し、悪寒、発熱、関節痛などの症状がみられる。体温調節中枢の麻痺ではない。\n(4)誤り。凍瘡（しもやけ）は0℃以上の寒冷による炎症。選択肢の説明は凍傷のもの。\n(5)誤り。減圧症は血液中や組織中に溶け込んでいた窒素が気泡となることで発生する。酸素ではない。\n【頻出】物理的有害要因による健康障害は頻出テーマ。"},
  {"id": "Q217", "date": "2023年10月", "dateList": "2023年10月", "frequency": 1, "importance": "D", "groupId": "G0016", "category": "労働衛生（有害業務に係るもの）", "subcategory": "有害要因による健康障害", "question": "レーザー光線に関する次の記述のうち、誤っているものはどれか。", "choices": ["レーザー光線は、おおむね1nmから180nmまでの波長域にある。", "レーザー光線は、単一波長で位相のそろった人工光線である。", "レーザー光線の強い指向性や集束性を利用し、高密度のエネルギーを発生させることができる。", "出力パワーが最も弱いクラス1又はクラス2のレーザー光線は、可視光のレーザーポインタとして使用されている。", "レーザー光線にさらされるおそれのある業務は、レーザー機器の出力パワーなどに基づくクラス分けに応じた労働衛生上の対策を講じる必要がある。"], "answer": 1, "explanation": "(1)誤り。レーザー光線の波長域は「180nmから1mm」であり「1nmから180nm」ではない。(2)～(5)正しい。"},
  {"id": "Q263", "date": "2023年4月", "dateList": "2023年4月", "frequency": 1, "importance": "D", "groupId": "G0190", "category": "労働衛生（有害業務に係るもの）", "subcategory": "有害要因による健康障害", "question": "潜水作業、高圧室内作業などの作業における高圧の影響又は高圧環境下から常圧に戻る際の減圧の影響により、直接には発症しない健康障害は次のうちどれか。", "choices": ["酸素中毒", "一酸化炭素中毒", "炭酸ガス(二酸化炭素)中毒", "窒素酔い", "減圧症"], "answer": 2, "explanation": "(2)一酸化炭素中毒は高圧・減圧の影響とは直接関係なく、不完全燃焼で発生するCOがヘモグロビンと結合して酸素欠乏を起こすもの。(1)酸素中毒、(3)CO2中毒、(4)窒素酔い、(5)減圧症はいずれも高圧環境に関連する。"},
  {"id": "Q465", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0046", "category": "労働衛生（有害業務に係るもの）", "subcategory": "有害要因による健康障害", "question": "作業環境における有害要因による健康障害に関する次の記述のうち、誤っているものはどれか。", "choices": ["窒素ガスで置換したタンク内の空気など、ほとんど無酸素状態の空気を吸入すると徐々に窒息の状態になり、この状態が５分程度継続すると呼吸停止する。", "減圧症は、高圧下作業からの減圧に伴い、血液中や組織中に溶け込んでいた窒素の気泡化が関与して発生する。", "金属熱は、亜鉛、銅などの金属の酸化物のヒュームを吸入することにより発生し、悪寒、発熱、関節痛などの症状がみられる。", "低体温症は、低温下の作業で全身が冷やされ、体の中心部の温度が35℃程度以下に低下した状態をいう。", "振動障害は、チェーンソーなどの振動工具によって生じる障害で、手のしびれなどの末梢神経障害やレイノー現象などの末梢循環障害がみられる。"], "answer": 1, "explanation": "（1）誤り：ほとんど無酸素状態の空気を吸入すると「徐々に」ではなく「瞬時（一呼吸）に失神」し、呼吸停止する。（2）～（5）正しい。【頻出】酸素欠乏の症状（瞬時の失神）は頻出。"},
  {"id": "Q016", "date": "2025年10月", "dateList": "2025年10月", "frequency": 1, "importance": "D", "groupId": "G0157", "category": "労働衛生（有害業務に係るもの）", "subcategory": "有機溶剤", "question": "有機溶剤の人体に対する影響に関する次の記述のうち、誤っているものはどれか。", "choices": ["脂溶性があり、脂肪の多い脳などに入りやすい。", "呼吸器の症状には、咳、上気道の炎症などがある。", "低濃度の繰り返しばく露による慢性中毒では、めまい、不眠などの不定愁訴がみられる。", "皮膚や粘膜に対する症状には、黒皮症、鼻中隔穿孔などがある。", "肝機能障害や腎機能障害を起こすものがある。"], "answer": 4, "explanation": "(1)(2)(3)(5)正しい。\n(4)【正解】誤り。有機溶剤による皮膚や粘膜への症状は皮膚の角化、結膜炎などである。黒皮症や鼻中隔穿孔は砒素やクロム等による中毒症状である。\n【頻出】有機溶剤と他の有害物質の症状の区別は頻出。"},
  {"id": "Q063", "date": "2025年4月", "dateList": "2021年4月、2024年10月、2025年4月", "frequency": 3, "importance": "B", "groupId": "G0156", "category": "労働衛生（有害業務に係るもの）", "subcategory": "有機溶剤", "question": "有機溶剤に関する次の記述のうち、誤っているものはどれか。", "choices": ["有機溶剤の蒸気は、空気より重いため、地下室やピットなどの通気が不十分な場所では滞留しやすい。", "有機溶剤は、全て脂溶性があるほか、揮発性及び引火性があるものが多い。", "有機溶剤による障害のうち、皮膚や粘膜の症状には、皮膚の角化、結膜炎などがある。", "低濃度の有機溶剤の繰り返しばく露では、頭痛、めまい、記憶力減退、不眠などの不定愁訴がみられる。", "メタノールによる障害として顕著なものは、網膜微細動脈瘤を伴う脳血管障害である。"], "answer": 5, "explanation": "(1)～(4)正しい。\n(5)【正解】誤り。メタノールによる顕著な障害は視神経障害である。網膜微細動脈瘤を伴う脳血管障害は二硫化炭素による健康障害。\n【頻出】有機溶剤ごとの特徴的な健康障害は頻出。"},
  {"id": "Q165", "date": "2024年4月", "dateList": "2022年4月、2023年4月、2024年4月", "frequency": 3, "importance": "B", "groupId": "G0155", "category": "労働衛生（有害業務に係るもの）", "subcategory": "有機溶剤", "question": "有機溶剤に関する次の記述のうち、正しいものはどれか。", "choices": ["有機溶剤の多くは、揮発性が高く、その蒸気は空気より軽い。", "有機溶剤は、脂溶性が低いため、脂肪の多い脳などには入りにくい。", "メタノールによる障害として顕著なものには、網膜の微細動脈瘤を伴う脳血管障害がある。", "二硫化炭素は、動脈硬化を進行させたり、精神障害を生じさせることがある。", "Ｎ,Ｎ-ジメチルホルムアミドによる障害として顕著なものには、視力低下を伴う視神経障害がある。"], "answer": 4, "explanation": "（1）誤り。有機溶剤の蒸気は空気より「軽い」のではなく「重い」。（2）誤り。有機溶剤は脂溶性があり、脂肪の多い脳などに入りやすい。（3）誤り。メタノールの健康障害は視神経障害である。網膜微細動脈瘤を伴う脳血管障害は二硫化炭素による障害。（4）正しい。二硫化炭素は動脈硬化を進行させたり精神障害を生じさせることがある。（5）誤り。N,N-ジメチルホルムアミドの健康障害は頭痛、めまい、肝機能障害等である。視神経障害はメタノールによるもの。【頻出】有機溶剤と健康障害の組合せは頻出。"},
  {"id": "Q017", "date": "2025年10月", "dateList": "2024年4月、2025年10月", "frequency": 2, "importance": "C", "groupId": "G0201", "category": "労働衛生（有害業務に係るもの）", "subcategory": "特殊健康診断", "question": "特殊健康診断に関する次の記述のうち、誤っているものはどれか。", "choices": ["有害業務への配置替えの際に行う特殊健康診断には、業務適性の判断と、その後の業務による影響を調べるための基礎資料を得るという目的がある。", "特殊健康診断が法定労働時間外に行われた場合には、割増賃金を支払う必要がある。", "眼底検査は、電離放射線健康診断で実施され、動脈硬化の進展の有無を検査する。", "振動工具取扱い作業者に対する特殊健康診断を1年に2回実施する場合、そのうち1回は冬季に行うとよい。", "特殊健康診断において適切な健診デザインを行うためには、作業内容と有害要因へのばく露状況を把握する必要がある。"], "answer": 3, "explanation": "(1)(2)(4)(5)正しい。\n(3)【正解】誤り。眼底検査は二硫化炭素の有機溶剤健康診断の項目である。電離放射線健康診断では白血球数や白内障に関する眼の検査が行われる。\n【頻出】特殊健康診断の検査項目と対象業務の組合せは頻出。"},
  {"id": "Q070", "date": "2025年4月", "dateList": "2022年4月、2025年4月", "frequency": 2, "importance": "C", "groupId": "G0200", "category": "労働衛生（有害業務に係るもの）", "subcategory": "特殊健康診断", "question": "特殊健康診断に関する次の記述のうち、正しいものはどれか。", "choices": ["有害物質による健康障害は、多くの場合、諸検査の異常などの他覚的所見より、自覚症状が先に出現するため、特殊健康診断では問診の重要性が高い。", "特殊健康診断における生物学的モニタリングによる検査は、有害物の体内摂取量や有害物による健康影響の程度を把握するための検査である。", "体内に取り込まれた有機溶剤の生物学的半減期は、数か月と長いので、有機溶剤健康診断における採尿は、任意の時期に行ってよい。", "体内に取り込まれた鉛の生物学的半減期は、数時間と短いので、鉛健康診断における採尿及び採血の時期は、厳重にチェックする必要がある。", "情報機器作業に係る健康診断では、眼科学的検査などとともに、上肢及び下肢の運動機能の検査を行う。"], "answer": 2, "explanation": "(1)誤り。有害物質による健康障害の多くは初期・軽度では無自覚で、諸検査の結果により発見されることが多い。\n(2)【正解】正しい。生物学的モニタリングは有害物の体内摂取量や健康影響の程度を把握する検査。\n(3)誤り。有機溶剤の生物学的半減期は短いため、採尿は作業終了後など厳格な管理が必要。\n(4)誤り。鉛の生物学的半減期は長いため、採尿・採血は任意の時期でよい。\n(5)誤り。情報機器作業の健康診断では上肢の運動機能検査は行うが、下肢は行わない。\n【頻出】生物学的半減期の長短と採尿・採血時期の関係は頻出。"},
  {"id": "Q220", "date": "2023年10月", "dateList": "2023年10月", "frequency": 1, "importance": "D", "groupId": "G0149", "category": "労働衛生（有害業務に係るもの）", "subcategory": "生物学的モニタリング", "question": "有害化学物質とその生物学的モニタリング指標として用いられる尿中の代謝物との組合せとして、正しいものは次のうちどれか。", "choices": ["トルエン…トリクロロ酢酸", "キシレン…メチル馬尿酸", "スチレン…馬尿酸", "N,N-ジメチルホルムアミド…デルタ-アミノレブリン酸", "鉛…マンデル酸"], "answer": 2, "explanation": "(2)正しい。キシレンの代謝物はメチル馬尿酸。(1)誤り：トルエン→馬尿酸。(3)誤り：スチレン→マンデル酸。(4)誤り：N,N-ジメチルホルムアミド→N-メチルホルムアミド。(5)誤り：鉛→デルタ-アミノレブリン酸。【頻出問題】代謝物の組合せは毎回出題される超重要テーマ。"},
  {"id": "Q269", "date": "2023年4月", "dateList": "2023年4月", "frequency": 1, "importance": "D", "groupId": "G0197", "category": "労働衛生（有害業務に係るもの）", "subcategory": "生物学的モニタリング", "question": "特殊健康診断に関する次の文中の[ ]内に入れるAからCの語句の組合せとして、正しいものは(1)～(5)のうちどれか。\n「特殊健康診断において有害物の体内摂取量を把握する検査として、生物学的モニタリングがあり、スチレンについては、尿中の[A]及びフェニルグリオキシル酸の総量を測定し、[B]については、[C]中のデルタアミノレブリン酸の量を測定する。」", "choices": ["A:馬尿酸 B:鉛 C:尿", "A:馬尿酸 B:水銀 C:血液", "A:メチル馬尿酸 B:鉛 C:血液", "A:マンデル酸 B:水銀 C:血液", "A:マンデル酸 B:鉛 C:尿"], "answer": 5, "explanation": "(5)正しい。スチレン→尿中マンデル酸、鉛→尿中デルタアミノレブリン酸。【頻出問題】代謝物の組合せは超重要。スチレン:マンデル酸、トルエン:馬尿酸、キシレン:メチル馬尿酸を区別すること。"},
  {"id": "Q320", "date": "2022年10月", "dateList": "2022年10月", "frequency": 1, "importance": "D", "groupId": "G0198", "category": "労働衛生（有害業務に係るもの）", "subcategory": "生物学的モニタリング", "question": "特殊健康診断に関する次の文中の[ ]内に入れるAからCの語句の組合せとして、正しいものは(1)～(5)のうちどれか。\n「特殊健康診断において有害物の体内摂取量を把握する検査として、生物学的モニタリングがあり、ノルマルヘキサンについては、尿中の[A]の量を測定し、[B]については、[C]中のデルタアミノレブリン酸の量を測定する。」", "choices": ["A:2,5-ヘキサンジオン B:鉛 C:尿", "A:2,5-ヘキサンジオン B:鉛 C:血液", "A:シクロヘキサノン B:鉛 C:尿", "A:シクロヘキサノン B:水銀 C:尿", "A:シクロヘキサノン B:水銀 C:血液"], "answer": 1, "explanation": "(1)正しい。ノルマルヘキサン→尿中2,5-ヘキサンジオン、鉛→尿中デルタアミノレブリン酸。【頻出問題】生物学的モニタリング指標の組合せ。"},
  {"id": "Q419", "date": "2021年10月", "dateList": "2021年10月", "frequency": 1, "importance": "D", "groupId": "G0199", "category": "労働衛生（有害業務に係るもの）", "subcategory": "生物学的モニタリング", "question": "特殊健康診断に関する次の文中の内に入れるＡからＣの語句の組合せとして、正しいものはどれか。「特殊健康診断において有害物の体内摂取量を把握する検査として、生物学的モニタリングがあり、トルエンについては、尿中のＡを測定し、Ｂについては、Ｃ中のデルタアミノレブリン酸を測定する。」", "choices": ["Ａ：馬尿酸　Ｂ：鉛　Ｃ：尿", "Ａ：馬尿酸　Ｂ：鉛　Ｃ：血液", "Ａ：マンデル酸　Ｂ：鉛　Ｃ：尿", "Ａ：マンデル酸　Ｂ：水銀　Ｃ：尿", "Ａ：マンデル酸　Ｂ：水銀　Ｃ：血液"], "answer": 1, "explanation": "トルエンの尿中代謝物は馬尿酸。鉛の生物学的モニタリングは尿中のデルタアミノレブリン酸。有機則第29条別表、鉛則第53条。なお、マンデル酸はスチレンの尿中代謝物。【頻出】トルエン＝馬尿酸、鉛＝デルタアミノレブリン酸は頻出の穴埋め。"},
  {"id": "Q470", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0150", "category": "労働衛生（有害業務に係るもの）", "subcategory": "生物学的モニタリング", "question": "有害化学物質とその生物学的モニタリング指標として用いられる尿中の代謝物等との組合せとして、誤っているものは次のうちどれか。", "choices": ["鉛…デルタアミノレブリン酸", "スチレン…メチルホルムアミド", "トルエン…馬尿酸", "ノルマルヘキサン…2,5-ヘキサンジオン", "トリクロロエチレン…トリクロロ酢酸"], "answer": 2, "explanation": "（1）（3）（4）（5）正しい。（2）誤り：スチレンの尿中代謝物はマンデル酸。メチルホルムアミドはN,N-ジメチルホルムアミドの代謝物。【頻出】有害物質と尿中代謝物の組合せは頻出。"},
  {"id": "Q013", "date": "2025年10月", "dateList": "2024年10月、2025年10月", "frequency": 2, "importance": "C", "groupId": "G0212", "category": "労働衛生（有害業務に係るもの）", "subcategory": "粉じんによる健康障害", "question": "粉じんによる健康障害に関する次の記述のうち、誤っているものはどれか。", "choices": ["米杉、ラワンなどの木材粉じんは、ぜんそくを起こすことがある。", "じん肺の自覚症状は、初期にはあまりみられないが、進行すると咳、痰、呼吸困難などがみられる。", "じん肺は、続発性気管支炎、肺結核などを合併することがある。", "石綿肺では、胸膜の肥厚(プラーク)、胸膜の石灰化などがみられる。", "けい肺は、鉄、アルミニウムなどの金属粉じんを吸入することによって発症するじん肺である。"], "answer": 5, "explanation": "(1)(2)(3)(4)正しい。\n(5)【正解】誤り。けい肺は鉄やアルミニウムなどの金属粉じんではなく、鉱物性粉じんに含まれる遊離けい酸（シリカ）を吸入することによって発症するじん肺である。\n【頻出】じん肺の種類と原因物質の組合せは頻出。"},
  {"id": "Q313", "date": "2022年10月", "dateList": "2022年10月、2022年4月", "frequency": 2, "importance": "C", "groupId": "G0215", "category": "労働衛生（有害業務に係るもの）", "subcategory": "粉じんによる健康障害", "question": "粉じん（ヒュームを含む。）による健康障害に関する次の記述のうち、誤っているものはどれか。", "choices": ["じん肺は、粉じんを吸入することによって肺に生じた炎症性病変を主体とする疾病で、その種類には、けい肺、間質性肺炎、慢性閉塞性肺疾患（COPD）などがある。", "じん肺は、肺結核のほか、続発性気管支炎、続発性気胸、原発性肺がんなどを合併することがある。", "アルミニウムやその化合物によってじん肺を起こすことがある。", "溶接工肺は、溶接の際に発生する酸化鉄ヒュームのばく露によって発症するじん肺である。", "炭素を含む粉じんは、じん肺を起こすことがある。"], "answer": 1, "explanation": "(1)誤り。じん肺は「炎症性病変」ではなく「線維増殖性変化」を主体とする疾病。(2)～(5)正しい。"},
  {"id": "Q012", "date": "2025年10月", "dateList": "2022年10月、2023年10月、2024年10月、2025年10月、2025年4月", "frequency": 5, "importance": "A", "groupId": "G0251", "category": "労働衛生（有害業務に係るもの）", "subcategory": "金属中毒", "question": "金属などによる健康障害に関する次の記述のうち、誤っているものはどれか。", "choices": ["ベリリウム中毒では、溶血性貧血、尿の赤色化などの症状がみられる。", "砒素中毒では、角化症、黒皮症などの皮膚障害、末梢神経障害などがみられる。", "マンガン中毒では、筋のこわばり、震え、歩行困難などのパーキンソン病に似た症状がみられる。", "カドミウム中毒では、上気道炎、肺炎、腎機能障害などがみられる。", "金属水銀中毒では、感情不安定、幻覚などの精神障害がみられる。"], "answer": 1, "explanation": "(1)【正解】誤り。ベリリウム中毒の症状は接触性皮膚炎、皮膚潰瘍、肺炎であり、慢性中毒ではベリリウム肺が発生する。溶血性貧血・尿の赤色化は砒素中毒の症状。\n(2)(3)(4)(5)正しい。\n【頻出】金属と健康障害の組合せは頻出テーマ。"},
  {"id": "Q414", "date": "2021年10月", "dateList": "2021年10月", "frequency": 1, "importance": "D", "groupId": "G0252", "category": "労働衛生（有害業務に係るもの）", "subcategory": "金属中毒", "question": "金属による健康障害に関する次の記述のうち、誤っているものはどれか。", "choices": ["カドミウム中毒では、上気道炎、肺炎、腎機能障害などがみられる。", "鉛中毒では、貧血、末梢神経障害、腹部の疝痛などがみられる。", "マンガン中毒では、筋のこわばり、震え、歩行困難などのパーキンソン病に似た症状がみられる。", "ベリリウム中毒では、溶血性貧血、尿の赤色化などの症状がみられる。", "金属水銀中毒では、感情不安定、幻覚などの精神障害や手指の震えなどの症状・障害がみられる。"], "answer": 4, "explanation": "（1）（2）（3）（5）正しい。（4）誤り：ベリリウム中毒では接触性皮膚炎、皮膚潰瘍、肺炎、慢性ではベリリウム肺が発生。溶血性貧血・尿の赤色化は砒素中毒の症状。【頻出】金属と健康障害の組合せは頻出。"},
  {"id": "Q064", "date": "2025年4月", "dateList": "2024年10月、2024年4月、2025年4月", "frequency": 3, "importance": "B", "groupId": "G0256", "category": "労働衛生（有害業務に係るもの）", "subcategory": "電離放射線障害防止規則", "question": "電離放射線による健康影響に関する次の記述のうち、誤っているものはどれか。", "choices": ["電離放射線の被ばくによる生体への影響には、身体的影響と遺伝的影響がある。", "電離放射線の被ばくによる身体的影響のうち、白内障は晩発障害に分類される。", "電離放射線に被ばく後、数週間程度までに現れる造血器系障害は、急性障害に分類される。", "電離放射線の被ばくによる発がんと遺伝的影響は、確率的影響に分類され、症状の程度は線量に依存する。", "造血器、生殖腺、腸粘膜など頻繁に細胞分裂している組織・臓器は、電離放射線の影響を受けやすい。"], "answer": 4, "explanation": "(1)～(3)(5)正しい。\n(4)【正解】誤り。確率的影響では被ばく線量が増えるほど発生率が高まるが、症状の程度（重篤度）が線量に依存するわけではない。症状の程度が線量に依存するのは確定的影響。\n【頻出】確率的影響と確定的影響の区別は頻出。"},
  {"id": "Q314", "date": "2022年10月", "dateList": "2021年10月、2022年10月", "frequency": 2, "importance": "C", "groupId": "G0255", "category": "労働衛生（有害業務に係るもの）", "subcategory": "電離放射線障害防止規則", "question": "電離放射線などに関する次の記述のうち、誤っているものはどれか。", "choices": ["電離放射線には、電磁波と粒子線がある。", "エックス線は、通常、エックス線装置を用いて発生させる人工の電離放射線であるが、放射性物質から放出されるガンマ線と同様に電磁波である。", "エックス線は、紫外線より波長の長い電磁波である。", "電離放射線の被ばくによる白内障は、晩発障害に分類され、被ばく後、半年～30年後に現れることが多い。", "電離放射線を放出してほかの元素に変わる元素を放射性同位元素（ラジオアイソトープ）という。"], "answer": 3, "explanation": "(3)誤り。エックス線は紫外線より波長が「短い」電磁波である。(1)(2)(4)(5)正しい。"},
  {"id": "Q014", "date": "2025年10月", "dateList": "2021年10月、2023年10月、2023年4月、2024年10月、2025年10月", "frequency": 5, "importance": "A", "groupId": "G0047", "category": "労働衛生（有害業務に係るもの）", "subcategory": "騒音", "question": "作業環境における騒音及びそれによる健康障害に関する次の記述のうち、誤っているものはどれか。", "choices": ["騒音性難聴の初期に認められる4,000Hz付近の音から始まる聴力低下の型をc5dipという。", "音圧レベルは、通常、人間が聴くことができる最も小さな音圧に対する比の常用対数を20倍して求められる。", "騒音は、自律神経系や内分泌系へも影響を与えるため、騒音ばく露により、交感神経の活動の亢進や副腎皮質ホルモンの分泌の増加が認められることがある。", "人が聴くことのできる音の周波数は、10Hzから30,000Hz程度までであり、このうち会話音域は2,000Hzから4,000Hz程度までである。", "等価騒音レベルは、時間的に変動する騒音レベルのエネルギー的な平均値を表す量で、変動する騒音に対する人間の生理・心理的反応とよく対応している。"], "answer": 4, "explanation": "(1)(2)(3)(5)正しい。\n(4)【正解】誤り。人が聴くことのできる音の周波数はおよそ20～20,000Hzであり、会話音域は通常500Hz～2,000Hz程度である。設問の数値はいずれも誤り。\n【頻出】騒音の基礎知識（可聴域、会話音域、c5dip等）は頻出。"},
  {"id": "Q025", "date": "2025年10月", "dateList": "2024年4月、2025年10月、2025年4月", "frequency": 3, "importance": "B", "groupId": "G0066", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "ストレスチェック", "question": "労働安全衛生法に基づく心理的な負担の程度を把握するための検査の結果に基づき実施する面接指導に関する次の記述のうち、正しいものはどれか。", "choices": ["常時50人以上の労働者を使用する事業者は、1年以内ごとに1回、定期に、心理的な負担の程度を把握するための検査及び面接指導の結果を所轄労働基準監督署長に報告しなければならない。", "事業者は、面接指導の対象となる労働者の要件に該当する労働者から申出があったときは、申出の日から3か月以内に、面接指導を行わなければならない。", "事業者は、面接指導を行った場合は、当該面接指導の結果を当該事業場の当該部署に所属する労働者の集団その他の一定規模の集団ごとに集計し、その結果について分析しなければならない。", "面接指導の結果は、健康診断個人票に記載しなければならない。", "面接指導を行う医師として事業者が指名できる医師は、法定の研修を修了した医師に限られる。"], "answer": 1, "explanation": "(1)【正解】正しい。安衛則第52条の21。\n(2)誤り。申出があったときは「遅滞なく」面接指導を行わなければならない。安衛則第52条の16第2項。\n(3)誤り。集団分析を行うのは事業者ではなく、検査を行った医師等である。安衛則第52条の14第1項。\n(4)誤り。面接指導の結果は健康診断個人票ではなく、面接指導結果の記録を作成する。安衛則第52条の18。\n(5)誤り。面接指導を行う医師に法定の研修修了等の指名要件はない。安衛則第52条の10。\n【頻出】ストレスチェック制度の手続き・報告義務は頻出。"},
  {"id": "Q125", "date": "2024年10月", "dateList": "2022年4月、2024年10月", "frequency": 2, "importance": "C", "groupId": "G0062", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "ストレスチェック", "question": "労働安全衛生法に基づく労働者の心理的な負担の程度を把握するための検査（ストレスチェック）及びその結果等に応じて実施される医師による面接指導に関する次の記述のうち、法令上、正しいものはどれか。", "choices": ["常時50人以上の労働者を使用する事業場においては、６か月以内ごとに１回、定期に、ストレスチェックを行わなければならない。", "ストレスチェックを行うために必要な知識についての研修であって厚生労働大臣が定めるものを修了した労働衛生コンサルタントは、ストレスチェックの実施者となることができる。", "事業者は、ストレスチェックの結果が、衛生管理者及びストレスチェックを受けた労働者に通知されるようにしなければならない。", "ストレスチェックを受ける労働者について解雇、昇進又は異動に関して直接の権限を持つ監督的地位にある者は、ストレスチェックの実施の事務に従事してはならない。", "事業者は、ストレスチェックの結果、心理的な負担の程度が高い労働者全員に対し、医師による面接指導を行わなければならない。"], "answer": 4, "explanation": "（1）誤り。「6か月以内ごとに1回」ではなく「1年以内ごとに1回」である（安衛則第52条の9第1項）。（2）誤り。実施者になれるのは医師、保健師、所定の研修を修了した歯科医師、看護師、精神保健福祉士又は公認心理師であり、労働衛生コンサルタントは含まれない（安衛則第52条の10第1項）。（3）誤り。結果はストレスチェックを受けた労働者にのみ通知され、衛生管理者には通知してはならない（安衛法第66条の10第2項、安衛則第52条の12）。（4）正しい（安衛則第52条の10第2項）。（5）誤り。面接指導の対象は、心理的な負担の程度が高い労働者であって、面接指導を受ける必要があると検査を行った医師等が認めたものである（安衛則第52条の15）。【頻出】ストレスチェックの実施者と結果の取扱いは頻出。"},
  {"id": "Q227", "date": "2023年10月", "dateList": "2023年10月", "frequency": 1, "importance": "D", "groupId": "G0063", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "ストレスチェック", "question": "労働安全衛生法に基づく労働者の心理的な負担の程度を把握するための検査（以下「ストレスチェック」という。）及びその結果等に応じて実施される医師による面接指導に関する次の記述のうち、法令上、正しいものはどれか。", "choices": ["ストレスチェックを受ける労働者について解雇、昇進又は異動に関して直接の権限を持つ監督的地位にある者は、ストレスチェックの実施の事務に従事してはならない。", "事業者は、ストレスチェックの結果が、衛生管理者及びストレスチェックを受けた労働者に通知されるようにしなければならない。", "面接指導を行う医師として事業者が指名できる医師は、当該事業場の産業医に限られる。", "面接指導の結果は、健康診断個人票に記載しなければならない。", "事業者は、面接指導の結果に基づき、当該労働者の健康を保持するため必要な措置について、面接指導が行われた日から3か月以内に、医師の意見を聴かなければならない。"], "answer": 1, "explanation": "(1)正しい。安衛則第52条の10第2項。(2)誤り：結果は労働者本人にのみ通知。安衛則第52条の12。(3)誤り：産業医に限定する規定はない。(4)誤り：面接指導結果の記録を別途作成。安衛則第52条の18。(5)誤り：「3か月以内」ではなく「遅滞なく」。安衛則第52条の19。"},
  {"id": "Q277", "date": "2023年4月", "dateList": "2023年4月", "frequency": 1, "importance": "D", "groupId": "G0064", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "ストレスチェック", "question": "労働安全衛生法に基づく心理的な負担の程度を把握するための検査について、医師及び保健師以外の検査の実施者として、次のAからDの者のうち正しいものの組合せは(1)～(5)のうちどれか。ただし、実施者は、法定の研修を修了した者とする。\nA 公認心理師\nB 歯科医師\nC 衛生管理者\nD 産業カウンセラー", "choices": ["A，B", "A，D", "B，C", "B，D", "C，D"], "answer": 1, "explanation": "(1)正しい。A（公認心理師）とB（歯科医師）が実施者となれる。安衛則第52条の10第1項③。実施者：医師、保健師のほか、法定研修修了の歯科医師、看護師、精神保健福祉士、公認心理師。衛生管理者や産業カウンセラーは実施者になれない。"},
  {"id": "Q326", "date": "2022年10月", "dateList": "2022年10月", "frequency": 1, "importance": "D", "groupId": "G0065", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "ストレスチェック", "question": "労働安全衛生法に基づく心理的な負担の程度を把握するための検査について、医師及び保健師以外の検査の実施者として、次のAからDの者のうち正しいものの組合せは(1)～(5)のうちどれか。ただし、実施者は、法定の研修を修了した者とする。\nA 歯科医師\nB 労働衛生コンサルタント\nC 衛生管理者\nD 公認心理師", "choices": ["A，B", "A，D", "B，C", "B，D", "C，D"], "answer": 2, "explanation": "(2)正しい。A（歯科医師）とD（公認心理師）が実施者となれる。安衛則第52条の10第1項③。労働衛生コンサルタント・衛生管理者は実施者になれない。【3回連続出題】"},
  {"id": "Q425", "date": "2021年10月", "dateList": "2021年10月", "frequency": 1, "importance": "D", "groupId": "G0067", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "ストレスチェック", "question": "労働安全衛生法に基づく心理的な負担の程度を把握するための検査（ストレスチェック）及びその結果等に応じて実施される医師による面接指導に関する次の記述のうち、法令上、正しいものはどれか。", "choices": ["常時50人以上の労働者を使用する事業場においては、６か月以内ごとに１回、定期に、ストレスチェックを行わなければならない。", "事業者は、ストレスチェックの結果が、衛生管理者及びストレスチェックを受けた労働者に通知されるようにしなければならない。", "労働者に対するストレスチェックの事項は、「職場における当該労働者の心理的な負担の原因」、「当該労働者の心理的な負担による心身の自覚症状」及び「職場における他の労働者による当該労働者への支援」に関する項目である。", "事業者は、ストレスチェックの結果、心理的な負担の程度が高い労働者全員に対し、医師による面接指導を行わなければならない。", "事業者は、医師による面接指導の結果に基づき、当該面接指導の結果の記録を作成して、これを３年間保存しなければならない。"], "answer": 3, "explanation": "（1）誤り：6か月ではなく1年以内ごとに1回。（2）誤り：労働者本人のみに通知。（3）正しい：3つの領域が検査事項。安衛則第52条の9第1項。（4）誤り：全員ではなく医師等が必要と認めた者。（5）誤り：3年間ではなく5年間。【頻出】ストレスチェックの3領域は頻出。"},
  {"id": "Q475", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0061", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "ストレスチェック", "question": "労働安全衛生法に基づくストレスチェックの結果に基づき実施する医師による面接指導に関する次の記述のうち、正しいものはどれか。", "choices": ["面接指導を行う医師は、当該事業場の産業医に限られる。", "面接指導の結果は、健康診断個人票に記載しなければならない。", "ストレスチェックの結果、心理的な負担の程度が高い者であって、医師等が必要と認め、本人が希望した場合に面接指導を行う。", "面接指導は、申出の日から３か月以内に行わなければならない。", "面接指導に基づく医師の意見聴取は、面接指導が行われた日から３か月以内に行う。"], "answer": 3, "explanation": "（1）誤り：産業医に限らない。（2）誤り：健康診断個人票への記載義務なし。（3）正しい：安衛則第52条の15・16。（4）誤り：3か月以内ではなく遅滞なく。（5）誤り：3か月以内ではなく遅滞なく。【頻出】面接指導の実施要件は頻出。"},
  {"id": "Q078", "date": "2025年4月", "dateList": "2025年4月", "frequency": 1, "importance": "D", "groupId": "G0023", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "事務室の環境管理", "question": "中央管理方式の空気調和設備を設けている建築物の室で、事務所の用に供されるものについての室温等の測定に関する次の記述のうち、法令上、誤っているものはどれか。", "choices": ["一酸化炭素の含有率は、検知管方式による一酸化炭素検定器又はこれと同等以上の性能を有する測定機器により測定する。", "室温の測定は、室の通常の使用時間中に、室の中央部の床上150cmの位置において行う。", "相対湿度は、0.5度目盛の乾湿球の湿度計又はこれと同等以上の性能を有する測定機器により測定する。", "二酸化炭素の含有率は、検知管方式による二酸化炭素検定器又はこれと同等以上の性能を有する測定機器により測定する。", "室温は、0.5度目盛の温度計又はこれと同等以上の性能を有する測定機器により測定する。"], "answer": 2, "explanation": "(1)正しい。事務所則第8条表中第2項。\n(2)【正解】誤り。室温の測定位置は「床上75cm以上120cm以下」であり、150cmは誤り。事務所則第8条備考第1項。\n(3)正しい。事務所則第8条表中第5項。\n(4)正しい。事務所則第8条表中第3項。\n(5)正しい。事務所則第8条表中第4項。\n【頻出】事務所の測定位置（床上75cm以上120cm以下）は頻出。"},
  {"id": "Q178", "date": "2024年4月", "dateList": "2024年4月", "frequency": 1, "importance": "D", "groupId": "G0029", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "事務室の環境管理", "question": "事務室の空気環境の調整に関する次の文中の[ ]内に入れるＡ及びＢの数値の組合せとして、法令上、正しいものはどれか。\n「①空気調和設備又は機械換気設備を設けている場合は、室に供給される空気が、1気圧、温度25℃とした場合の当該空気中に占める二酸化炭素の含有率が100万分の[Ａ]以下となるように、当該設備を調整しなければならない。\n②①の設備により室に流入する空気が、特定の労働者に直接、継続して及ばないようにし、かつ、室の気流を[Ｂ]ｍ/ｓ以下としなければならない。」", "choices": ["A=1,000、B=0.3", "A=1,000、B=0.5", "A=2,000、B=0.3", "A=2,000、B=0.5", "A=2,000、B=1"], "answer": 2, "explanation": "A=1,000（ppm）、B=0.5（m/s）が正しい（事務所則第5条第1項②、第2項）。二酸化炭素の含有率は100万分の1,000（＝1,000ppm）以下、気流は0.5m/s以下としなければならない。【頻出】事務室の空気環境基準値は頻出。"},
  {"id": "Q228", "date": "2023年10月", "dateList": "2023年10月", "frequency": 1, "importance": "D", "groupId": "G0028", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "事務室の環境管理", "question": "事務室の空気環境の調整に関する次の文中の[ ]内に入れるA及びBの数値の組合せとして、法令上、正しいものは(1)～(5)のうちどれか。\n「①空気調和設備又は機械換気設備を設けている場合は、室に供給される空気が、1気圧、温度25℃とした場合の当該空気中に占める二酸化炭素の含有率が100万分の[A]以下となるように、当該設備を調整しなければならない。\n②①の設備により室に流入する空気が、特定の労働者に直接、継続して及ばないようにし、かつ、室の気流を[B]m/s以下としなければならない。」", "choices": ["A:1,000 B:0.3", "A:1,000 B:0.5", "A:2,000 B:0.3", "A:2,000 B:0.5", "A:2,000 B:1"], "answer": 2, "explanation": "(2)正しい。CO2含有率は100万分の1,000（=0.1%）以下、気流は0.5m/s以下。事務所則第5条第1項②、第2項。【頻出問題】事務所衛生基準の数値は毎回出題される。"},
  {"id": "Q327", "date": "2022年10月", "dateList": "2022年10月、2022年4月", "frequency": 2, "importance": "C", "groupId": "G0026", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "事務室の環境管理", "question": "事務室の空気環境の測定、設備の点検等に関する次の記述のうち、法令上、誤っているものはどれか。", "choices": ["中央管理方式の空気調和設備を設けた建築物内の事務室については、空気中の一酸化炭素及び二酸化炭素の含有率を、6か月以内ごとに1回、定期に、測定しなければならない。", "事務室の建築、大規模の修繕又は大規模の模様替を行ったときは、その事務室における空気中のホルムアルデヒドの濃度を、その事務室の使用を開始した日以後所定の時期に1回、測定しなければならない。", "燃焼器具を使用するときは、発熱量が著しく少ないものを除き、毎日、異常の有無を点検しなければならない。", "事務室において使用する機械による換気のための設備については、2か月以内ごとに1回、定期に、異常の有無を点検しなければならない。", "空気調和設備内に設けられた排水受けについては、原則として、1か月以内ごとに1回、定期に、その汚れ及び閉塞の状況を点検しなければならない。"], "answer": 1, "explanation": "(1)誤り。CO・CO2含有率の測定は「2か月以内ごとに1回」であり「6か月以内ごとに1回」ではない。事務所則第7条。(2)正しい：事務所則第7条の2。(3)正しい：事務所則第6条第2項。(4)正しい：事務所則第9条。(5)正しい：事務所則第9条の2。"},
  {"id": "Q428", "date": "2021年10月", "dateList": "2021年10月", "frequency": 1, "importance": "D", "groupId": "G0030", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "事務室の環境管理", "question": "事務室の空気環境の調整に関する次の文中の内に入れるＡ及びＢの数値の組合せとして、法令上、正しいものはどれか。「空気調和設備又は機械換気設備を設けている場合は、室に供給される空気が、次に適合するように当該設備を調整しなければならない。①１気圧、温度25℃とした場合の当該空気１㎥中に含まれる浮遊粉じん量がＡmg以下であること。②１気圧、温度25℃とした場合の当該空気１㎥中に含まれるホルムアルデヒドの量がＢmg以下であること。」", "choices": ["Ａ：0.15　Ｂ：0.1", "Ａ：0.15　Ｂ：0.3", "Ａ：0.5　Ｂ：0.1", "Ａ：0.5　Ｂ：0.3", "Ａ：0.5　Ｂ：0.5"], "answer": 1, "explanation": "浮遊粉じん量0.15mg/㎥以下、ホルムアルデヒド0.1mg/㎥以下。事務所則第5条第1項①。【頻出】事務室の空気環境基準の数値は頻出の穴埋め。"},
  {"id": "Q478", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0027", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "事務室の環境管理", "question": "事務室の空気環境の測定又は設備の点検に関する次の記述のうち、法令上、誤っているものはどれか。", "choices": ["燃焼器具を使用するときは、発熱量が著しく少ないものを除き、毎日、異常の有無を点検しなければならない。", "事務室において使用する機械による換気のための設備については、２か月以内ごとに１回、定期に、異常の有無を点検しなければならない。", "空気調和設備内に設けられた排水受けについては、原則として、１か月以内ごとに１回、定期に、その汚れ及び閉塞の状況を点検しなければならない。", "中央管理方式の空気調和設備を設けた建築物内の事務室において、空気中の一酸化炭素及び二酸化炭素の含有率については、６か月以内ごとに１回、定期に、測定しなければならない。", "事務室の建築、大規模の修繕又は大規模の模様替を行ったときは、空気中のホルムアルデヒドの濃度を、使用を開始した日以後所定の期間に１回、測定しなければならない。"], "answer": 4, "explanation": "（1）（2）（3）（5）正しい。（4）誤り：6か月以内ごとではなく2か月以内ごとに1回。事務所則第7条第1項。【頻出】事務室の測定頻度（2か月）は頻出のひっかけ。"},
  {"id": "Q028", "date": "2025年10月", "dateList": "2023年4月、2025年10月", "frequency": 2, "importance": "C", "groupId": "G0031", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "事務室の設備点検", "question": "事務室の設備の定期的な点検等に関する次の記述のうち、法令上、正しいものはどれか。", "choices": ["機械による換気のための設備については、3か月以内ごとに1回、定期に、異常の有無を点検しなければならない。", "空気調和設備の冷却塔及び冷却水については、原則として、1か月以内ごとに1回、定期に、その汚れの状況を点検しなければならない。", "空気調和設備内に設けられた排水受けについては、原則として、2か月以内ごとに1回、定期に、その汚れ及び閉塞の状況を点検しなければならない。", "空気調和設備の加湿装置については、原則として、2か月以内ごとに1回、定期に、その汚れの状況を点検しなければならない。", "燃焼器具を使用するときは、発熱量が著しく少ないものを除き、1か月以内ごとに1回、定期に、異常の有無を点検しなければならない。"], "answer": 2, "explanation": "(1)誤り。機械換気設備の点検は「2か月以内ごとに1回」。事務所則第9条第1項。\n(2)【正解】正しい。事務所則第9条の2第1項②。\n(3)誤り。排水受けの点検は「1か月以内ごとに1回」。事務所則第9条の2第1項④。\n(4)誤り。加湿装置の点検は「1か月以内ごとに1回」。事務所則第9条の2第1項③。\n(5)誤り。燃焼器具の点検は「毎日」。事務所則第6条第2項。\n【頻出】事務所の設備点検頻度は頻出テーマ。"},
  {"id": "Q128", "date": "2024年10月", "dateList": "2024年10月", "frequency": 1, "importance": "D", "groupId": "G0032", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "事務室の設備点検", "question": "事務室の設備の点検等に関する次の記述のうち、法令上、誤っているものはどれか。", "choices": ["機械による換気のための設備については、６か月以内ごとに１回、定期に、異常の有無を点検しなければならない。", "空気調和設備の加湿装置については、原則として、１か月以内ごとに１回、定期に、その汚れの状況を点検し、必要に応じ、その清掃等を行わなければならない。", "空気調和設備内に設けられた排水受けについては、原則として、１か月以内ごとに１回、定期に、その汚れ及び閉塞の状況を点検しなければならない。", "事務室の建築、大規模の修繕又は大規模の模様替を行ったときは、その事務室における空気中のホルムアルデヒドの濃度を、その事務室の使用を開始した日以後所定の期間に１回、測定しなければならない。", "事務室の照明設備については、６か月以内ごとに１回、定期に、点検しなければならない。"], "answer": 1, "explanation": "（1）誤り。機械による換気のための設備の点検は「6か月以内ごとに1回」ではなく「2か月以内ごとに1回」行わなければならない（事務所則第9条第1項）。（2）正しい（事務所則第9条の2第1項③）。（3）正しい（事務所則第9条の2第1項④）。（4）正しい（事務所則第7条の2第1項）。（5）正しい（事務所則第10条第3項）。【頻出】事務室の設備点検頻度は頻出。"},
  {"id": "Q224", "date": "2023年10月", "dateList": "2023年10月、2023年4月", "frequency": 2, "importance": "C", "groupId": "G0069", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "健康診断", "question": "労働安全衛生規則に基づく医師による健康診断に関する次の記述のうち、誤っているものはどれか。", "choices": ["雇入時の健康診断において、医師による健康診断を受けた後3か月を経過しない者が、その健康診断結果を証明する書面を提出したときは、その健康診断の項目に相当する項目を省略することができる。", "雇入時の健康診断の項目のうち、聴力の検査は、1,000Hz及び4,000Hzの音について行わなければならない。", "深夜業を含む業務に常時従事する労働者に対し、6か月以内ごとに1回、定期に、健康診断を行わなければならないが、胸部エックス線検査については、1年以内ごとに1回、定期に、行うことができる。", "定期健康診断を受けた労働者に対し、健康診断を実施した日から3か月以内に、当該健康診断の結果を通知しなければならない。", "定期健康診断の結果に基づき健康診断個人票を作成して、これを5年間保存しなければならない。"], "answer": 4, "explanation": "(4)誤り。健康診断結果の通知は「遅滞なく」行わなければならず、「3か月以内」ではない。安衛則第51条の4。(1)正しい：安衛則第44条第3項。(2)正しい：安衛則第43条③。(3)正しい：安衛則第45条第1項。(5)正しい：安衛則第51条。"},
  {"id": "Q424", "date": "2021年10月", "dateList": "2021年10月", "frequency": 1, "importance": "D", "groupId": "G0068", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "健康診断", "question": "労働安全衛生規則に基づく医師による健康診断について、法令に違反しているものは次のうちどれか。", "choices": ["雇入時の健康診断において、医師による健康診断を受けた後３か月を経過しない者が、その健康診断結果を証明する書面を提出したときは、その健康診断の項目に相当する項目を省略している。", "雇入時の健康診断の項目のうち、聴力の検査は、35歳及び40歳の者並びに45歳以上の者に対しては、1,000Hz及び4,000Hzの音について行っているが、その他の年齢の者に対しては、医師が適当と認めるその他の方法により行っている。", "深夜業を含む業務に常時従事する労働者に対し、６か月以内ごとに１回、定期に、健康診断を行っているが、胸部エックス線検査は、１年以内ごとに１回、定期に、行っている。", "事業場において実施した定期健康診断の結果、健康診断項目に異常所見があると診断された労働者については、健康を保持するために必要な措置について、健康診断が行われた日から３か月以内に、医師から意見聴取を行っている。", "常時50人の労働者を使用する事業場において、定期健康診断の結果については、遅滞なく、所轄労働基準監督署長に報告を行っているが、雇入時の健康診断の結果については報告を行っていない。"], "answer": 2, "explanation": "（1）違反なし：安衛則第43条第1項。（2）違反あり：雇入時の健康診断には年齢による聴力検査方法の省略規定はない。安衛則第43条。（3）違反なし：安衛則第45条第1項。（4）違反なし。（5）違反なし。【頻出】雇入時健康診断と定期健康診断の省略規定の違いは頻出。"},
  {"id": "Q474", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0073", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "健康診断", "question": "労働安全衛生規則に規定されている医師による健康診断について、法令に違反しているものは次のうちどれか。", "choices": ["雇入時の健康診断において、3か月以内の健康診断結果の書面提出があったときは、相当する項目を省略している。", "雇入時の健康診断の聴力検査を、35歳・40歳・45歳以上は1,000Hz・4,000Hzで、その他は医師が適当と認める方法で行っている。", "海外に６か月以上派遣して帰国した労働者について、一時的な就業の場合を除き、海外派遣労働者健康診断を行っている。", "常時50人の労働者を使用する事業場において、雇入時の健康診断の結果を労基署に報告していない。", "常時40人の労働者を使用する事業場において、定期健康診断の結果を労基署に報告していない。"], "answer": 2, "explanation": "（1）違反なし。（2）違反あり：雇入時の健康診断には年齢による聴力検査方法の省略規定はない。安衛則第43条。（3）～（5）違反なし。【頻出】雇入時健康診断の省略規定の不存在は頻出。"},
  {"id": "Q029", "date": "2025年10月", "dateList": "2021年10月、2021年4月、2023年4月、2024年4月、2025年10月", "frequency": 5, "importance": "A", "groupId": "G0052", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "労働時間", "question": "労働基準法における労働時間等に関する次の記述のうち、正しいものはどれか。", "choices": ["監視又は断続的労働に従事する労働者であって、所轄労働基準監督署長の許可を受けたものについては、労働時間、休憩及び休日に関する規定は適用されない。", "1日8時間を超えて労働させることができるのは、時間外労働の協定を締結し、これを所轄労働基準監督署長に届け出た場合に限られている。", "フレックスタイム制の清算期間は、6か月以内の期間に限られる。", "満20歳未満の者については、時間外・休日労働をさせることはできない。", "労働時間が8時間を超える場合においては少なくとも60分、12時間を超える場合においては少なくとも90分の休憩時間を労働時間の途中に与えなければならない。"], "answer": 1, "explanation": "(1)【正解】正しい。労基法第41条第1項③。\n(2)誤り。災害時等で臨時の必要がある場合には行政官庁の許可を受けて労働時間を延長できる。労基法第33条第1項。\n(3)誤り。フレックスタイム制の清算期間は「3か月以内」。労基法第32条の3第1項②。\n(4)誤り。時間外・休日労働が制限されるのは「満18歳未満」の者。労基法第60条。\n(5)誤り。労働時間が8時間を超える場合の休憩は少なくとも60分で、12時間超の規定はない。労基法第34条第1項。\n【頻出】労働時間の適用除外、休憩時間の要件は頻出。"},
  {"id": "Q176", "date": "2024年4月", "dateList": "2023年10月、2024年4月", "frequency": 2, "importance": "C", "groupId": "G0078", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "労働衛生コンサルタント", "question": "労働衛生コンサルタントに関する次の記述のうち、法令上、誤っているものはどれか。", "choices": ["労働衛生コンサルタントは、他人の求めに応じ報酬を得て、労働者の衛生の水準の向上を図るため、事業場の衛生についての診断及びこれに基づく指導を行うことを業とする。", "労働衛生コンサルタント試験には、保健衛生及び労働衛生工学の２つの区分がある。", "労働衛生コンサルタント試験に合格した者は、厚生労働大臣の指定する指定登録機関に備える労働衛生コンサルタント名簿に、氏名、生年月日等所定の事項の登録を受けることにより、労働衛生コンサルタントとなることができる。", "労働衛生コンサルタントが、その業務に関して知り得た秘密を漏らし、又は盗用したときは、その登録を取り消されることがある。", "労働衛生コンサルタントは、法定の研修を修了することにより、ストレスチェックの実施者となることができる。"], "answer": 5, "explanation": "（1）正しい（安衛法第81条）。（2）正しい（コンサル則第10条）。（3）正しい（安衛法第84条）。（4）正しい（安衛法第85条、第86条）。（5）誤り。ストレスチェックの実施者は、医師、保健師、所定の研修を修了した歯科医師、看護師、精神保健福祉士又は公認心理師であり、労働衛生コンサルタントは含まれない（安衛則第52条の10）。【頻出】ストレスチェックの実施者の範囲は頻出。"},
  {"id": "Q079", "date": "2025年4月", "dateList": "2025年4月", "frequency": 1, "importance": "D", "groupId": "G0058", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "妊産婦等", "question": "労働基準法に定める妊産婦等に関する次の記述のうち、法令上、誤っているものはどれか。\nただし、常時使用する労働者数が10人以上の規模の事業場の場合とし管理監督者等とは、「監督又は管理の地位にある者等、労働時間、休憩及び休日に関する規定の適用除外者」をいうものとする。", "choices": ["妊産婦とは、妊娠中の女性及び産後1年を経過しない女性をいう。", "妊娠中の女性が請求した場合には、管理監督者等の場合を除き、他の軽易な業務に転換させなければならない。", "1年単位の変形労働時間制を採用している場合であっても、妊産婦が請求した場合には、管理監督者等の場合を除き1週40時間、1日8時間を超えて労働させてはならない。", "時間外・休日労働に関する協定を締結し、これを所轄労働基準監督署長に届け出ている場合であっても、妊産婦が請求した場合には、管理監督者等の場合を除き、時間外・休日労働をさせてはならない。", "生理日の就業が著しく困難な女性が休暇を請求したときは、その者を生理日に就業させてはならない。"], "answer": 2, "explanation": "(1)正しい。労基法第64条の3第1項。\n(2)【正解】誤り。軽易業務への転換は管理監督者等であっても適用される。除外されない。労基法第65条第3項。\n(3)正しい。労基法第66条第1項。\n(4)正しい。労基法第66条第2項。\n(5)正しい。労基法第68条。\n【頻出】妊産婦の保護規定と管理監督者の適用除外の範囲は頻出。"},
  {"id": "Q229", "date": "2023年10月", "dateList": "2022年10月、2022年4月、2023年10月", "frequency": 3, "importance": "B", "groupId": "G0057", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "妊産婦等", "question": "労働基準法に定める妊産婦等に関する次の記述のうち、法令上、誤っているものはどれか。ただし、常時使用する労働者数が10人以上の規模の事業場の場合とし、管理監督者等とは、「監督又は管理の地位にある者等、労働時間、休憩及び休日に関する規定の適用除外者」をいうものとする。", "choices": ["時間外・休日労働に関する協定を締結し、これを所轄労働基準監督署長に届け出ている場合であっても、妊産婦が請求した場合には、管理監督者等の場合を除き、時間外・休日労働をさせてはならない。", "フレックスタイム制を採用している場合であっても、妊産婦が請求した場合には、管理監督者等の場合を除き、1週40時間、1日8時間を超えて労働させてはならない。", "妊産婦が請求した場合には、深夜業をさせてはならない。", "妊娠中の女性が請求した場合においては、他の軽易な業務に転換させなければならない。", "原則として、産後8週間を経過しない女性を就業させてはならない。"], "answer": 2, "explanation": "(2)誤り。フレックスタイム制（労基法第32条の3）は労基法第66条第1項で規定する変形労働時間制の条項に含まれないため、妊産婦の請求による制限の対象外。労基法第66条第1項。(1)正しい：労基法第41条、第66条第1・2項。(3)正しい：労基法第66条第3項。(4)正しい：労基法第65条第3項。(5)正しい：労基法第65条第2項。"},
  {"id": "Q376", "date": "2022年4月", "dateList": "2021年4月、2022年4月", "frequency": 2, "importance": "C", "groupId": "G0254", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "安全衛生教育", "question": "雇入れ時の安全衛生教育に関する次の記述のうち、法令上、正しいものはどれか。", "choices": ["常時使用する労働者が10人未満である事業場では、教育を省略することができる。", "１か月以内の期間を定めて雇用する者については、危険又は有害な業務に従事する者を除き、教育を省略することができる。", "飲食店の事業場においては、教育事項のうち、「作業手順に関すること」については省略することができる。", "旅館業の事業場においては、教育事項のうち、「作業開始時の点検に関すること」については省略することができる。", "教育を行ったときは、教育の受講者、教育内容等の記録を作成して、これを１年間保存しなければならない。"], "answer": 3, "explanation": "（1）（2）誤り：雇入時教育は労働者数・雇用形態にかかわらず省略不可。安衛法第59条第1項。（3）正しい：飲食店は「その他の業種」に該当し、作業手順に関する事項は省略可能。安衛則第35条第1項③。（4）誤り：旅館業は「その他業種」に該当しないため省略不可。（5）誤り：記録の作成・保存の規定はない。【頻出】安全衛生教育の省略可能な業種と項目は頻出。"},
  {"id": "Q426", "date": "2021年10月", "dateList": "2021年10月", "frequency": 1, "importance": "D", "groupId": "G0253", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "安全衛生教育", "question": "雇入れ時の安全衛生教育における次のＡからＤの教育事項について、法令上、金融業の事業場において省略できるものの組合せは(１)～(５)のうちどれか。Ａ 従事させる業務に関して発生するおそれのある疾病の原因及び予防に関すること。Ｂ 作業開始時の点検に関すること。Ｃ 整理、整頓及び清潔の保持に関すること。Ｄ 作業手順に関すること。", "choices": ["Ａ，Ｂ", "Ａ，Ｃ", "Ｂ，Ｃ", "Ｂ，Ｄ", "Ｃ，Ｄ"], "answer": 4, "explanation": "金融業は「その他の業種」に該当。Ａ：省略できない（第1項⑤）。Ｂ：省略できる（第1項④）。Ｃ：省略できない（第1項⑥）。Ｄ：省略できる（第1項③）。安衛則第35条。よってＢとＤ。【頻出】業種別の安全衛生教育省略項目は頻出。"},
  {"id": "Q076", "date": "2025年4月", "dateList": "2025年4月", "frequency": 1, "importance": "D", "groupId": "G0070", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "定期健康診断", "question": "労働安全衛生規則に基づく医師による定期健康診断に関する次の記述のうち誤っているものはどれか。", "choices": ["尿検査では、尿中の馬尿酸及びデルタアミノレブリン酸の量の検査を行う。", "定期健康診断項目のうち肝機能検査については、厚生労働大臣が定める基準に基づき、医師が必要でないと認めるときは、省略することができる。", "常時50人以上の労働者を使用する事業場において定期健康診断を行ったときは、遅滞なく、その結果を所轄労働基準監督署長に報告しなければならない。", "定期健康診断を受けた労働者に対しては、異常の所見が認められなかった者を含め、遅滞なく、健康診断の結果を通知しなければならない。", "事業場において実施した定期健康診断の項目に異常の所見があると診断された労働者については、その結果に基づき、健康の保持のために必要な措置について、健康診断が行われた日から3か月以内に、医師の意見を聴かなければならない。"], "answer": 1, "explanation": "(1)【正解】誤り。定期健康診断の尿検査は「糖及び蛋白の有無」を検査するものであり、馬尿酸やデルタアミノレブリン酸は特殊健康診断の項目。安衛則第44条第1項⑩。\n(2)正しい。安衛則第44条第2項。\n(3)正しい。安衛則第52条第1項。\n(4)正しい。安衛則第51条の4。\n(5)正しい。安衛則第51条の2第1項①。\n【頻出】定期健康診断と特殊健康診断の検査項目の区別は頻出。"},
  {"id": "Q177", "date": "2024年4月", "dateList": "2022年10月、2024年4月", "frequency": 2, "importance": "C", "groupId": "G0072", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "定期健康診断", "question": "労働安全衛生規則に基づく次の定期健康診断項目のうち、厚生労働大臣が定める基準に基づき、医師が必要でないと認めるときは、省略することができる項目に該当しないものはどれか。", "choices": ["既往歴及び業務歴の調査", "心電図検査", "肝機能検査", "血中脂質検査", "貧血検査"], "answer": 1, "explanation": "（1）該当しない。既往歴及び業務歴の調査は省略できない必須項目である。（2）～（5）該当する。心電図検査、肝機能検査、血中脂質検査、貧血検査は医師が必要でないと認めるときに省略可能（安衛則第44条第2項）。【頻出】定期健康診断の省略可能項目と必須項目は頻出。"},
  {"id": "Q030", "date": "2025年10月", "dateList": "2025年10月", "frequency": 1, "importance": "D", "groupId": "G0242", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "年次有給休暇", "question": "週所定労働時間が24時間、週所定労働日数が4日である労働者であって、雇入れの日から起算して3年6か月継続勤務したものに対して、その後1年間に新たに与えなければならない年次有給休暇日数として、法令上、正しいものは次のうちどれか。\nただし、その労働者はその直前の1年間に全労働日の8割以上出勤したものとする。", "choices": ["9日", "10日", "11日", "12日", "13日"], "answer": 2, "explanation": "労基法第39条第3項、労基則第24条の3第3項。\n週所定労働日数4日、3年6か月継続勤務の場合の比例付与日数を計算する。\n通常の労働者の3年6か月の付与日数は14日。\n比例付与日数＝14×4÷5.2＝10.76…→小数点以下切捨てで10日。\n【頻出】比例付与の計算問題は頻出。"},
  {"id": "Q080", "date": "2025年4月", "dateList": "2025年4月", "frequency": 1, "importance": "D", "groupId": "G0141", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "年次有給休暇", "question": "年次有給休暇(以下「休暇」という。)に関する次の記述のうち、労働基準法上、正しいものはどれか。", "choices": ["休暇の期間については、原則として、最低賃金又は平均賃金の100分の60の額の手当を支払わなければならない。", "使用者は、労働者の過半数で組織する労働組合との書面による協定により、休暇を与える時季に関する定めをしたときは、休暇のうち3日を超える部分については、その定めにより休暇を与えることができる。", "法令に基づく育児休業又は介護休業で休業した期間は、出勤率の算定に当たっては、全労働日から除外して算出することができる。", "一週間の所定労働時間が30時間で一週間の所定労働日数が4日である労働者であって、雇入れの日から起算して3年6か月間継続勤務し、直前の1年間に、全労働日の8割以上出勤したものには、継続し又は分割した14労働日の休暇を新たに与えなければならない。", "休暇の請求権は、これを1年間行使しなければ時効によって消滅する。"], "answer": 4, "explanation": "(1)誤り。平均賃金若しくは所定労働時間労働した場合の通常の賃金等を支払う。労基法第39条第9項。\n(2)誤り。「3日」ではなく「5日」を超える部分。労基法第39条第6項。\n(3)誤り。育児・介護休業期間は出勤したものとみなす。除外ではない。労基法第39条第10項。\n(4)【正解】正しい。週30時間・週4日・3年6か月の場合、14日の有給休暇。労基法第39条第2項。\n(5)誤り。時効は2年間。労基法第115条。\n【頻出】年次有給休暇の付与日数と比例付与は頻出。"},
  {"id": "Q130", "date": "2024年10月", "dateList": "2024年10月", "frequency": 1, "importance": "D", "groupId": "G0247", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "年次有給休暇", "question": "週所定労働時間が30時間、週所定労働日数が４日である労働者であって、雇入れの日から起算して４年６か月継続勤務したものに対して、その後１年間に新たに与えなければならない年次有給休暇日数として、法令上、正しいものは次のうちどれか。ただし、その労働者はその直前の１年間に全労働日の８割以上出勤したものとする。", "choices": ["12日", "13日", "14日", "16日", "18日"], "answer": 4, "explanation": "週所定労働日数が4日でも、週所定労働時間が30時間であるため、年次有給休暇の比例付与には該当しない。通常の労働者と同じ付与日数となり、4年6か月継続勤務の場合は16日が付与される（労基法第39条第2項、第3項、労規則第24条の3第1項）。【頻出】比例付与の適用条件（週30時間未満かつ週4日以下）は頻出。"},
  {"id": "Q180", "date": "2024年4月", "dateList": "2024年4月", "frequency": 1, "importance": "D", "groupId": "G0248", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "年次有給休暇", "question": "週所定労働時間が32時間、週所定労働日数が４日である労働者であって、雇入れの日から起算して３年６か月継続勤務したものに対して、その後１年間に新たに与えなければならない年次有給休暇日数として、法令上、正しいものは次のうちどれか。ただし、その労働者はその直前の１年間に全労働日の８割以上出勤したものとする。", "choices": ["10日", "11日", "12日", "13日", "14日"], "answer": 5, "explanation": "週所定労働日数が4日でも、週所定労働時間が32時間（30時間以上）であるため、年次有給休暇の比例付与には該当しない。通常の労働者と同じ付与日数となり、3年6か月継続勤務の場合は14日が付与される（労基法第39条第2項、第3項、労規則第24条の3第1項）。【頻出】比例付与の適用条件（週30時間未満かつ週4日以下）は頻出。"},
  {"id": "Q230", "date": "2023年10月", "dateList": "2023年10月", "frequency": 1, "importance": "D", "groupId": "G0245", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "年次有給休暇", "question": "週所定労働時間が25時間、週所定労働日数が4日である労働者であって、雇入れの日から起算して5年6か月継続勤務したものに対して、その後1年間に新たに与えなければならない年次有給休暇日数として、法令上、正しいものは次のうちどれか。ただし、その労働者はその直前の1年間に全労働日の8割以上出勤したものとする。", "choices": ["12日", "13日", "14日", "15日", "16日"], "answer": 2, "explanation": "(2)正しい。比例付与の計算：通常の労働者の5年6か月の付与日数18日×4日÷5.2日=13.8…→切捨てで13日。労基法第39条第3項、労基則第24条の3第3項。"},
  {"id": "Q280", "date": "2023年4月", "dateList": "2023年4月", "frequency": 1, "importance": "D", "groupId": "G0244", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "年次有給休暇", "question": "週所定労働時間が25時間、週所定労働日数が4日である労働者であって、雇入れの日から起算して4年6か月継続勤務したものに対して、その後1年間に新たに与えなければならない年次有給休暇日数として、法令上、正しいものは次のうちどれか。ただし、その労働者はその直前の1年間に全労働日の8割以上出勤したものとする。", "choices": ["9日", "10日", "11日", "12日", "13日"], "answer": 4, "explanation": "(4)正しい。比例付与の計算：通常の労働者の4年6か月の付与日数16日×4日÷5.2日=12.3…→切捨てで12日。労基法第39条第3項、労基則第24条の3第3項。"},
  {"id": "Q330", "date": "2022年10月", "dateList": "2022年10月", "frequency": 1, "importance": "D", "groupId": "G0243", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "年次有給休暇", "question": "週所定労働時間が25時間、週所定労働日数が4日である労働者であって、雇入れの日から起算して3年6か月継続勤務したものに対して、その後1年間に新たに与えなければならない年次有給休暇日数として、法令上、正しいものは次のうちどれか。ただし、その労働者はその直前の1年間に全労働日の8割以上出勤したものとする。", "choices": ["8日", "10日", "12日", "14日", "16日"], "answer": 2, "explanation": "(2)正しい。比例付与の計算：通常の労働者の3年6か月の付与日数14日×4日÷5.2日=10.76…→切捨てで10日。労基法第39条第3項、労基則第24条の3第3項。"},
  {"id": "Q379", "date": "2022年4月", "dateList": "2021年10月、2022年4月", "frequency": 2, "importance": "C", "groupId": "G0246", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "年次有給休暇", "question": "週所定労働時間が25時間、週所定労働日数が４日である労働者であって、雇入れの日から起算して３年６か月継続勤務したものに対して、その後１年間に新たに与えなければならない年次有給休暇日数として、法令上、正しいものは次のうちどれか。ただし、その労働者はその直前の１年間に全労働日の８割以上出勤したものとする。", "choices": ["８日", "10日", "12日", "14日", "16日"], "answer": 2, "explanation": "週所定労働時間30時間未満かつ週所定労働日数4日の労働者は比例付与の対象。3年6か月継続勤務で10日が付与される。労基法第39条第3項、労基則第24条の3第3項の比例付与表による。【頻出】比例付与の年次有給休暇日数の計算は頻出。"},
  {"id": "Q328", "date": "2022年10月", "dateList": "2022年10月", "frequency": 1, "importance": "D", "groupId": "G0004", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "気積の計算", "question": "ある屋内作業場の床面から4mをこえない部分の容積が150m³であり、かつ、このうちの設備の占める部分の容積が55m³であるとき、法令上、常時就業させることのできる最大の労働者数は次のうちどれか。", "choices": ["4人", "9人", "10人", "15人", "19人"], "answer": 2, "explanation": "(2)正しい。(150−55)÷10＝9.5→切捨てで9人。安衛則第600条。労働者1人について10m³以上の気積が必要。"},
  {"id": "Q126", "date": "2024年10月", "dateList": "2022年10月、2023年10月、2024年10月", "frequency": 3, "importance": "B", "groupId": "G0203", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "産業医", "question": "産業医に関する次の記述のうち、法令上、誤っているものはどれか。ただし、産業医の選任の特例はないものとする。", "choices": ["医師のうち、労働衛生コンサルタント試験に合格した者で、その試験の区分が保健衛生であるものは、産業医として選任することができる。", "産業医の選任は、選任すべき事由が発生した日から14日以内に行わなければならない。", "事業者は、産業医が辞任したとき又は産業医を解任したときは、遅滞なく、その旨及びその理由を衛生委員会又は安全衛生委員会に報告しなければならない。", "常時使用する労働者数が2,000人を超える事業場では、産業医を２人以上選任しなければならない。", "産業医は、労働者に対する衛生教育に関することであって、医学に関する専門的知識を必要とする事項について、総括安全衛生管理者に対して勧告することができる。"], "answer": 4, "explanation": "（1）正しい（安衛則第14条第2項③）。（2）正しい（安衛則第13条第1項①）。（3）正しい（安衛則第13条第4項）。（4）誤り。「2,000人を超える場合」ではなく「3,000人を超える場合」に産業医を2人以上選任しなければならない（安衛則第13条第1項④）。（5）正しい（安衛法第13条第5項、安衛則第14条第3項）。【頻出】産業医の選任人数の基準は頻出。"},
  {"id": "Q175", "date": "2024年4月", "dateList": "2024年4月", "frequency": 1, "importance": "D", "groupId": "G0204", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "産業医", "question": "産業医の職務として、法令に定められていない事項は次のうちどれか。ただし、次のそれぞれの事項のうち医学に関する専門的知識を必要とするものに限るものとする。", "choices": ["安全衛生に関する方針の表明に関すること。", "作業の管理に関すること。", "健康診断の実施に関すること。", "衛生教育に関すること。", "労働者の健康障害の原因の調査及び再発防止のための措置に関すること。"], "answer": 1, "explanation": "（1）定められていない。安全衛生に関する方針の表明は総括安全衛生管理者が統括管理する業務である（安衛則第3条の2第1項①）。（2）～（5）定められている（安衛則第14条第1項）。【頻出】産業医の職務範囲は頻出。"},
  {"id": "Q423", "date": "2021年10月", "dateList": "2021年10月、2021年4月", "frequency": 2, "importance": "C", "groupId": "G0202", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "産業医", "question": "産業医に関する次の記述のうち、法令上、誤っているものはどれか。", "choices": ["産業医を選任した事業者は、産業医に対し、労働者の業務に関する情報であって産業医が労働者の健康管理等を適切に行うために必要と認めるものを提供しなければならない。", "産業医を選任した事業者は、その事業場における産業医の業務の具体的な内容、産業医に対する健康相談の申出の方法、産業医による労働者の心身の状態に関する情報の取扱いの方法を、労働者に周知させなければならない。", "産業医は、衛生委員会に対して労働者の健康を確保する観点から必要な調査審議を求めることができる。", "産業医は、衛生委員会を開催した都度作成する議事概要を、毎月１回以上、事業者から提供されている場合には、作業場等の巡視の頻度を、毎月１回以上から２か月に１回以上にすることができる。", "事業者は、産業医から労働者の健康管理等について勧告を受けたときは、当該勧告の内容及び当該勧告を踏まえて講じた措置の内容を記録し、これを３年間保存しなければならない。"], "answer": 4, "explanation": "（1）正しい：安衛法第13条第4項。（2）正しい：安衛法第13条の3第1項。（3）正しい：安衛則第23条第5項。（4）誤り：議事概要の提供ではなく「衛生管理者が行う巡視の結果等を事業者が産業医に提供すること」が条件。安衛則第15条第1項。（5）正しい：安衛則第14条の3第2項。【頻出】産業医の巡視頻度の緩和要件は頻出。"},
  {"id": "Q024", "date": "2025年10月", "dateList": "2024年10月、2025年10月", "frequency": 2, "importance": "C", "groupId": "G0138", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "総括安全衛生管理者", "question": "常時使用する労働者数が100人の事業場で、法令上、総括安全衛生管理者の選任が義務付けられている業種は、次のうちどれか。", "choices": ["医療業", "熱供給業", "通信業", "水道業", "清掃業"], "answer": 5, "explanation": "(1)(2)(3)(4)義務付けられていない。安衛令第2条第1項②③。\n(5)【正解】義務付けられている。清掃業は常時100人以上で総括安全衛生管理者の選任が必要な業種に該当する。安衛令第2条第1項①。\n【頻出】総括安全衛生管理者の選任義務がある業種と人数要件は頻出。"},
  {"id": "Q072", "date": "2025年4月", "dateList": "2024年4月、2025年4月", "frequency": 2, "importance": "C", "groupId": "G0140", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "総括安全衛生管理者", "question": "常時使用する労働者数が300人の事業場で、法令上、総括安全衛生管理者の選任が義務付けられていない業種は、次のうちどれか。", "choices": ["通信業", "自動車整備業", "旅館業", "清掃業", "警備業"], "answer": 5, "explanation": "(1)～(4)義務付けられている。安衛令第2条第1項②。\n(5)【正解】義務付けられていない。警備業は300人の事業場では総括安全衛生管理者の選任義務がない（1,000人以上で義務）。安衛令第2条第1項③。\n【頻出】業種と総括安全衛生管理者の選任人数要件は頻出。"},
  {"id": "Q272", "date": "2023年4月", "dateList": "2023年4月", "frequency": 1, "importance": "D", "groupId": "G0137", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "総括安全衛生管理者", "question": "常時使用する労働者数が100人で、次の業種に属する事業場のうち、法令上、総括安全衛生管理者の選任が義務付けられていないものの業種はどれか。", "choices": ["林業", "清掃業", "燃料小売業", "建設業", "運送業"], "answer": 3, "explanation": "(3)義務付けられていない。燃料小売業は常時300人以上で選任義務がある業種区分に該当（安衛令第2条第1項②）。100人では非該当。(1)(2)(4)(5)は常時100人以上で選任義務あり（安衛令第2条第1項①）。"},
  {"id": "Q322", "date": "2022年10月", "dateList": "2022年10月", "frequency": 1, "importance": "D", "groupId": "G0217", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "総括安全衛生管理者", "question": "総括安全衛生管理者に関する次の記述のうち、法令上、誤っているものはどれか。", "choices": ["総括安全衛生管理者は、事業場においてその事業の実施を統括管理する者又はこれに準ずる者を充てなければならない。", "都道府県労働局長は、労働災害を防止するため必要があると認めるときは、総括安全衛生管理者の業務の執行について事業者に勧告することができる。", "総括安全衛生管理者は、選任すべき事由が発生した日から14日以内に選任しなければならない。", "総括安全衛生管理者を選任したときは、遅滞なく、選任報告書を、所轄労働基準監督署長に提出しなければならない。", "危険性又は有害性等の調査及びその結果に基づき講ずる措置に関することは総括安全衛生管理者が統括管理する業務のうちの一つである。"], "answer": 1, "explanation": "(1)誤り。総括安全衛生管理者は「事業の実施を統括管理する者」を充てるのであり、「これに準ずる者」は含まれない。安衛法第10条第2項。(2)正しい：安衛法第10条第3項。(3)正しい：安衛則第2条第1項。(4)正しい：安衛則第2条第2項。(5)正しい：安衛則第3条の2第1項②。"},
  {"id": "Q373", "date": "2022年4月", "dateList": "2022年4月", "frequency": 1, "importance": "D", "groupId": "G0218", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "総括安全衛生管理者", "question": "総括安全衛生管理者又は産業医に関する次の記述のうち、法令上、誤っているものはどれか。ただし、産業医の選任の特例はないものとする。", "choices": ["総括安全衛生管理者は、事業場においてその事業の実施を統括管理する者をもって充てなければならない。", "都道府県労働局長は、労働災害を防止するため必要があると認めるときは、総括安全衛生管理者の業務の執行について事業者に勧告することができる。", "総括安全衛生管理者が旅行、疾病、事故その他やむを得ない事由によって職務を行うことができないときは、代理者を選任しなければならない。", "産業医は、衛生委員会を開催した都度作成する議事概要を、毎月１回以上、事業者から提供されている場合には、作業場等の巡視の頻度を、毎月１回以上から２か月に１回以上にすることができる。", "事業者は、産業医から労働者の健康管理等について勧告を受けたときは、当該勧告の内容及び当該勧告を踏まえて講じた措置の内容（措置を講じない場合にあっては、その旨及びその理由）を記録し、これを３年間保存しなければならない。"], "answer": 4, "explanation": "（1）正しい：安衛法第10条第2項。（2）正しい：安衛法第10条第3項。（3）正しい：安衛則第3条。（4）誤り：議事概要の提供に加え「事業者の同意を得ているとき」に巡視頻度を2か月に1回にできる。事業者の同意が条件として欠けている。安衛則第15条。（5）正しい：安衛則第14条の3第2項。【頻出】産業医の巡視頻度の緩和要件は頻出。"},
  {"id": "Q422", "date": "2021年10月", "dateList": "2021年10月", "frequency": 1, "importance": "D", "groupId": "G0139", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "総括安全衛生管理者", "question": "常時使用する労働者数が300人で、次の業種に属する事業場のうち、法令上、総括安全衛生管理者の選任が義務付けられていない業種はどれか。", "choices": ["通信業", "各種商品小売業", "旅館業", "ゴルフ場業", "医療業"], "answer": 5, "explanation": "（1）～（4）義務付けられている：安衛令第2条第1項②（300人以上）。（5）義務付けられていない：医療業は安衛令第2条第1項③（1,000人以上）に該当するため、300人では選任不要。【頻出】業種別の総括安全衛生管理者の選任基準は頻出。"},
  {"id": "Q129", "date": "2024年10月", "dateList": "2021年4月、2024年10月", "frequency": 2, "importance": "C", "groupId": "G0059", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "育児時間", "question": "労働基準法に定める育児時間に関する次の記述のうち、誤っているものはどれか。", "choices": ["生後満１年に達しない生児を育てる労働者は、男性、女性共に育児時間を請求することができる。", "育児時間は、１日２回、１回当たり少なくとも30分の時間を請求することができる。", "育児時間中は、育児時間を請求した労働者を使用してはならない。", "育児時間を請求しない労働者に対しては、育児時間を与えなくてもよい。", "育児時間は、必ずしも有給としなくてもよい。"], "answer": 1, "explanation": "（1）誤り。育児時間を請求できるのは女性のみであり、男性は請求できない（労基法第67条）。（2）～（5）正しい。【頻出】育児時間の請求権者（女性のみ）は頻出。"},
  {"id": "Q027", "date": "2025年10月", "dateList": "2025年10月、2025年4月", "frequency": 2, "importance": "C", "groupId": "G0037", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "衛生基準", "question": "事業場の建築物、施設等に関する措置について、労働安全衛生規則の衛生基準に違反しているものは次のうちどれか。", "choices": ["常時40人の労働者を就業させている屋内作業場の気積が、設備の占める容積及び床面から3mを超える高さにある空間を除き400m³となっている。", "ねずみ、昆虫等の発生場所、生息場所及び侵入経路並びにねずみ、昆虫等による被害の状況について、6か月ごとに1回、定期に、統一的に調査を実施し、その調査結果に基づき、必要な措置を講じている。", "男性5人を含む常時30人の労働者が就業している事業場で、女性用には臥床することのできる休養室を設けているが、男性用には、臥床することのできない休憩設備を利用させている。", "事業場に附属する食堂の床面積を、食事の際の1人について、1m²を超えるようにしている。", "事業場に附属する炊事場の入口には、洗浄剤を含浸させたマットを設置して、土足のままでも立ち入ることができるようにしている。"], "answer": 5, "explanation": "(1)違反していない。400m³÷40人＝10m³で、1人10m³以上を満たす。安衛則第600条第1項。\n(2)違反していない。安衛則第619条第1項②。\n(3)違反していない。男性5人、女性25人で常時30人だが、男女別に休養室を区別する要件（常時50人以上又は女性30人以上）に達していない。安衛則第618条。\n(4)違反していない。安衛則第630条第1項②。\n(5)【正解】違反している。炊事場には専用の履物を備え、土足のまま立ち入らせてはならない。安衛則第630条第1項⑮。\n【頻出】事業場の衛生基準（気積、休養室、食堂・炊事場）は頻出。"},
  {"id": "Q127", "date": "2024年10月", "dateList": "2021年10月、2022年4月、2023年10月、2023年4月、2024年10月", "frequency": 5, "importance": "A", "groupId": "G0036", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "衛生基準", "question": "事業場の建築物、施設等に関する措置について、労働安全衛生規則の衛生基準に違反していないものは次のうちどれか。", "choices": ["日常行う清掃のほか、大掃除を、１年に１回、定期に、統一的に行っている。", "男性25人、女性25人の労働者を常時使用している事業場で、労働者が臥床することのできる休養室又は休養所を男性用と女性用に区別して設けていない。", "60人の労働者を常時就業させている屋内作業場の気積が、設備の占める容積及び床面から４mを超える高さにある空間を除き、500㎥となっている。", "事業場に附属する食堂の床面積を、食事の際の１人について、0.8㎡としている。", "労働者を常時就業させる場所の作業面の照度を、精密な作業については500ルクス、粗な作業については100ルクスとしている。"], "answer": 5, "explanation": "（1）違反している。大掃除は「1年に1回」ではなく「6か月以内ごとに1回」行わなければならない（安衛則第619条第1項①）。（2）違反している。常時50人以上であれば男女区別した休養室又は休養所が必要である（安衛則第618条）。（3）違反している。500㎥÷60人＝約8.3㎥で、1人10㎥以上の基準を満たない（安衛則第600条第1項）。（4）違反している。食堂の床面積は1人について1㎡以上必要である（安衛則第630条第1項②）。（5）違反していない（安衛則第604条第1項）。【頻出】衛生基準の数値（気積10㎥、食堂1㎡、大掃除6か月）は頻出。"},
  {"id": "Q477", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0005", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "衛生基準", "question": "ある屋内作業場の床面から４ｍをこえない部分の容積が150㎥であり、このうち設備の占める分の容積が55㎥であるとき、法令上、常時就業させることのできる最大の労働者数は次のうちどれか。", "choices": ["４人", "９人", "10人", "15人", "19人"], "answer": 2, "explanation": "気積＝150−55＝95㎥。労働者1人あたり10㎥以上が必要。95÷10＝9.5→小数点切り捨てで9人。安衛則第600条。【頻出】気積の計算問題は頻出。"},
  {"id": "Q023", "date": "2025年10月", "dateList": "2023年10月、2025年10月、2025年4月", "frequency": 3, "importance": "B", "groupId": "G0232", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "衛生委員会", "question": "衛生委員会に関する次の記述のうち、法令上、誤っているものはどれか。", "choices": ["衛生委員会の議長を除く委員の半数については、事業場に労働者の過半数で組織する労働組合がないときは、労働者の過半数を代表する者の推薦に基づき指名しなければならない。", "衛生委員会の議長は、原則として、総括安全衛生管理者又は総括安全衛生管理者以外の者で事業場においてその事業の実施を統括管理するもの若しくはこれに準ずる者のうちから事業者が指名した委員がなるものとする。", "事業場に専属ではないが、衛生管理者として選任している労働衛生コンサルタントを、衛生委員会の委員として指名することができる。", "作業環境測定を外部の作業環境測定機関に委託して実施している場合、当該作業環境測定を実施している作業環境測定士を、衛生委員会の委員として指名することができる。", "衛生委員会の付議事項には、長時間にわたる労働による労働者の健康障害の防止を図るための対策の樹立に関することが含まれる。"], "answer": 4, "explanation": "(1)正しい。安衛法第18条第4項、第17条第4項。\n(2)正しい。安衛法第18条第2項①。\n(3)正しい。安衛法第18条第2項②。\n(4)【正解】誤り。衛生委員会の委員として指名できる作業環境測定士は事業場に専属の労働者である必要がある。外部委託先の作業環境測定士は指名できない。安衛法第18条第3項。\n(5)正しい。安衛則第22条⑨。\n【頻出】衛生委員会の構成員要件は頻出。"},
  {"id": "Q122", "date": "2024年10月", "dateList": "2022年4月、2023年4月、2024年10月", "frequency": 3, "importance": "B", "groupId": "G0231", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "衛生委員会", "question": "衛生委員会に関する次の記述のうち、法令上、正しいものはどれか。", "choices": ["衛生委員会の議長は、衛生管理者である委員のうちから、事業者が指名しなければならない。", "衛生委員会の議長を除く全委員については、事業場に労働者の過半数で組織する労働組合がないときは、労働者の過半数を代表する者の推薦に基づき指名しなければならない。", "衛生管理者として選任しているが事業場に専属でない労働衛生コンサルタントを、衛生委員会の委員として指名することはできない。", "当該事業場の労働者で、作業環境測定を実施している作業環境測定士を衛生委員会の委員として指名することができる。", "衛生委員会は、毎月１回以上開催するようにし、議事で重要なものに係る記録を作成して、これを５年間保存しなければならない。"], "answer": 4, "explanation": "（1）誤り。議長は総括安全衛生管理者又はそれに準ずる者から指名する（安衛法第18条第2項①、第4項）。（2）誤り。「全委員」ではなく「委員の半数」について推薦に基づき指名する（安衛法第18条第4項）。（3）誤り。専属でない労働衛生コンサルタントでも委員として指名できる。（4）正しい。作業環境測定士を委員として指名できる（安衛法第18条第3項）。（5）誤り。「5年間」ではなく「3年間」保存しなければならない（安衛則第23条第1項、第4項）。【頻出】衛生委員会の構成と運営は頻出。"},
  {"id": "Q021", "date": "2025年10月", "dateList": "2022年4月、2025年10月", "frequency": 2, "importance": "C", "groupId": "G0040", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "衛生管理体制", "question": "事業場の衛生管理体制に関する次の記述のうち、法令上、誤っているものはどれか。\nただし、衛生管理者及び産業医の選任の特例はないものとする。", "choices": ["常時500人を超え1,000人以下の労働者を使用し、そのうち、深夜業を含む業務に常時30人以上の労働者を従事させる事業場では、衛生管理者のうち少なくとも1人を専任の衛生管理者としなければならない。", "常時1,000人を超え2,000人以下の労働者を使用する事業場では、4人以上の衛生管理者を選任しなければならない。", "常時50人以上の労働者を使用するゴルフ場業の事業場では、第二種衛生管理者免許を有する者のうちから衛生管理者を選任することができる。", "常時1,000人以上の労働者を使用する事業場では、その事業場に専属の産業医を選任しなければならない。", "衛生管理者を選任したときは、遅滞なく、その氏名等を所轄労働基準監督署長に報告しなければならない。"], "answer": 1, "explanation": "(1)【正解】誤り。深夜業は衛生管理者の専任が必要となる有害業務に該当しない。安衛則第7条第1項④⑤。\n(2)正しい。安衛則第7条第1項④。\n(3)正しい。安衛則第7条第1項③。\n(4)正しい。安衛則第13条第1項③。\n(5)正しい。安衛則第7条第3項。\n【頻出】衛生管理者の選任要件・専任要件は頻出テーマ。"},
  {"id": "Q022", "date": "2025年10月", "dateList": "2024年4月、2025年10月、2025年4月", "frequency": 3, "importance": "B", "groupId": "G0233", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "衛生管理体制", "question": "衛生管理者が管理すべき業務として、法令上、定められていないものは次のうちどれか。\nただし、次のそれぞれの業務のうち衛生に係る技術的事項に限るものとする。", "choices": ["労働災害の原因の調査及び再発防止対策に関すること。", "安全衛生に関する方針の表明に関すること。", "少なくとも毎日1回作業場等を巡視し、衛生状態に有害のおそれがあるときは、直ちに、労働者の健康障害を防止するため必要な措置を講ずること。", "化学物質等による危険性又は有害性等の調査及びその結果に基づき講ずる措置に関すること。", "健康診断の実施その他健康の保持増進のための措置に関すること。"], "answer": 3, "explanation": "(1)定められている。安衛法第10条第1項④。\n(2)定められている。安衛則第3条の2第1項①。\n(3)【正解】定められていない。衛生管理者の巡視は「毎週1回」であり、「毎日1回」ではない。安衛則第11条第1項。\n(4)定められている。安衛則第3条の2第1項②。\n(5)定められている。安衛法第10条第3項。\n【頻出】衛生管理者の巡視頻度（毎週1回）と産業医の巡視頻度の区別は頻出。"},
  {"id": "Q071", "date": "2025年4月", "dateList": "2021年10月、2025年4月", "frequency": 2, "importance": "C", "groupId": "G0038", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "衛生管理体制", "question": "事業場の衛生管理体制に関する次の記述のうち、法令上、正しいものはどれか。\nただし、衛生管理者及び産業医の選任の特例はないものとする。", "choices": ["常時50人以上の労働者を使用するゴルフ場業の事業場では、第二種衛生管理者免許を有する者のうちから衛生管理者を選任することができる。", "常時2,000人を超え3,000人以下の労働者を使用する事業場では4人以上の衛生管理者を選任しなければならない。", "常時300人以上1,000人未満の労働者を使用する各種商品小売業の事業場では、総括安全衛生管理者を選任しなくてもよい。", "常時800人以上の労働者を使用する事業場では、その事業場に専属の産業医を選任しなければならない。", "2人以上の衛生管理者を選任すべき事業場では、そのうち1人については、労働衛生コンサルタントのうちから選任しなければならない。"], "answer": 1, "explanation": "(1)【正解】正しい。ゴルフ場業では第二種衛生管理者免許を有する者から選任できる。安衛則第7条第1項③④。\n(2)誤り。2,000人超3,000人以下は5人以上。安衛則第7条第1項④。\n(3)誤り。各種商品小売業は300人以上で総括安全衛生管理者の選任が必要。安衛令第2条第1項②。\n(4)誤り。専属の産業医が必要なのは常時1,000人以上。安衛則第13条第1項③。\n(5)誤り。2人以上の場合、1人は事業場に専属の者を選任。労働衛生コンサルタントからの選任義務ではない。安衛則第7条第1項②。\n【頻出】衛生管理者の選任要件（業種別・人数別）は頻出。"},
  {"id": "Q121", "date": "2024年10月", "dateList": "2023年4月、2024年10月、2024年4月", "frequency": 3, "importance": "B", "groupId": "G0236", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "衛生管理体制", "question": "衛生管理者又は衛生推進者の選任について、法令に違反しているものは次のうちどれか。ただし、衛生管理者の選任の特例はないものとする。", "choices": ["常時40人の労働者を使用する金融業の事業場において、衛生管理者は選任していないが、衛生推進者を１人選任している。", "常時200人の労働者を使用する水産業の事業場において、衛生工学衛生管理者免許を有する者のうちから衛生管理者を１人選任している。", "常時300人の労働者を使用する電気業の事業場において、第二種衛生管理者免許を有する者のうちから衛生管理者を２人選任している。", "常時600人の労働者を使用する各種商品小売業の事業場において、３人の衛生管理者のうち２人を事業場に専属で第一種衛生管理者免許を有する者のうちから選任し、他の１人を事業場に専属でない労働衛生コンサルタントから選任している。", "常時1,200人の労働者を使用する各種商品卸売業の事業場において、第二種衛生管理者免許を有する者のうちから、衛生管理者を４人選任し、そのうち１人を専任の衛生管理者としているが、他の３人には他の業務を兼務させている。"], "answer": 3, "explanation": "（1）違反していない（安衛法第12条の2、安衛則第12条の2）。（2）違反していない（安衛則第7条第1項③④）。（3）違反している。電気業は第二種衛生管理者免許では衛生管理者になれない業種であり、第一種衛生管理者免許若しくは衛生工学衛生管理者免許を有する者又は医師、歯科医師、労働衛生コンサルタント等から選任しなければならない（安衛則第7条第1項③④）。（4）違反していない（安衛則第7条第1項②③④）。（5）違反していない（安衛則第7条第1項③④⑤）。【頻出】業種による衛生管理者免許の制限は頻出。"},
  {"id": "Q221", "date": "2023年10月", "dateList": "2022年10月、2023年10月", "frequency": 2, "importance": "C", "groupId": "G0039", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "衛生管理体制", "question": "事業場の衛生管理体制に関する次の記述のうち、法令上、誤っているものはどれか。ただし、衛生管理者の選任の特例はないものとする。", "choices": ["常時300人以上の労働者を使用する各種商品小売業の事業場では、総括安全衛生管理者を選任しなければならない。", "常時50人以上の労働者を使用する通信業の事業場では、第二種衛生管理者免許を受けた者のうちから衛生管理者を選任することができる。", "常時50人以上の労働者を使用する運送業の事業場では、第二種衛生管理者免許を受けた者のうちから衛生管理者を選任することができる。", "常時50人以上の労働者を使用するゴルフ場業の事業場では、第二種衛生管理者免許を有する者のうちから衛生管理者を選任することができる。", "常時50人以上の労働者を使用する旅館業の事業場では、第二種衛生管理者免許を有する者のうちから衛生管理者を選任することができる。"], "answer": 3, "explanation": "(3)誤り。運送業は第一種衛生管理者免許若しくは衛生工学衛生管理者免許を有する者又は医師等から選任が必要（第二種では不可）。安衛則第7条第1項③イ。(1)正しい：安衛則第2条②。(2)(4)(5)正しい：通信業・ゴルフ場業・旅館業は第二種で可。安衛則第7条第1項③ロ。"},
  {"id": "Q471", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0235", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "衛生管理体制", "question": "衛生管理者の選任について、法令上、定められているものは次のうちどれか。ただし、衛生管理者の選任の特例はないものとする。", "choices": ["衛生管理者を選任したときは、遅滞なく、所定の様式による報告書を、所轄労働基準監督署長に提出しなければならない。", "常時使用する労働者数が60人の電気業の事業場では、第二種衛生管理者免許を有する者のうちから衛生管理者を選任することができる。", "常時使用する労働者数が1,000人を超え2,000人以下の事業場では、少なくとも３人の衛生管理者を選任しなければならない。", "常時使用する労働者数が3,000人を超える事業場では、６人の衛生管理者のうち２人まで、事業場に専属でない労働衛生コンサルタントのうちから選任することができる。", "常時使用する労働者数が2,000人以上の事業場では、専任の衛生管理者を２人以上選任しなければならない。"], "answer": 1, "explanation": "（1）定められている：安衛法第7条第2項。（2）定められていない：電気業は第1種が必要。（3）定められていない：4人が正しい。（4）定められていない：専属でないコンサルタントは1名まで。（5）定められていない：専任は少なくとも1人。【頻出】衛生管理者の選任規定は最頻出。"},
  {"id": "Q472", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0234", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "衛生管理体制", "question": "衛生管理者の職務又は業務として、法令上、定められていないものは次のうちどれか。", "choices": ["健康診断の実施その他健康の保持増進のための措置に関すること。", "労働災害の原因の調査及び再発防止対策に関すること。", "安全衛生に関する方針の表明に関すること。", "少なくとも毎週１回作業場等を巡視し、衛生状態に有害のおそれがあるときは、直ちに必要な措置を講ずること。", "労働者の健康を確保するため必要があると認めるとき、事業者に対し、労働者の健康管理等について必要な勧告をすること。"], "answer": 5, "explanation": "（1）～（4）定められている。（5）定められていない：これは産業医の職務。安衛法第13条第5項。【頻出】衛生管理者と産業医の職務の区別は頻出。"},
  {"id": "Q026", "date": "2025年10月", "dateList": "2022年4月、2025年10月", "frequency": 2, "importance": "C", "groupId": "G0071", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "雇入時の健康診断", "question": "労働安全衛生規則に基づく医師による雇入時の健康診断に関する次の記述のうち、誤っているものはどれか。", "choices": ["事業場に雇い入れる日の6か月前に医師による健康診断を受けた労働者に対しても、法定の全ての項目について雇入時の健康診断を行わなければならない。", "雇入時の健康診断における聴力の検査は、1,000Hz及び4,000Hzの音に係る聴力について行わなければならない。", "50人以上の労働者に対して雇入時の健康診断を行ったときは、遅滞なく、その結果を所轄労働基準監督署長に報告しなければならない。", "事業場において実施した雇入時の健康診断の項目に異常の所見があると診断された労働者については、その結果に基づき、健康を保持するために必要な措置について、健康診断が行われた日から3か月以内に、医師の意見を聴かなければならない。", "雇入時の健康診断の結果に基づき、健康診断個人票を作成して、これを5年間保存しなければならない。"], "answer": 3, "explanation": "(1)正しい。安衛則第43条第1項。雇入時健康診断には項目の省略が認められていない。\n(2)正しい。安衛則第43条第1項③。\n(3)【正解】誤り。雇入時の健康診断の結果は所轄労働基準監督署長への報告義務がない。報告が必要なのは定期健康診断の場合。安衛則第52条第1項。\n(4)正しい。安衛則第51条の2第1項①。\n(5)正しい。安衛則第51条第1項。\n【頻出】雇入時健康診断と定期健康診断の違い（報告義務、項目省略可否）は頻出。"},
  {"id": "Q124", "date": "2024年10月", "dateList": "2024年10月", "frequency": 1, "importance": "D", "groupId": "G0075", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "面接指導", "question": "労働時間の状況等が一定の要件に該当する労働者に対して、法令により実施することが義務付けられている医師による面接指導に関する次の記述のうち、正しいものはどれか。ただし、新たな技術、商品又は役務の研究開発に係る業務に従事する者、高度プロフェッショナル制度の対象者及び医師はいないものとする。", "choices": ["面接指導の対象となる労働者の要件は、原則として、休憩時間を除き１週間当たり40時間を超えて労働させた場合におけるその超えた時間が１か月当たり100時間を超え、かつ、疲労の蓄積が認められる者であることとする。", "事業者は、面接指導を実施するため、タイムカードによる記録等の客観的な方法その他の適切な方法により、労働者の労働時間の状況を把握し、その記録を作成して３年間保存するための必要な措置を講じなければならない。", "事業者は、労働時間の状況等が一定の要件に該当する労働者から申出があったときは、３か月以内に、面接指導を行わなければならない。", "面接指導を行う医師として事業者が指定することのできる医師は、当該事業場の産業医に限られる。", "事業者は、面接指導の結果に基づき、労働者の健康を保持するために必要な措置について、原則として、面接指導が行われた日から３か月以内に、医師の意見を聴かなければならない。"], "answer": 2, "explanation": "（1）誤り。「100時間」ではなく「80時間」を超えた場合である（安衛則第52条の2第1項）。（2）正しい。タイムカード等の客観的方法により労働時間の状況を把握し、記録を3年間保存する（安衛法第66条の8の3、安衛則第52条の7の3第1項、第2項）。（3）誤り。「3か月以内に」ではなく「遅滞なく」行わなければならない（安衛則第52条の3第3項）。（4）誤り。産業医に限るとの定めはない（安衛法第66条の8第1項、第2項）。（5）誤り。「3か月以内に」ではなく「遅滞なく」意見を聴かなければならない（安衛則第52条の7）。【頻出】面接指導の要件（80時間）と期限（遅滞なく）は頻出。"},
  {"id": "Q275", "date": "2023年4月", "dateList": "2022年10月、2023年4月", "frequency": 2, "importance": "C", "groupId": "G0076", "category": "関係法令（有害業務に係るもの以外のもの）", "subcategory": "面接指導", "question": "労働時間の状況等が一定の要件に該当する労働者に対して、法令により実施することが義務付けられている医師による面接指導に関する次の記述のうち、正しいものはどれか。ただし、新たな技術、商品又は役務の研究開発に係る業務に従事する者及び高度プロフェッショナル制度の対象者はいないものとする。", "choices": ["面接指導の対象となる労働者の要件は、原則として、休憩時間を除き1週間当たり40時間を超えて労働させた場合におけるその超えた時間が1か月当たり80時間を超え、かつ、疲労の蓄積が認められる者であることとする。", "事業者は、面接指導を実施するため、タイムカードによる記録等の客観的な方法その他の適切な方法により、監督又は管理の地位にある者を除き、労働者の労働時間の状況を把握しなければならない。", "面接指導を行う医師として事業者が指定することのできる医師は、当該事業場の産業医に限られる。", "事業者は、面接指導の対象となる労働者の要件に該当する労働者から面接指導を受ける旨の申出があったときは、申出の日から3か月以内に、面接指導を行わなければならない。", "事業者は、面接指導の結果に基づき、当該面接指導の結果の記録を作成して、これを3年間保存しなければならない。"], "answer": 1, "explanation": "(1)正しい。週40時間超の時間外が月80時間超かつ疲労蓄積が要件。安衛則第52条の2。(2)誤り：管理監督者を除くとの規定なし。(3)誤り：産業医に限定されない。(4)誤り：「遅滞なく」実施。(5)誤り：記録保存は「5年間」。安衛則第52条の6。"},
  {"id": "Q257", "date": "2023年4月", "dateList": "2022年10月、2023年4月", "frequency": 2, "importance": "C", "groupId": "G0009", "category": "関係法令（有害業務に係るもの）", "subcategory": "じん肺法", "question": "じん肺法に関する次の記述のうち、法令上、誤っているものはどれか。", "choices": ["じん肺管理区分の管理一は、じん肺健康診断の結果、じん肺の所見がないと認められるものをいう。", "じん肺管理区分の管理二は、じん肺健康診断の結果、エックス線写真の像が第一型でじん肺による著しい肺機能の障害がないと認められるものをいう。", "常時粉じん作業に従事する労働者でじん肺管理区分が管理二であるものに対しては、1年以内ごとに1回、定期的に、じん肺健康診断を行わなければならない。", "都道府県労働局長は、事業者から、法令に基づいて、じん肺の所見があると診断された労働者についてのエックス線写真等が提出されたときは、これらを基礎として、地方じん肺診査医の診断又は審査により、当該労働者についてじん肺管理区分の決定をするものとする。", "じん肺管理区分が管理三と決定された者及び合併症にかかっていると認められる者は、療養を要するものとする。"], "answer": 5, "explanation": "(5)誤り。療養を要するのは「管理四」であり「管理三」ではない。じん肺法第23条。(1)(2)正しい：じん肺法第4条第2項。(3)正しい：じん肺法第8条第1項②。(4)正しい：じん肺法第13条第2項。"},
  {"id": "Q002", "date": "2025年10月", "dateList": "2025年10月", "frequency": 1, "importance": "D", "groupId": "G0161", "category": "関係法令（有害業務に係るもの）", "subcategory": "作業主任者", "question": "次のAからDの作業について、法令上、作業主任者の選任が義務付けられているものの組合せは(1)～(5)のうちどれか。\nA 水深10m以上の場所における潜水の作業\nB セメント製造工程においてセメントを袋詰めする作業\nC 圧気工法により、大気圧を超える気圧下の作業室において行う作業\nD 石炭を入れてあるホッパーの内部における作業", "choices": ["A，B", "A，C", "A，D", "B，C", "C，D"], "answer": 5, "explanation": "安衛法第14条、安衛令第6条。\nA：義務付けられていない。\nB：義務付けられていない。\nC：義務付けられている。高圧室内作業に該当し、高圧室内作業主任者の選任が必要。安衛令第6条第1項①。\nD：義務付けられている。酸素欠乏危険作業に該当し、酸素欠乏危険作業主任者の選任が必要。安衛令第6条第1項㉑、安衛令別表第6⑤。\n【頻出】作業主任者の選任が必要な作業の判別は頻出。"},
  {"id": "Q102", "date": "2024年10月", "dateList": "2024年10月、2024年4月", "frequency": 2, "importance": "C", "groupId": "G0168", "category": "関係法令（有害業務に係るもの）", "subcategory": "作業主任者", "question": "次の作業を行うとき、法令上、作業主任者の選任が義務付けられているものはどれか。", "choices": ["ドライアイスを使用して冷蔵を行っている冷蔵庫の内部における作業", "屋内で粉状のアルミニウムを袋詰めする作業", "レーザー光線による金属加工の作業", "試験研究業務として塩素を取り扱う作業", "潜水器を用いボンベからの給気を受けて行う潜水作業"], "answer": 1, "explanation": "（1）義務付けられている。ドライアイスを使用して冷蔵を行っている冷蔵庫の内部は酸素欠乏危険場所に該当し、酸素欠乏危険作業主任者を選任する必要がある（安衛令第6条第1項、安衛令別表第6⑩）。（2）～（5）義務付けられていない。【頻出】酸素欠乏危険場所と作業主任者の選任義務は頻出。"},
  {"id": "Q252", "date": "2023年4月", "dateList": "2023年4月", "frequency": 1, "importance": "D", "groupId": "G0162", "category": "関係法令（有害業務に係るもの）", "subcategory": "作業主任者", "question": "次のAからDの作業について、法令上、作業主任者の選任が義務付けられているものの組合せは(1)～(5)のうちどれか。\nA 水深10m以上の場所における潜水の作業\nB セメント製造工程においてセメントを袋詰めする作業\nC 製造工程において硫酸を用いて行う洗浄の作業\nD 石炭を入れてあるホッパーの内部における作業", "choices": ["A，B", "A，C", "A，D", "B，C", "C，D"], "answer": 5, "explanation": "C・Dが作業主任者の選任義務あり。C：硫酸は特定化学物質第3類物質で、特定化学物質作業主任者を選任（安衛令第6条第1項⑱、別表第3第3号）。D：石炭を入れてあるホッパー内部は酸素欠乏危険場所で、酸素欠乏危険作業主任者を選任（安衛令第6条第1項㉑、別表第6第5号）。A：潜水作業は作業主任者不要。B：セメント袋詰めは作業主任者不要。"},
  {"id": "Q352", "date": "2022年4月", "dateList": "2022年4月", "frequency": 1, "importance": "D", "groupId": "G0182", "category": "関係法令（有害業務に係るもの）", "subcategory": "作業主任者", "question": "次のＡからＤの作業について、法令上、作業主任者の選任が義務付けられているものの組合せは(１)～(５)のうちどれか。Ａ 乾性油を入れてあるタンクの内部における作業　Ｂ セメント製造工程においてセメントを袋詰めする作業　Ｃ 溶融した鉛を用いて行う金属の焼入れの業務に係る作業　Ｄ 圧気工法により、大気圧を超える気圧下の作業室の内部において行う作業", "choices": ["Ａ，Ｂ", "Ａ，Ｃ", "Ａ，Ｄ", "Ｂ，Ｃ", "Ｃ，Ｄ"], "answer": 3, "explanation": "Ａ：該当する。乾性油を入れてあるタンク内部は酸素欠乏危険場所であり、酸素欠乏危険作業主任者の選任が必要。安衛令第6条第1項㉑、安衛令別表第6⑤。Ｂ：該当しない。セメント袋詰めは粉じん作業だが、作業主任者の選任義務はない。Ｃ：該当しない。溶融した鉛を用いる焼入れは鉛業務だが、作業主任者を選任する作業に該当しない。安衛令第6条第1項⑲。Ｄ：該当する。高圧室内作業のため、高圧室内作業主任者の選任が必要。安衛令第6条第1項①。よってＡとＤ。【頻出】作業主任者の選任が必要な作業の組合せ問題は定番。"},
  {"id": "Q403", "date": "2021年10月", "dateList": "2021年10月", "frequency": 1, "importance": "D", "groupId": "G0183", "category": "関係法令（有害業務に係るもの）", "subcategory": "作業主任者", "question": "次のＡからＤの作業について、法令上、作業主任者の選任が義務付けられているものの組合せは(１)～(５)のうちどれか。Ａ 水深10ｍ以上の場所における潜水の作業　Ｂ セメント製造工程においてセメントを袋詰めする作業　Ｃ 製造工程において硫酸を用いて行う洗浄の作業　Ｄ 石炭を入れてあるホッパーの内部における作業", "choices": ["Ａ，Ｂ", "Ａ，Ｃ", "Ａ，Ｄ", "Ｂ，Ｃ", "Ｃ，Ｄ"], "answer": 5, "explanation": "Ａ：義務付けられていない。Ｂ：義務付けられていない。Ｃ：義務付けられている。硫酸は特定化学物質第3類物質であり、特定化学物質作業主任者の選任が必要。安衛令第6条第1項⑱。Ｄ：義務付けられている。石炭を入れてあるホッパー内部は酸素欠乏危険場所。安衛令第6条第1項㉑、別表第6第5号。よってＣとＤ。【頻出】作業主任者の選任が必要な作業の識別は頻出。"},
  {"id": "Q454", "date": "2021年4月", "dateList": "2021年4月", "frequency": 1, "importance": "D", "groupId": "G0166", "category": "関係法令（有害業務に係るもの）", "subcategory": "作業主任者", "question": "次の作業のうち、法令上、作業主任者を選任しなければならないものはどれか。", "choices": ["製造工程において硝酸を用いて行う洗浄の作業", "強烈な騒音を発する場所における作業", "レーザー光線による金属加工の作業", "セメント製造工程においてセメントを袋詰めする作業", "潜水器からの給気を受けて行う潜水の作業"], "answer": 1, "explanation": "（1）選任しなければならない：硝酸は特定化学物質第3類物質。特定化学物質作業主任者の選任が必要。安衛令第6条第1項⑱。（2）～（5）選任の必要なし。【頻出】作業主任者の選任が必要な作業の識別は頻出。"},
  {"id": "Q008", "date": "2025年10月", "dateList": "2025年10月", "frequency": 1, "importance": "D", "groupId": "G0152", "category": "関係法令（有害業務に係るもの）", "subcategory": "作業環境測定", "question": "有害業務を行う作業場とその作業場において定期に測定することが義務付けられている項目の組合せとして、法令上、誤っているものは次のうちどれか。", "choices": ["溶融ガラスからガラス製品を成型する業務を行う屋内作業場……空気中の粉じんの濃度", "加硫がまによりゴムを加硫する業務を行う屋内作業場……気温及び湿度", "ドラムバーカーにより、木材を削皮する業務を行う屋内作業場……等価騒音レベル", "エックス線装置を用いて透過写真撮影の業務を行う作業場の管理区域……線量当量率又は線量当量", "廃棄物の焼却施設において焼却灰を取り扱う業務（設備の解体等に伴うものを除く。）を行う作業場……空気中のダイオキシン類の濃度"], "answer": 1, "explanation": "(1)【正解】誤り。溶融ガラスからガラス製品を成型する業務を行う屋内作業場で測定が義務付けられているのは「気温、湿度及びふく射熱」であり、粉じん濃度ではない。安衛則第587条⑧、第607条第1項。\n(2)正しい。安衛則第587条⑨、第607条。\n(3)正しい。安衛令第21条第1項③、安衛則第588条⑥、第590条第1項。\n(4)正しい。安衛令第21条第1項⑥、電離則第53条①、第54条。\n(5)正しい。安衛則第592条の2。\n【頻出】作業環境測定の測定項目と作業場の組合せは頻出。"},
  {"id": "Q052", "date": "2025年4月", "dateList": "2025年4月", "frequency": 1, "importance": "D", "groupId": "G0181", "category": "関係法令（有害業務に係るもの）", "subcategory": "作業環境測定", "question": "次の設備又は装置のうち、法令に基づく定期自主検査の実施頻度が1年以内ごとに1回とされていないものはどれか。", "choices": ["鉛化合物を製造する工程において鉛等の溶融を行う屋内の作業場所に設置した局所排気装置", "セメントを袋詰めする屋内の作業箇所に設置した局所排気装置に設けた除じん装置", "トルエンを用いて洗浄を行う屋内の作業場所に設置したプッシュプル型換気装置", "弗化水素を含有する気体を排出する製造設備の排気筒に設置した排ガス処理装置", "硫酸を取り扱う特定化学設備"], "answer": 5, "explanation": "(1)1年以内ごとに1回。鉛則第35条第2項①。\n(2)1年以内ごとに1回。粉じん則第17条第2項①。\n(3)1年以内ごとに1回。有機則第20条の2第2項。\n(4)1年以内ごとに1回。特化則第30条第1項③。\n(5)【正解】2年以内ごとに1回。特定化学設備の定期自主検査は2年以内ごとに1回。特化則第31条第1項①。\n【頻出】定期自主検査の頻度（1年 vs 2年）は頻出。"},
  {"id": "Q059", "date": "2025年4月", "dateList": "2025年4月", "frequency": 1, "importance": "D", "groupId": "G0178", "category": "関係法令（有害業務に係るもの）", "subcategory": "作業環境測定", "question": "次の法定の作業環境測定を行うとき、作業環境測定士に測定を実施させなければならないものはどれか。", "choices": ["チッパーによりチップする業務を行う屋内作業場における等価騒音レベルの測定。", "放射線業務を行う作業場のうち管理区域に該当する部分についての外部放射線による線量当量の測定。", "常時セメントを袋詰めする作業を行う屋内作業場における空気中の粉じん濃度の測定。", "溶融ガラスからガラス製品を成型する業務を行う屋内作業場における気温湿度及びふく射熱の測定。", "通気設備が設けられている坑内の作業場における通気量の測定。"], "answer": 3, "explanation": "(1)(2)(4)(5)作業環境測定を行う義務はあるが、指定作業場ではないため作業環境測定士による測定は不要。\n(3)【正解】屋内でセメントを袋詰めする作業は特定粉じん作業であり指定作業場に該当するため、作業環境測定士に測定を実施させなければならない。安衛令第21条、作環法第2条第1項第3号、第3条第1項。\n【頻出】指定作業場の判別は頻出。"},
  {"id": "Q153", "date": "2024年4月", "dateList": "2021年10月、2023年4月、2024年4月", "frequency": 3, "importance": "B", "groupId": "G0180", "category": "関係法令（有害業務に係るもの）", "subcategory": "作業環境測定", "question": "次の装置のうち、法令上、定期自主検査の実施義務が規定されているものはどれか。", "choices": ["木材加工用丸のこ盤を使用する屋内の作業場所に設けた局所排気装置", "塩酸を使用する屋内の作業場所に設けた局所排気装置", "エタノールを使用する作業場所に設けた局所排気装置", "トルエンを重量の10％含有する塗料を用いて塗装する屋内の作業場所に設けた局所排気装置", "アンモニアを使用する屋内の作業場所に設けたプッシュプル型換気装置"], "answer": 4, "explanation": "（1）規定されていない。木材加工用丸のこ盤の局所排気装置は定期自主検査の対象外（粉じん則第17条第1項）。（2）規定されていない。塩酸は特定化学物質第3類で対象外。（3）規定されていない。エタノールは対象外。（4）規定されている。トルエンを5％超含有するものは第2種有機溶剤であるため、屋内作業場の局所排気装置は定期自主検査の実施義務がある（有機則第5条、第20条）。（5）規定されていない。アンモニアは特定化学物質第3類で対象外。【頻出】定期自主検査の対象装置の判別は頻出。"},
  {"id": "Q155", "date": "2024年4月", "dateList": "2021年4月、2022年10月、2023年10月、2023年4月、2024年4月", "frequency": 5, "importance": "A", "groupId": "G0187", "category": "関係法令（有害業務に係るもの）", "subcategory": "作業環境測定", "question": "法令に基づき定期に行う作業環境測定とその測定頻度との組合せとして、誤っているものは次のうちどれか。", "choices": ["通気設備が設けられている坑内の作業場における通気量の測定……半月以内ごとに１回", "非密封の放射性物質を取り扱う作業室における空気中の放射性物質の濃度の測定……１か月以内ごとに１回", "溶融ガラスからガラス製品を成型する業務を行う屋内作業場における気温、湿度及びふく射熱の測定……１か月以内ごとに１回", "チッパーによりチップする業務を行う屋内作業場における等価騒音レベルの測定……６か月以内ごとに１回", "鉛蓄電池の解体工程において鉛等を切断する業務を行う屋内作業場における空気中の鉛の濃度の測定……１年以内ごとに１回"], "answer": 3, "explanation": "（1）正しい（安衛令第21条第1項④、安衛則第603条第1項）。（2）正しい（安衛令第21条第1項⑥）。（3）誤り。溶融ガラスからガラス製品を成型する業務を行う屋内作業場の気温等の測定は「1か月以内ごとに1回」ではなく「半月以内ごとに1回」行わなければならない（安衛令第21条第1項②、安衛則第587条第1項⑧）。（4）正しい（安衛令第21条第1項③、安衛則第590条第1項）。（5）正しい（安衛令第21条第1項⑧）。【頻出】作業環境測定の頻度は頻出。"},
